# TransformerPPO continuous-2D single-behaviour canary — PREDATOR (foraging + pursuit predator).
#
# Stage-1 substrate behaviour canary (T7.prep.continuous_behaviours.s1_substrate_canary):
# confirms continuous predator-EVASION is learnable on the calibrated substrate. Env / sensing /
# reward / satiety match the calibrated foraging substrate (Fick + adaptive eps=0.1 + capture 2.0 mm)
# + the canonical predator block; brain = the TransformerPPO tuned recipe (T7.prep.continuous_tuning).
#
# CALIBRATED predator difficulty (Stage-1, vs the Euclidean-coherent reward — T7.prep.reward_coherence):
#   count 1 / speed 0.3 / detection_radius 5 (+ 1.0 mm damage-radius fallback). The T4-carried
#   difficulty (2 predators / speed 0.5 / detection 6) is over-lethal on continuous (worm dies ~95%
#   even trained — number-matched T4 values are non-commensurable; see the two-regimes checkpoint).
#   Calibrated DOWN to the learnable band on the continuous substrate's own terms (reward frozen):
#   MLP learns evasion here (predator-death 65->59%, survival ~41%). Gentler side leaves stacking
#   headroom for the integrated cell. NB the Transformer does NOT learn reactive predator-evasion at
#   any difficulty/window (architectural finding, not a substrate issue).

max_steps: 500
brain:
  name: transformerppo
  config:
    action_mode: continuous
    window_size: 16
    d_model: 64
    nhead: 4
    num_encoder_layers: 2
    dim_feedforward: 128
    dropout: 0.0
    critic_hidden_dim: 64
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    entropy_coef: 0.03
    learning_rate: 0.0003
    rollout_buffer_size: 256
    num_epochs: 4
    num_minibatches: 2
    max_grad_norm: 0.5
    sensory_modules:
    - food_chemotaxis
    - predator_mechanosensation_oracle
    - predator_chemosensation_oracle
    - proprioception
reward:
  reward_mode: distal_chemo_contact_trigger
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.5
  reward_health_gain: 0.1
satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2
environment:
  env_type: continuous_2d
  continuous:
    world_size_mm: 20.0
    body_length_mm: 1.0
    max_step_mm: 1.0
    capture_radius_mm: 2.0
    sweep_amplitude_mm: 0.5
  viewport_size:
  - 11
  - 11
  sensing:
    chemotaxis_mode: klinotaxis
    predator_mechano_mode: klinotaxis
    predator_distal_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1
    adaptive_chemosensor_enabled: true
    adaptive_chemosensor_readout: fold_change
    adaptive_chemosensor_alpha: 0.1
    adaptive_chemosensor_epsilon: 0.1
  foraging:
    foods_on_grid: 5
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_field_mode: fick
    gradient_decay_constant: 8.0
    gradient_strength: 1.0
  predators:
    enabled: true
    count: 1
    speed: 0.3
    movement_pattern: pursuit
    detection_radius: 5
    gradient_decay_constant: 10.0
    gradient_strength: 1.0
  health:
    max_hp: 100.0
    predator_damage: 20.0
    food_healing: 10.0
