# Biology-Driven Predator Sensing — MLPPPO with Pursuit Predators
#
# MLPPPO equivalent of lstmppo_small_predator_biology_klinotaxis.yml — tests
# the biologically-grounded two-channel predator-sensing model
# (predator_mechanosensation + predator_chemosensation, both klinotaxis-mode)
# against a feed-forward PPO baseline without recurrence.
#
# Both channels run in klinotaxis mode (biologically-preferred default;
# matches the empirical pattern already adopted by the legacy
# nociception_klinotaxis variant for predator-evasion configs).
#
# Smoke config: confirms the new sensor surface works end-to-end under a
# memoryless MLPPPO brain (with proprioception added so the brain has
# heading context to correlate dC/dt with movement, mirroring the
# mlpppo_small_klinotaxis foraging-only baseline).
#
# Reward: distal_chemo_contact_trigger. Continuous distal-chemo penalty
# via env.get_predator_concentration + binary contact damage trigger at
# dist <= 1, with distance-scaled evasion and flat-fallback paths dropped.
# This mirrors the dual-channel sensor split (continuous distal aversion
# matching the chemo channel + sharp contact pain matching the mechano
# channel) on the reward side. Empirically: at n=4 × 500ep this pairing
# scores 81.0% ± 5.0 last-25 mean success, beating legacy
# nociception_klinotaxis by +14pp with the lowest death rate (18% vs 32%)
# and tightest variance of all six variants evaluated; full ranking
# under docs/experiments/logbooks/supporting/025-weight-search-architecture-ranking/phase-0/.

max_steps: 500
brain:
  name: mlpppo
  config:
    actor_hidden_dim: 64
    critic_hidden_dim: 64
    num_hidden_layers: 2
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    entropy_coef: 0.02
    learning_rate: 0.001
    rollout_buffer_size: 256
    num_epochs: 10
    num_minibatches: 2
    max_grad_norm: 0.5
    normalize_advantages: true
    sensory_modules:
      - food_chemotaxis                  # Auto-translated to food_chemotaxis_klinotaxis
      - predator_mechanosensation_oracle # Auto-translated to predator_mechanosensation_klinotaxis
      - predator_chemosensation_oracle   # Auto-translated to predator_chemosensation_klinotaxis
      - proprioception
      - stam

body_length: 2

reward:
  reward_mode: distal_chemo_contact_trigger
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.5
  reward_health_gain: 0.1

satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    predator_mechano_mode: klinotaxis
    predator_distal_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 6
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 2
    speed: 0.5
    movement_pattern: pursuit
    detection_radius: 6
    gradient_decay_constant: 10.0
    gradient_strength: 1.0

  health:
    max_hp: 100.0
    predator_damage: 20.0
    food_healing: 10.0
