# TRANSFORMERPPO continuous-2D C2 — FORAGING + PREDATOR convergence on REAL EVASION (T7 Stage 3 rerun, 2026-06-20).
#
# Re-baselined to 60mm + CORRECTED predator-sensing (steep field gradient_decay_constant 5).
# The prior saturated field (decay 10-30) starved the klinotaxis directional signal to ~1-7%, so
# every arm RACED (tank + out-forage) instead of evading — fixed in PR #247
# (fix-continuous-predator-field-saturation). Difficulty re-calibrated for REAL evasion: count 3 /
# speed 0.4 / detection 15 (the racing-era count2/speed0.4 was too easy once the worm actually
# evades). reward_mode distal_chemo_contact_trigger (works with the steep field).
# n=4 final-quarter survival, health@success ~88-96 (CLEAN evasion, ~zero damage): transformerppo 75%.
# Per-arch recipe: entropy 0.005 + lr 0.0001 (stability). SUPERSEDES the racing-era 20mm/count2 C2 (its spread was a racing artifact).

max_steps: 2400
brain:
  name: transformerppo
  config:
    action_mode: continuous
    window_size: 16
    d_model: 64
    nhead: 4
    num_encoder_layers: 2
    dim_feedforward: 128
    dropout: 0.0
    critic_hidden_dim: 64
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    entropy_coef: 0.005
    learning_rate: 0.0001
    rollout_buffer_size: 256
    num_epochs: 4
    num_minibatches: 2
    max_grad_norm: 0.5
    sensory_modules:
    - food_chemotaxis
    - predator_mechanosensation_klinotaxis
    - predator_chemosensation_klinotaxis
    - proprioception
reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  penalty_health_damage: 0.5
  reward_health_gain: 0.1
  reward_mode: distal_chemo_contact_trigger
satiety:
  initial_satiety: 900
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 20.0
environment:
  env_type: continuous_2d
  continuous:
    world_size_mm: 60.0
    body_length_mm: 1.0
    max_step_mm: 1.0
    capture_radius_mm: 2.0
    sweep_amplitude_mm: 0.5
    max_turn_rad: 0.5
    predator_damage_radius_mm: 1.0
  viewport_size:
  - 11
  - 11
  sensing:
    chemotaxis_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1
    adaptive_chemosensor_enabled: true
    adaptive_chemosensor_readout: fold_change
    adaptive_chemosensor_alpha: 0.1
    adaptive_chemosensor_epsilon: 0.1
    predator_mechano_mode: klinotaxis
    predator_distal_mode: klinotaxis
  foraging:
    foods_on_grid: 45
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_field_mode: fick
    gradient_decay_constant: 24.0
    gradient_strength: 1.0
  health:
    max_hp: 100.0
    predator_damage: 15.0
    food_healing: 10.0
  predators:
    enabled: true
    count: 3
    speed: 0.4
    movement_pattern: pursuit
    detection_radius: 15
    gradient_decay_constant: 5.0
    gradient_strength: 1.0
