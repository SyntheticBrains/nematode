# ConnectomePPO continuous-2D PREDATOR-ONLY projection validation (Stage 2 step 2b).
#
# Isolates the connectome's biologically-grounded predator projections — distal sulfolipid
# onto ASH/ASI (ASHL/ASHR/ASIL/ASIR) + contact-mechano onto ALM/AVM/PLM by approach zone
# (enable_predator_projection: true) — on the continuous-2D substrate, to confirm they receive
# correct Euclidean sensor values and that evasion learns. Projection wiring is unchanged from
# the T4-grid connectome predator config (connectomeppo_small_predator_biology_klinotaxis.yml) —
# validate-don't-rebuild; the difference here is the continuous substrate + the metric-coherent
# reward (now that #239 distance-metric / #240 predator_mechano-channel / #241 float-sensing are
# in — the predator_mechano contact-intensity channel feeding ALM/PLM is live, not constant 0).
#
# Env (predator block + satiety + reward + health + max_steps) matches the Stage-1 MLP predator
# canary (mlpppo_small_continuous2d_predator_klinotaxis.yml — count 1 / speed 0.3 / detection 5 +
# 1.0 mm damage-radius fallback, max_steps 500, survival-dominant satiety gain 0.2) so the
# difficulty sits in the calibrated learnable band; only the brain is swapped to the connectome
# (C1 recipe + enable_predator_projection). The chemosensor/substrate geometry match the connectome
# C1 foraging config (connectomeppo_small_continuous2d_fick_adaptive_klinotaxis.yml). Single-behaviour
# validation; does NOT exercise behaviour competition (that is C2 / Stage 2 step 2c).

max_steps: 500
brain:
  name: connectomeppo
  config:
    action_mode: continuous  # tanh-squashed Gaussian (speed, turn) head

    connectome_source: cook_2019_hermaphrodite
    enable_gap_junctions: true
    chemical_mask_mode: strict
    sensing_mode: klinotaxis  # 3-feature head-sweep food input
    enable_predator_projection: true  # routes ASH/ASI distal + ALM/AVM/PLM contact-mechano
    forward_pass_depth: 4
    freeze_updates: false

    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    # Connectome canonical low-entropy drift-lock (logbook 023 R2b / T4.0d): entropy 0.005, the
    # value the grid connectome configs use. Earlier 0.02 (vs 0.05) lifted evasion but, per the
    # difficulty-recalibration probe, induces the connectome's documented constant-entropy late drift
    # at higher predator pressure (peaks ~40% then collapses); 0.005 stabilises it (holds, no collapse
    # over 3000ep) and is what the C3 integrated cell must use. lr 0.0003 unchanged.
    entropy_coef: 0.005
    learning_rate: 0.0003
    rollout_buffer_size: 256
    num_epochs: 10
    num_minibatches: 2
    max_grad_norm: 0.5

reward:
  reward_mode: distal_chemo_contact_trigger
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.5
  reward_health_gain: 0.1

satiety:
  # Survival-dominant (matches the Stage-1 predator canary): food barely replenishes satiety, so
  # the episode is an evasion/survival task rather than a collect-10 budget.
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  env_type: continuous_2d
  continuous:
    world_size_mm: 20.0
    body_length_mm: 1.0
    max_step_mm: 1.0
    capture_radius_mm: 2.0  # body/patch scale (calibrated — see C1 config header)
    sweep_amplitude_mm: 0.5
    max_turn_rad: 0.5  # ~29deg/step — biologically realistic turn bound (env default; explicit here)
    # Body/contact-scale Euclidean predator damage radius (mm): the predators block leaves
    # `damage_radius` at the grid default 0 (unreachable as a Euclidean distance), so the env
    # applies this fallback — and the predator_mechano contact-intensity channel uses it (#240).
    predator_damage_radius_mm: 1.0

  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    predator_mechano_mode: klinotaxis
    predator_distal_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1
    # Adaptive chemosensory sensor: fold-change on the derivative channel.
    adaptive_chemosensor_enabled: true
    adaptive_chemosensor_readout: fold_change
    adaptive_chemosensor_alpha: 0.1  # no-op under fold_change (only `contrast` uses the background)
    adaptive_chemosensor_epsilon: 0.1  # calibrated (0.001 collapses foraging — see C1 config header)

  foraging:
    foods_on_grid: 5
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    # Static Fick-shaped gradient geometry (Gaussian kernel, L = decay).
    gradient_field_mode: fick
    gradient_decay_constant: 8.0
    gradient_strength: 1.0

  predators:
    # Stage-1 calibrated continuous predator difficulty (in the learnable band on the continuous
    # substrate's own terms): count 1 / speed 0.3 / detection 5.
    enabled: true
    count: 1
    speed: 0.3
    movement_pattern: pursuit
    detection_radius: 5
    gradient_decay_constant: 5.0  # steep predator field (saturation fix — see phase6-tracking; decay 10 gave ~1-7% directional signal -> racing, not evasion)
    gradient_strength: 1.0

  health:
    max_hp: 100.0
    predator_damage: 20.0
    food_healing: 10.0
