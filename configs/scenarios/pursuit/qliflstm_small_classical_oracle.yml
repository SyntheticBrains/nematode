# Dynamic Foraging with Pursuit Predators - Small Configuration (Classical Ablation)
# Uses QLIF-LSTM brain architecture (H.4 Stage 4b) with classical sigmoid gates
# Custom LSTM cell with classical sigmoid gates (use_quantum_gates: false) + PPO with truncated BPTT
# Multi-objective: find food while avoiding pursuit predators
# Uses unified sensory modules for multi-sensory input

max_steps: 500
brain:
  name: qliflstm
  config:
    # LSTM architecture
    lstm_hidden_dim: 32

    # QLIF gate parameters
    shots: 1024
    membrane_tau: 0.9
    refractory_period: 0
    use_quantum_gates: false

    # PPO hyperparameters
    actor_lr: 0.003
    critic_lr: 0.001
    gamma: 0.99
    gae_lambda: 0.98
    clip_epsilon: 0.2
    entropy_coef: 0.05
    entropy_coef_end: 0.005
    entropy_decay_episodes: 400
    value_loss_coef: 0.5
    num_epochs: 2
    rollout_buffer_size: 512
    max_grad_norm: 0.5

    # Recurrent PPO
    bptt_chunk_length: 16

    # Critic
    critic_hidden_dim: 64
    critic_num_layers: 2

    # Unified sensory modules for multi-objective tasks
    sensory_modules:
      - food_chemotaxis
      - nociception

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.0
  reward_health_gain: 0.1

satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]

  foraging:
    foods_on_grid: 6
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 2
    speed: 0.5
    movement_pattern: pursuit
    detection_radius: 5
    gradient_decay_constant: 10.0
    gradient_strength: 1.0

  health:
    max_hp: 100.0
    predator_damage: 6.0
    food_healing: 10.0
