# ConnectomePPO continuous-2D C2 — FORAGING + PREDATOR combined (Stage 2 step 2c).
#
# The connectome's integration middle-ground and its known weak spot at T4: predator-evasion WHILE
# foraging (the behaviours compete for the motor readout). Climbs the C1→C2→C3 curriculum (thermo
# joins only at full C3). Brings the connectome to its C2 ceiling here — on the continuous
# substrate's own calibrated difficulty — rather than discovering a competition failure in the
# expensive n>=8 C3 cell. Validate-don't-rebuild: the predator projection wiring is unchanged from
# the 2b predator-only validation (which confirmed the ASH/ASI distal + ALM/PLM contact-mechano
# channels feed correct Euclidean values + evasion learns in isolation).
#
# Composition = the connectome C1 FORAGING recipe (forage-to-complete: max_steps 800 + satiety
# 300/0.8/20 so collecting the full 10 is a real objective, NOT the 2b predator-only survival task)
# + the 2b predator block (count 1 / speed 0.3 / detection 5 + 1.0 mm damage-radius) +
# enable_predator_projection. Two single-behaviour-validated pieces, now competing.
#
# DIFFICULTY — predator_damage RELAXED to 10 for the stacked dual task (the 2b predator-ONLY cell
# used 20; T4's grid precedent dropped its combined-cell predator_damage 20->6 because stacked
# lethality compounds — multi-objective learnability needs the gentler side). Starting point for the
# time-boxed C2 calibration (n>=4): drop toward 6 if evasion-while-foraging is over-lethal, or raise
# if the predator becomes irrelevant. Difficulty is continuous-native, NOT number-matched to T4.
#
# ENTROPY — start at 0.02 (the 2b predator per-arch value; foraging is robust enough to tolerate the
# lower exploration, evasion needs the commitment). NB connectome_ppo has NO entropy-decay-schedule
# support, so the documented late-drift remedy (T4.0d / logbook 023 R2b) is the low CONSTANT entropy
# lock: tune in {0.02, 0.01, 0.005} watching for the connectome's late-training sag, report
# best-checkpoint alongside final-quarter.

max_steps: 800
brain:
  name: connectomeppo
  config:
    action_mode: continuous  # tanh-squashed Gaussian (speed, turn) head

    connectome_source: cook_2019_hermaphrodite
    enable_gap_junctions: true
    chemical_mask_mode: strict
    sensing_mode: klinotaxis  # 3-feature head-sweep food input
    enable_predator_projection: true  # routes ASH/ASI distal + ALM/AVM/PLM contact-mechano
    forward_pass_depth: 4
    freeze_updates: false

    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    # Connectome canonical low-entropy drift-lock: entropy 0.005 (logbook 023 R2b / T4.0d; the grid
    # connectome value). The difficulty-recalibration probe showed constant 0.02 induces late drift
    # under predator pressure (peaks then collapses, worse with more budget/lr); 0.005 stabilises
    # (holds over 3000ep). lr 0.0003 unchanged. Predator difficulty here is the pre-recalibration
    # placeholder — the recalibrated band (count2/speed0.4/dmg15) is set at the Stage-3 cross-arm C2.
    entropy_coef: 0.005
    learning_rate: 0.0003
    rollout_buffer_size: 256
    num_epochs: 10
    num_minibatches: 2
    max_grad_norm: 0.5

reward:
  reward_mode: distal_chemo_contact_trigger
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.5
  reward_health_gain: 0.1

satiety:
  # Forage-to-complete (C1 foraging recipe): food sustains satiety so collecting the full 10 is a
  # real objective the predator competes against — NOT the 2b predator-only survival task (gain 0.2).
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 20.0

environment:
  env_type: continuous_2d
  continuous:
    world_size_mm: 20.0
    body_length_mm: 1.0
    max_step_mm: 1.0
    capture_radius_mm: 2.0  # body/patch scale (calibrated — see C1 config header)
    sweep_amplitude_mm: 0.5
    max_turn_rad: 0.5  # ~29deg/step — biologically realistic turn bound (env default; explicit here)
    predator_damage_radius_mm: 1.0  # body/contact-scale Euclidean damage radius (#240 mechano channel)

  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    predator_mechano_mode: klinotaxis
    predator_distal_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1
    # Adaptive chemosensory sensor: fold-change on the derivative channel.
    adaptive_chemosensor_enabled: true
    adaptive_chemosensor_readout: fold_change
    adaptive_chemosensor_alpha: 0.1  # no-op under fold_change (only `contrast` uses the background)
    adaptive_chemosensor_epsilon: 0.1  # calibrated (0.001 collapses foraging — see C1 config header)

  foraging:
    foods_on_grid: 5
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    # Static Fick-shaped gradient geometry (Gaussian kernel, L = decay).
    gradient_field_mode: fick
    gradient_decay_constant: 8.0
    gradient_strength: 1.0

  predators:
    # Stage-1 calibrated continuous predator difficulty (count 1 / speed 0.3 / detection 5), as 2b.
    enabled: true
    count: 1
    speed: 0.3
    movement_pattern: pursuit
    detection_radius: 5
    gradient_decay_constant: 10.0
    gradient_strength: 1.0

  health:
    max_hp: 100.0
    predator_damage: 10.0  # relaxed from the 2b predator-only 20 for stacked dual-task lethality (see header)
    food_healing: 10.0
