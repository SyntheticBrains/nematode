# Biology-Driven Predator Sensing — LSTM PPO GRU with Pursuit Predators
#
# Uses the biologically-grounded two-channel predator-sensing model:
#
#   - predator_mechanosensation: graded contact intensity + anterior /
#     posterior / lateral zone (models ASH/ALM/AVM/PLM mechanosensory
#     pathway driving the reversal-vs-acceleration escape response).
#   - predator_chemosensation: distal sulfolipid concentration + lateral
#     head-sweep gradient + dC/dt (models the ASH + ASI distal-chemosensory
#     escape signal per Liu et al. 2018, Nat. Commun.).
#
# Both channels run in klinotaxis mode — the biologically-preferred default
# for predator-evasion configs (matches the head-sweep sensing pattern
# already adopted by the legacy nociception_klinotaxis variant).
#
# Smoke config: confirms the new sensor surface works end-to-end through
# scripts/run_simulation.py and produces non-degenerate training. The
# full architecture-vs-architecture predator-evasion evaluation runs on
# equivalent configs in a later evaluation tranche.

max_steps: 1000
brain:
  name: lstmppo
  config:
    rnn_type: gru
    lstm_hidden_dim: 64
    bptt_chunk_length: 64

    actor_hidden_dim: 64
    critic_hidden_dim: 128
    actor_num_layers: 2
    critic_num_layers: 2

    actor_lr: 0.0003
    critic_lr: 0.0003

    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    rollout_buffer_size: 512
    num_epochs: 4
    max_grad_norm: 0.5

    entropy_coef: 0.02
    entropy_coef_end: 0.005
    entropy_decay_episodes: 800

    lr_warmup_episodes: 50
    lr_warmup_start: 0.00003
    lr_decay_episodes: 1500
    lr_decay_end: 0.00003

    sensory_modules:
      - food_chemotaxis                  # Auto-translated to food_chemotaxis_klinotaxis
      - predator_mechanosensation_oracle # Auto-translated to predator_mechanosensation_klinotaxis
      - predator_chemosensation_oracle   # Auto-translated to predator_chemosensation_klinotaxis
      - mechanosensation
      - proprioception
      - stam

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.5
  reward_health_gain: 0.1

satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    # New biology-driven predator sensing modes. nociception_mode stays
    # at its ORACLE default — the legacy field is irrelevant when no
    # nociception_* module is in the sensory_modules list.
    predator_mechano_mode: klinotaxis
    predator_distal_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 6
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 2
    speed: 0.5
    movement_pattern: pursuit
    detection_radius: 6
    gradient_decay_constant: 10.0
    gradient_strength: 1.0

  health:
    max_hp: 100.0
    predator_damage: 20.0
    food_healing: 10.0
