# CFCPPO continuous-2D C2 — FORAGING + PREDATOR convergence (T7.*.c2_foraging_predator).
# Recalibrated cross-arm difficulty count 2 / speed 0.4 / damage 15 (discriminating band 46-90%).
# C1 foraging recipe + 2b predator block + biological klinotaxis predator sensing. entropy 0.02.
# n=4 survival ~90% (strongest evasion arm — liquid/recurrent).

max_steps: 800
brain:
  name: cfcppo
  config:
    action_mode: continuous
    units: 32
    ncp_sparsity: 0.5
    cfc_mode: default
    bptt_chunk_length: 64
    actor_head: mlp
    actor_hidden_dim: 64
    actor_num_layers: 2
    critic_hidden_dim: 64
    critic_num_layers: 2
    actor_lr: 0.0003
    critic_lr: 0.0003
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    entropy_coef: 0.02
    rollout_buffer_size: 256
    num_epochs: 4
    max_grad_norm: 0.5
    sensory_modules:
    - food_chemotaxis
    - predator_mechanosensation_klinotaxis
    - predator_chemosensation_klinotaxis
    - proprioception
reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  reward_mode: distal_chemo_contact_trigger
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  penalty_health_damage: 0.5
  reward_health_gain: 0.1
satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 20.0
environment:
  env_type: continuous_2d
  continuous:
    world_size_mm: 20.0
    body_length_mm: 1.0
    max_step_mm: 1.0
    capture_radius_mm: 2.0
    sweep_amplitude_mm: 0.5
    max_turn_rad: 0.5
    predator_damage_radius_mm: 1.0
  viewport_size:
  - 11
  - 11
  sensing:
    chemotaxis_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1
    adaptive_chemosensor_enabled: true
    adaptive_chemosensor_readout: fold_change
    adaptive_chemosensor_alpha: 0.1
    adaptive_chemosensor_epsilon: 0.1
    predator_mechano_mode: klinotaxis
    predator_distal_mode: klinotaxis
  foraging:
    foods_on_grid: 5
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_field_mode: fick
    gradient_decay_constant: 8.0
    gradient_strength: 1.0
  predators:
    enabled: true
    count: 2
    speed: 0.4
    movement_pattern: pursuit
    detection_radius: 5
    gradient_decay_constant: 10.0
    gradient_strength: 1.0
  health:
    max_hp: 100.0
    predator_damage: 15.0
    food_healing: 10.0
