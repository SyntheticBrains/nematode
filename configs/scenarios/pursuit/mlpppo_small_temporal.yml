# Temporal Sensing - MLPPPO with Pursuit Predators - Small Configuration
# Phase 3: Biologically-accurate sensing for chemotaxis and nociception
#
# Sensing modes:
#   - chemotaxis: temporal (Mode A) — scalar food concentration only
#   - nociception: temporal (Mode A) — scalar predator concentration only
#     Models ASH/ADL neurons detecting predator-secreted sulfolipids
#     via temporal comparison, not directional gradient
#
# Pursuit predators: actively chase when agent is within detection radius

max_steps: 500
brain:
  name: mlpppo
  config:
    actor_hidden_dim: 128
    critic_hidden_dim: 128
    num_hidden_layers: 2
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.98
    value_loss_coef: 0.5
    entropy_coef: 0.02
    learning_rate: 0.001
    rollout_buffer_size: 512
    num_epochs: 20
    num_minibatches: 2
    max_grad_norm: 0.5
    normalize_advantages: true
    lr_warmup_episodes: 50
    lr_warmup_start: 0.0001
    lr_decay_episodes: 200
    lr_decay_end: 0.0001
    sensory_modules:
      - food_chemotaxis     # Auto-translated to food_chemotaxis_temporal
      - nociception         # Auto-translated to nociception_temporal
      - mechanosensation    # Already biologically accurate, no translation
      - proprioception      # Heading direction — critical for temporal sensing

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.5
  reward_health_gain: 0.1

satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: temporal     # Mode A: scalar food concentration only
    nociception_mode: temporal    # Mode A: scalar predator concentration only
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 6
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 2
    speed: 0.5
    movement_pattern: pursuit
    detection_radius: 6
    gradient_decay_constant: 10.0
    gradient_strength: 1.0

  health:
    max_hp: 100.0
    predator_damage: 20.0
    food_healing: 10.0
