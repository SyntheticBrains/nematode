# Derivative Sensing (Mode B) - LSTM PPO with Aerotaxis + Stationary Predators - Large Configuration
# LSTM PPO with biologically-plausible derivative sensing for oxygen + toxic zone avoidance
#
# Architecture: Features -> LayerNorm -> GRU(64) -> Actor MLP / Critic MLP (detached h)
# Training: Chunk-based truncated BPTT with separate actor/critic optimizers
#
# Sensing modes:
#   - chemotaxis: derivative (Mode B) — scalar food concentration + dC/dt
#   - nociception: derivative (Mode B) — predator concentration + dP/dt
#   - aerotaxis: derivative (Mode B) — oxygen scalar + dO2/dt
#   - mechanosensation: unchanged (binary contact)
#   - Agent gets rate-of-change but no directional gradients
#
# Large environment (100x100 grid):
# - 5 stationary predators with toxic zones, O2 gradient + spots
#
# Environment matches mlpppo_large_oracle.yml (oracle baseline)
# except: derivative sensing, steeper gradients, + proprioception module

max_steps: 2000
brain:
  name: lstmppo
  config:
    rnn_type: gru
    lstm_hidden_dim: 64
    bptt_chunk_length: 128

    actor_hidden_dim: 128
    critic_hidden_dim: 128
    actor_num_layers: 2
    critic_num_layers: 2

    actor_lr: 0.0003
    critic_lr: 0.0003

    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.98
    value_loss_coef: 0.5
    rollout_buffer_size: 512
    num_epochs: 4
    max_grad_norm: 0.5

    entropy_coef: 0.02
    entropy_coef_end: 0.01
    entropy_decay_episodes: 4000

    lr_warmup_episodes: 100
    lr_warmup_start: 0.00003
    lr_decay_episodes: 6000
    lr_decay_end: 0.00003

    sensory_modules:
      - food_chemotaxis     # Auto-translated to food_chemotaxis_temporal
      - nociception         # Auto-translated to nociception_temporal
      - mechanosensation    # Physical contact detection
      - aerotaxis           # Auto-translated to aerotaxis_temporal
      - proprioception

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.3
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.3
  reward_health_gain: 0.2

satiety:
  initial_satiety: 800.0
  satiety_decay_rate: 1.0
  satiety_gain_per_food: 0.2

environment:
  grid_size: 100
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: derivative
    nociception_mode: derivative
    aerotaxis_mode: derivative
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 45
    target_foods_to_collect: 25
    min_food_distance: 8
    agent_exclusion_radius: 12
    gradient_decay_constant: 4.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 5
    speed: 0.0
    movement_pattern: stationary
    detection_radius: 8
    damage_radius: 4
    gradient_decay_constant: 4.0
    gradient_strength: 1.2

  health:
    max_hp: 150.0
    predator_damage: 10.0
    food_healing: 15.0

  aerotaxis:
    enabled: true
    base_oxygen: 10.0
    gradient_direction: 1.5708
    gradient_strength: 0.12
    high_oxygen_spots:
      - [80, 50, 8.0]
      - [20, 80, 6.0]
    low_oxygen_spots:
      - [30, 30, 8.0]
      - [70, 20, 6.0]
      - [50, 70, 5.0]
    spot_decay_constant: 6.0
    comfort_reward: 0.0
    danger_penalty: -0.5
    danger_hp_damage: 0.5
    lethal_hp_damage: 6.0
