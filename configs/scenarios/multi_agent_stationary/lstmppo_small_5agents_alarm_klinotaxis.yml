# Multi-Agent Klinotaxis — 5 Agents, Stationary Predators + Alarm Pheromones
# LSTM PPO GRU with Phase 3 proven brain hyperparams
#
# Tests Phase 4 Deliverable 5 (Collective Predator Response) under conditions
# matching the R5 food-marking pheromone success: spatially persistent threat
# (stationary toxic zones) + sharply local nociception (detection_radius=3)
# so that alarm pheromones can provide non-redundant long-range information.
# Alarm pheromones emitted on health damage create persistent trails that
# point at danger, analogous to R5 food trails pointing at food.
#
# detection_radius=3 deliberately reduced from the typical 6-8 used in
# pursuit configs. With local-only nociception, agents only know predators
# are present once they're already at risk; alarm pheromones from prior
# agent damage events become the "long-range warning" channel.
#
# Alarm pheromone params strengthened to match R8 finding that strong
# pheromones (emission=3.0, spatial_decay>=12) are required for measurable
# benefit; the original Campaign C alarm config used weaker params.

max_steps: 1000
brain:
  name: lstmppo
  config:
    rnn_type: gru
    lstm_hidden_dim: 64
    bptt_chunk_length: 64
    actor_hidden_dim: 64
    critic_hidden_dim: 128
    actor_num_layers: 2
    critic_num_layers: 2
    actor_lr: 0.0003
    critic_lr: 0.0003
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    rollout_buffer_size: 512
    num_epochs: 4
    max_grad_norm: 0.5
    entropy_coef: 0.02
    entropy_coef_end: 0.005
    entropy_decay_episodes: 800
    lr_warmup_episodes: 50
    lr_warmup_start: 0.00003
    lr_decay_episodes: 1500
    lr_decay_end: 0.00003
    sensory_modules:
      - food_chemotaxis
      - nociception
      - pheromone_alarm
      - proprioception
      - stam

body_length: 2

multi_agent:
  enabled: true
  count: 5
  food_competition: first_arrival
  social_detection_radius: 5
  termination_policy: freeze
  min_agent_distance: 3

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.5
  reward_health_gain: 0.1

satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    nociception_mode: klinotaxis
    pheromone_alarm_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 6
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 3
    speed: 0.0
    movement_pattern: stationary
    detection_radius: 3
    damage_radius: 2
    gradient_decay_constant: 8.0
    gradient_strength: 1.2

  health:
    max_hp: 100.0
    predator_damage: 15.0
    food_healing: 10.0

  pheromones:
    enabled: true
    alarm:
      emission_strength: 3.0
      spatial_decay_constant: 12.0
      temporal_half_life: 100
      max_sources: 50
