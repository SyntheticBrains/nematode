# Combined-behaviour C3 cell — Connectome-PPO (food + predator + thermotaxis, klinotaxis).
#
# The integrated, ranked configuration for the FOCAL architecture (the Cook
# 2019 connectome). Shares an IDENTICAL env + reward block with the other
# three C3 cells (mlpppo / lstmppo / feedforwardga) — only the brain differs.
#
# Routes all three behaviours through the connectome's learnable sensor
# projections:
#   - Food chemotaxis -> ASE/AWC/AWA (sensing_mode: klinotaxis).
#   - Predator evasion -> ASH/ASI distal + ALM/AVM/PLM contact
#     (enable_predator_projection; Phase 0 canonical two-channel biology +
#     reward_mode: distal_chemo_contact_trigger).
#   - Thermotaxis -> AFD (enable_thermotaxis_projection; LETHAL thermal
#     gradient 1.5).
#
# Composition + lethal-thermal/predator tuning: identical to
# foraging_predator_thermal/mlpppo_small_combined_klinotaxis.yml (see that
# file's header for the full rationale — predator_damage 6.0,
# penalty_health_damage 0.0, lethal thermal, carried forward from logbook 007
# + thermal_pursuit/mlpppo_small_oracle.yml).
#
# entropy_coef 0.005 is the connectome low-entropy lock (logbook 023 R2b).

max_steps: 500
brain:
  name: connectomeppo
  config:
    seed: 2026
    connectome_source: cook_2019_hermaphrodite
    enable_gap_junctions: true
    chemical_mask_mode: strict
    sensing_mode: klinotaxis
    enable_predator_projection: true   # routes ASH/ASI distal + ALM/AVM/PLM contact
    enable_thermotaxis_projection: true  # routes temperature onto AFDL/AFDR
    forward_pass_depth: 4
    freeze_updates: false
    entropy_coef: 0.005  # canonical low-entropy lock (logbook 023 R2b)

    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    learning_rate: 0.001
    rollout_buffer_size: 256
    num_epochs: 10
    num_minibatches: 2
    max_grad_norm: 0.5

body_length: 2

reward:
  reward_mode: distal_chemo_contact_trigger
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_temperature_proximity: 0.0
  penalty_health_damage: 0.0  # Disabled in combined cell (conflicts with thermal HP-damage signal).
  reward_health_gain: 0.1

satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    predator_mechano_mode: klinotaxis
    predator_distal_mode: klinotaxis
    thermotaxis_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 6
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 2
    speed: 0.5
    movement_pattern: pursuit
    detection_radius: 6
    gradient_decay_constant: 10.0
    gradient_strength: 1.0

  health:
    max_hp: 100.0
    predator_damage: 6.0  # Tuned down from the predator-only cell's 20.0 for the stacked combined lethality.
    food_healing: 10.0

  thermotaxis:
    enabled: true
    cultivation_temperature: 20.0
    base_temperature: 20.0  # Temperature at grid center (spawn point)
    gradient_direction: 0.0
    gradient_strength: 1.5   # LETHAL: 1.5°C/cell -> grid edges reach ~35°C (danger/lethal zone)
    comfort_reward: 0.0
    discomfort_penalty: 0.0
    danger_penalty: -0.3
    reward_discomfort_food: 0.0
    danger_hp_damage: 2.0
    lethal_hp_damage: 10.0
    comfort_delta: 5.0       # Comfort: 15-25°C
    discomfort_delta: 10.0   # Discomfort: 10-15°C or 25-30°C
    danger_delta: 15.0       # Danger: 5-10°C or 30-35°C
