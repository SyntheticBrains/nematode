# Large-grid robustness variant of the C3 combined cell — ConnectomePPO.
#
# Tests whether the small-grid (20x20) cross-architecture ranking holds on a
# genuinely large, partially-observable arena. Same brain (Cook 2019 strict
# chemical mask + predator/thermotaxis projections) + klinotaxis sensing + new
# two-channel predator biology + reward as the ranked C3 cell
# (connectomeppo_small_combined_klinotaxis.yml) — ONLY the environment is scaled
# up, to the proven-learnable large env from
# thermal_pursuit/lstmppo_large_klinotaxis.yml (100x100, 4 pursuit predators,
# spot-based thermal, 45 foods / 25 target, max_steps 2000).
#
# First large-grid run for the connectome architecture. The connectome's
# predator projection requires the new two-channel biology (it routes
# predator_distal + predator_contact onto ASH/ASI/ALM/PLM), which is why all
# three robustness brains use the new biology rather than the legacy nociception
# the original thermal_pursuit large configs used.
#
# All three robustness brains (mlpppo/lstmppo/connectomeppo) share this identical
# env + reward block — only the brain differs.

max_steps: 2000
brain:
  name: connectomeppo
  config:
    seed: 2026
    connectome_source: cook_2019_hermaphrodite
    enable_gap_junctions: true
    chemical_mask_mode: strict
    sensing_mode: klinotaxis
    enable_predator_projection: true   # routes ASH/ASI distal + ALM/AVM/PLM contact
    enable_thermotaxis_projection: true  # routes temperature onto AFDL/AFDR
    forward_pass_depth: 4
    freeze_updates: false
    entropy_coef: 0.005  # canonical low-entropy lock (logbook 023 R2b)

    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    learning_rate: 0.001
    rollout_buffer_size: 256
    num_epochs: 10
    num_minibatches: 2
    max_grad_norm: 0.5

body_length: 2

reward:
  reward_mode: distal_chemo_contact_trigger
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  penalty_temperature_proximity: 0.3
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.3
  reward_health_gain: 0.2

satiety:
  initial_satiety: 800.0
  satiety_decay_rate: 1.0
  satiety_gain_per_food: 0.2

environment:
  grid_size: 100
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    predator_mechano_mode: klinotaxis
    predator_distal_mode: klinotaxis
    thermotaxis_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 45
    target_foods_to_collect: 25
    min_food_distance: 8
    agent_exclusion_radius: 12
    gradient_decay_constant: 4.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 4
    speed: 0.5
    movement_pattern: pursuit
    detection_radius: 10
    gradient_decay_constant: 4.0
    gradient_strength: 1.0

  health:
    max_hp: 150.0
    predator_damage: 15.0
    food_healing: 15.0

  thermotaxis:
    enabled: true
    cultivation_temperature: 20.0
    base_temperature: 20.0
    gradient_direction: 0.0
    gradient_strength: 0.15
    hot_spots:
      - [75, 50, 25.0]
      - [25, 75, 20.0]
      - [80, 80, 22.0]
    cold_spots:
      - [25, 25, 25.0]
      - [75, 25, 20.0]
      - [50, 85, 18.0]
    spot_decay_constant: 6.5
    comfort_reward: 0.0
    discomfort_penalty: -0.05
    danger_penalty: -0.5
    reward_discomfort_food: 0.3
    danger_hp_damage: 0.5
    lethal_hp_damage: 6.0
    comfort_delta: 5.0
    discomfort_delta: 10.0
    danger_delta: 15.0
