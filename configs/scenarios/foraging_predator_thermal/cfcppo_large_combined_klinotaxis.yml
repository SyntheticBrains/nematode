# Large-grid robustness variant of the C3 combined cell — CfCPPO (liquid).
#
# Tests whether the small-grid (20x20) cross-architecture ranking holds on a
# genuinely large, partially-observable arena where memory/exploration matter.
# Same brain + klinotaxis sensing + new two-channel predator biology + reward as
# the ranked C3 cell (cfcppo_small_combined_klinotaxis.yml) — ONLY the
# environment is scaled up, to the proven-learnable large env from
# thermal_pursuit/lstmppo_large_klinotaxis.yml (100x100, 4 pursuit predators,
# spot-based thermal, 45 foods / 25 target, max_steps 2000).
#
# CfC is the SECOND recurrent/memory arm in this robustness check (alongside the
# GRU): if the small-grid four-way tie was a low-observability artifact, both
# recurrent arms should separate from the memoryless MLP on this large arena.
#
# All four robustness brains (mlpppo/lstmppo/cfcppo/connectomeppo) share this
# identical env + reward block — only the brain differs.

max_steps: 2000
brain:
  name: cfcppo
  config:
    # CfC + AutoNCP recurrent core
    units: 32
    ncp_sparsity: 0.5
    cfc_mode: default
    bptt_chunk_length: 64

    # Actor head: mlp (the de-risked representative for this cell; motor head under-powered here)
    actor_head: mlp
    actor_hidden_dim: 64
    actor_num_layers: 2
    motor_logit_scale_init: 1.0  # unused in mlp mode; kept for the motor-head ablation

    # Critic MLP on the detached hidden state
    critic_hidden_dim: 64
    critic_num_layers: 2

    # Flat learning rates (no schedule)
    actor_lr: 0.0003
    critic_lr: 0.0003

    # PPO hyperparameters
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    # Entropy peak-anneal (0.08 -> 0.02 over 800 ep), verbatim from the ranked C3 cell:
    # high early entropy forces late-escaping seeds out of the dead-exploration basin
    # before the decay; the low floor lets the converged policy peak (n=8: 84.4 +/- 9.5).
    entropy_coef: 0.08
    entropy_coef_end: 0.02
    entropy_decay_episodes: 800
    rollout_buffer_size: 512
    num_epochs: 4
    max_grad_norm: 0.5

    sensory_modules:
      - food_chemotaxis                  # Auto-translated to food_chemotaxis_klinotaxis
      - predator_mechanosensation_oracle # Auto-translated to predator_mechanosensation_klinotaxis
      - predator_chemosensation_oracle   # Auto-translated to predator_chemosensation_klinotaxis
      - thermotaxis                       # Auto-translated to thermotaxis_klinotaxis
      - proprioception
      - stam

body_length: 2

reward:
  reward_mode: distal_chemo_contact_trigger
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  penalty_temperature_proximity: 0.3
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.3
  reward_health_gain: 0.2

satiety:
  initial_satiety: 800.0
  satiety_decay_rate: 1.0
  satiety_gain_per_food: 0.2

environment:
  grid_size: 100
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    predator_mechano_mode: klinotaxis
    predator_distal_mode: klinotaxis
    thermotaxis_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 45
    target_foods_to_collect: 25
    min_food_distance: 8
    agent_exclusion_radius: 12
    gradient_decay_constant: 4.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 4
    speed: 0.5
    movement_pattern: pursuit
    detection_radius: 10
    gradient_decay_constant: 4.0
    gradient_strength: 1.0

  health:
    max_hp: 150.0
    predator_damage: 15.0
    food_healing: 15.0

  thermotaxis:
    enabled: true
    cultivation_temperature: 20.0
    base_temperature: 20.0
    gradient_direction: 0.0
    gradient_strength: 0.15
    hot_spots:
      - [75, 50, 25.0]
      - [25, 75, 20.0]
      - [80, 80, 22.0]
    cold_spots:
      - [25, 25, 25.0]
      - [75, 25, 20.0]
      - [50, 85, 18.0]
    spot_decay_constant: 6.5
    comfort_reward: 0.0
    discomfort_penalty: -0.05
    danger_penalty: -0.5
    reward_discomfort_food: 0.3
    danger_hp_damage: 0.5
    lethal_hp_damage: 6.0
    comfort_delta: 5.0
    discomfort_delta: 10.0
    danger_delta: 15.0
