# MLPPPO with Aerotaxis + Pursuit Predators - Large Configuration
# Curriculum level 3: Most challenging multi-objective aerotaxis task
#
# This combines all challenge elements:
# - Food collection in a large environment (chemotaxis)
# - Active predator evasion with multiple hunters (nociception + mechanosensation)
# - Oxygen gradient with localized anomalies (aerotaxis)
#
# Pursuit predators actively chase the agent when in detection range.
# Oxygen zones create dangerous areas that must be navigated while evading predators.
# Agent must balance escaping predators vs avoiding dangerous oxygen zones.
#
# Oxygen field layout (~50% of cells in O2 comfort zone):
# - Background gradient: O2 increases northward (pi/2 rad) at 0.12%/cell
# - High oxygen spots: (80,50) ventilation +8%, (20,80) secondary +6%
# - Low oxygen spots: (30,30) bacterial -8%, (70,20) secondary -6%, (50,70) tertiary -5%
#
# Large environment (100x100 grid):
# - 4 pursuit predators (fewer than stationary due to difficulty)
#
# Pursuit-specific adjustments (vs stationary):
# - Moderate predator speed (0.5)
# - Fewer predators (4 vs 5) due to increased difficulty
# - Higher food incentive during chase (reward_distance_scale: 0.5)
# - Lower proximity penalty during unavoidable chase
#
# Sensory modules (C. elegans neuron references):
# - food_chemotaxis: Food-specific attraction (AWC, AWA neurons)
# - aerotaxis: Oxygen sensing (URX, AQR, PQR neurons)
# - nociception: Predator avoidance (ASH, ADL neurons)
# - mechanosensation: Physical contact (ALM, PLM, AVM neurons)

max_steps: 2000
brain:
  name: mlpppo
  config:
    actor_hidden_dim: 256
    critic_hidden_dim: 256
    num_hidden_layers: 4
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    entropy_coef: 0.02
    learning_rate: 0.001
    rollout_buffer_size: 1024
    num_epochs: 10
    num_minibatches: 4
    max_grad_norm: 0.5
    normalize_advantages: true
    lr_warmup_episodes: 50
    lr_warmup_start: 0.0001
    lr_decay_episodes: 300
    lr_decay_end: 0.0001
    sensory_modules:
      - food_chemotaxis
      - aerotaxis
      - nociception
      - mechanosensation

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.3
  reward_health_gain: 0.2

satiety:
  initial_satiety: 800.0
  satiety_decay_rate: 1.0
  satiety_gain_per_food: 0.2

environment:
  grid_size: 100
  viewport_size: [11, 11]

  foraging:
    foods_on_grid: 45
    target_foods_to_collect: 25
    min_food_distance: 8
    agent_exclusion_radius: 12
    gradient_decay_constant: 12.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 4
    speed: 0.5
    movement_pattern: pursuit
    detection_radius: 10
    gradient_decay_constant: 12.0
    gradient_strength: 1.0

  health:
    max_hp: 150.0
    predator_damage: 15.0
    food_healing: 15.0

  aerotaxis:
    enabled: true
    base_oxygen: 10.0            # O2% at grid center (spawn point)
    gradient_direction: 1.5708   # O2 increases northward (pi/2 radians)
    gradient_strength: 0.12      # 0.12 O2% per cell from center (~50% comfort zone)
    # Localized oxygen anomalies: [x, y, intensity]
    high_oxygen_spots:
      - [80, 50, 8.0]           # Ventilation point: +8% O2
      - [20, 80, 6.0]           # Secondary ventilation
    low_oxygen_spots:
      - [30, 30, 8.0]           # Dense bacterial lawn: -8% O2
      - [70, 20, 6.0]           # Secondary bacterial sink
      - [50, 70, 5.0]           # Third bacterial sink
    spot_decay_constant: 6.0
    # Rewards/penalties
    comfort_reward: 0.0
    danger_penalty: -0.5
    # HP damage
    danger_hp_damage: 0.5
    lethal_hp_damage: 6.0
