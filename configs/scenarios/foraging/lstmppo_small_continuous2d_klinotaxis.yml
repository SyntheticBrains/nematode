# LSTMPPO continuous-action klinotaxis foraging on the continuous-2D substrate.
#
# Continuous-action counterpart of ``lstmppo_small_klinotaxis.yml``: the same
# GRU recurrent core + klinotaxis sensing, but on the continuous-2D environment
# (``env_type: continuous_2d``) with the continuous tanh-squashed Gaussian action
# head (``action_mode: continuous``). The brain emits a normalized ``(speed, turn)``
# vector; the environment rescales it to physical mm / radians.
#
# Tuning note (single-seed, 300-500 runs): a flat entropy_coef of 0.03 (vs the
# grid baseline's 0.02→0.005 decay) lifts foraging ~0.15 → ~0.37 eaten/episode and
# arrests the recurrent continuous-policy collapse. The single-seed signal is
# still noisy; a proper multi-seed tune is deferred to the Gate-2 floor-check /
# evaluation campaign.

max_steps: 400  # continuous-2D klinotaxis; shorter than the grid baseline for a fast signal
brain:
  name: lstmppo
  config:
    action_mode: continuous  # tanh-squashed Gaussian (speed, turn) head

    rnn_type: gru
    lstm_hidden_dim: 64
    bptt_chunk_length: 16

    actor_hidden_dim: 64
    critic_hidden_dim: 128
    actor_num_layers: 2
    critic_num_layers: 2

    actor_lr: 0.0003
    critic_lr: 0.0003

    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    rollout_buffer_size: 256
    num_epochs: 4
    max_grad_norm: 0.5

    entropy_coef: 0.03  # flat (no decay) — arrests the recurrent continuous collapse

    sensory_modules:
      - food_chemotaxis  # Auto-translated to food_chemotaxis_klinotaxis by env-sensing mode
      - proprioception   # Heading context so the brain can correlate dC/dt with movement

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02

satiety:
  initial_satiety: 200.0
  satiety_decay_rate: 1.0
  satiety_gain_per_food: 0.2

environment:
  env_type: continuous_2d
  continuous:
    world_size_mm: 20.0
    body_length_mm: 1.0
    max_step_mm: 1.0
    capture_radius_mm: 1.0
    sweep_amplitude_mm: 0.5

  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 5
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0
