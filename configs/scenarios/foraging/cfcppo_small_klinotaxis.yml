# Klinotaxis Sensing - CfC (Liquid / Neural Circuit Policy) PPO Brain - Dynamic Foraging Environment - Small Configuration
# CfC + AutoNCP continuous-time recurrent PPO with biologically-plausible klinotaxis (head-sweep) sensing
#
# Architecture: Features → LayerNorm → CfC(AutoNCP, units=32) → motor logits * logit_scale / Critic MLP (detached h)
# Training: Chunk-based truncated BPTT with separate actor/critic optimizers
#
# Sensing mode: klinotaxis (Mode C)
#   - Agent receives scalar concentration + lateral gradient + dC/dt (rate of change)
#   - Head sweep provides spatial gradient; STAM provides dC/dt with movement
#
# STAM auto-enabled by klinotaxis mode for temporal history

max_steps: 1000  # Temporal sensing needs more steps
brain:
  name: cfcppo
  config:
    # CfC + AutoNCP recurrent core
    units: 32
    ncp_sparsity: 0.5
    cfc_mode: default
    bptt_chunk_length: 64

    # Actor head: motor-direct (NCP-authentic) with a learnable logit temperature
    actor_head: motor
    motor_logit_scale_init: 1.0

    # Critic MLP
    critic_hidden_dim: 64
    critic_num_layers: 2

    # Separate learning rates (flat — no schedule)
    actor_lr: 0.0003
    critic_lr: 0.0003

    # PPO hyperparameters
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    entropy_coef: 0.01
    rollout_buffer_size: 512
    num_epochs: 4
    max_grad_norm: 0.5

    sensory_modules:
      - food_chemotaxis  # Auto-translated to food_chemotaxis_klinotaxis
      - proprioception   # Heading direction — critical for correlating dC/dt with movement

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02

satiety:
  initial_satiety: 400.0
  satiety_decay_rate: 1.0
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis  # Mode C: scalar + lateral gradient + dC/dt
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 5
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0
