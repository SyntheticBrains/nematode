# Connectome-PPO klinotaxis foraging — low-entropy variant for R2b
# late-training-regression diagnostic.
#
# Identical to ``connectomeppo_small_klinotaxis.yml`` except entropy_coef is
# 0.005 (1/4 of the original 0.02). Purpose: test whether the
# late-training success-rate drop observed in R2 (ep 450-499 fell to
# 76%) is driven by constant-entropy exploration occasionally knocking
# the policy off its converged attractor. If success rate at ep 450-499
# stays ≥ 90% under low-entropy, the regression is hyperparameter-driven
# (entropy schedule fix); if it still drops, the cause lies elsewhere.

max_steps: 500
brain:
  name: connectomeppo
  config:
    seed: 2026
    connectome_source: cook_2019_hermaphrodite
    enable_gap_junctions: true
    chemical_mask_mode: strict
    sensing_mode: klinotaxis
    forward_pass_depth: 4
    freeze_updates: false

    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    entropy_coef: 0.005  # 1/4 of R2 — diagnostic for late-training regression
    learning_rate: 0.001
    rollout_buffer_size: 256
    num_epochs: 10
    num_minibatches: 2
    max_grad_norm: 0.5

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02

satiety:
  initial_satiety: 200.0
  satiety_decay_rate: 1.0
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 5
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0
