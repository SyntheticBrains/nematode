# ConnectomePPO continuous-action klinotaxis foraging on the continuous-2D substrate.
#
# Continuous-action counterpart of ``connectomeppo_small_klinotaxis.yml``: the
# same Cook-2019 connectome topology (strict chemical mask + fixed gap junctions)
# + klinotaxis sensing, but on the continuous-2D environment
# (``env_type: continuous_2d``) with the continuous tanh-squashed Gaussian action
# head (``action_mode: continuous``). The motor readout maps the 4 motor classes
# to the 2-D Gaussian mean; the strict-mask / gap junctions are upstream of the
# readout and unchanged. The brain emits a normalized ``(speed, turn)`` vector;
# the environment rescales it to physical mm / radians.
#
# Tuning note: entropy_coef is set to 0.03 (vs the discrete klinotaxis lock of
# 0.005) because continuous policies collapse under low entropy (see the
# continuous-2d-action-heads evaluation R1-R4). This is an UNTUNED starting point
# — a proper multi-seed connectome-continuous tune is deferred to the Gate-2
# floor-check / evaluation campaign.

max_steps: 400  # continuous-2D klinotaxis; shorter than the grid baseline for a fast signal
brain:
  name: connectomeppo
  config:
    action_mode: continuous  # tanh-squashed Gaussian (speed, turn) head

    connectome_source: cook_2019_hermaphrodite
    enable_gap_junctions: true
    chemical_mask_mode: strict
    sensing_mode: klinotaxis  # 3-feature head-sweep input
    forward_pass_depth: 4
    freeze_updates: false

    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    entropy_coef: 0.03  # higher than the discrete lock (0.005) — continuous collapses at low entropy
    learning_rate: 0.001
    rollout_buffer_size: 256
    num_epochs: 10
    num_minibatches: 2
    max_grad_norm: 0.5

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02

satiety:
  initial_satiety: 200.0
  satiety_decay_rate: 1.0
  satiety_gain_per_food: 0.2

environment:
  env_type: continuous_2d
  continuous:
    world_size_mm: 20.0
    body_length_mm: 1.0
    max_step_mm: 1.0
    capture_radius_mm: 1.0
    sweep_amplitude_mm: 0.5

  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 5
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0
