# MLPPPO continuous-action klinotaxis foraging on the continuous-2D substrate with
# the env-fidelity upgrades enabled:
#   - static signal-specific Fick-shaped gradient geometry (``gradient_field_mode: fick``;
#     the Gaussian kernel exp(-(r/L)^2) with diffusion length L = gradient_decay_constant),
#   - the adaptive-threshold / biphasic chemosensory sensor
#     (``adaptive_chemosensor_*``): fold-change coding on the derivative/turning channel
#     ((dC/dt)/(C+eps)), the literature-faithful hyper-Weber readout.
#
# Calibrated for T7 (T7.prep.foraging_calibration; forensics in
# tmp/evaluations/t7-continuous-prep/ -> T7 logbook):
#   - adaptive_chemosensor_epsilon: 0.1 (NOT the 0.001 default — at 0.001 the
#     (dC/dt)/(C+eps) readout amplifies ~1000x at C~0 and foraging collapses; 0.1
#     forages on par with tanh). NB adaptive_chemosensor_alpha is a no-op under the
#     fold_change readout (the background it controls is only used by `contrast`).
#   - capture_radius_mm: 2.0 — body/patch scale (a ~4 mm bacterial patch, more
#     faithful than a 1 mm point). The Fick Gaussian has a flat top (near-zero
#     gradient at the source), so a 1 mm point-capture is unlearnable; patch-scale
#     capture lets the worm capture where the field still has gradient. Lifts MLP
#     ~3x (n=10 median 0.63) and connectome ~2.2x (0.64, tight), keeping the
#     high-fidelity Fick + adaptive substrate.
# C1 foraging convergence recipe (T7.*.c1_foraging). The collect-all-10 task converges to ~100%
# per-seed success with a SIMPLE recipe once the continuous reward is metric-coherent (the
# fix-continuous-distance-reward-metric / -predator-mechano-channel / -sensing-float-position
# changes):
#   - max_steps 800 + forage-to-survive satiety (init 300 / decay 0.8 / gain 20): budget + hunger
#     pressure to collect the full 10 (target 10 is a survival/budget task, not a learning wall);
#   - gamma 0.99 + learning_rate 0.0003 (PPO defaults): the corrected reward removes the spurious
#     per-step reward that previously inflated returns, so the long-horizon discount (0.999) and
#     low lr (5e-5) that earlier compensated for it are NOT needed — gamma 0.99 matches the T4 grid
#     runs (cleaner cross-regime comparison);
#   - entropy_coef 0.05 + max_turn_rad 0.5 (~29deg/step, biologically realistic turn bound).
# n=4 on the corrected reward: MLP ~99% / Transformer 100% / LSTM 100% / CfC ~91% per-seed success.

max_steps: 800
brain:
  name: mlpppo
  config:
    action_mode: continuous  # tanh-squashed Gaussian (speed, turn) head

    actor_hidden_dim: 64
    critic_hidden_dim: 64
    num_hidden_layers: 2

    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    # PPO defaults suffice on the metric-coherent reward (see header): gamma 0.99 + lr 0.0003,
    # no long-horizon / low-lr stabilisation needed. entropy 0.05 (klinotaxis benefits from
    # sustained exploration; pairs with the max_turn_rad 0.5 turn bound).
    entropy_coef: 0.05
    learning_rate: 0.0003
    rollout_buffer_size: 256
    num_epochs: 10
    num_minibatches: 2
    max_grad_norm: 0.5

    sensory_modules:
      - food_chemotaxis
      - proprioception

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02

satiety:
  # Forage-to-survive over the episode (see header): hungry start + food sustains life so the
  # worm must keep foraging to reach the full target.
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 20.0

environment:
  env_type: continuous_2d
  continuous:
    world_size_mm: 20.0
    body_length_mm: 1.0
    max_step_mm: 1.0
    capture_radius_mm: 2.0  # body/patch scale (calibrated — see header)
    sweep_amplitude_mm: 0.5
    max_turn_rad: 0.5  # ~29deg/step — biologically realistic turn bound (env default; explicit here)

  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1
    # Adaptive chemosensory sensor: fold-change on the derivative channel.
    adaptive_chemosensor_enabled: true
    adaptive_chemosensor_readout: fold_change
    adaptive_chemosensor_alpha: 0.1  # no-op under fold_change (only `contrast` uses the background)
    adaptive_chemosensor_epsilon: 0.1  # calibrated (0.001 collapses foraging — see header)

  foraging:
    foods_on_grid: 5
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    # Static Fick-shaped gradient geometry (Gaussian kernel, L = decay).
    gradient_field_mode: fick
    gradient_decay_constant: 8.0
    gradient_strength: 1.0
