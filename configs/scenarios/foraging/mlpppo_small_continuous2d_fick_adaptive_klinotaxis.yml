# MLPPPO continuous-action klinotaxis foraging on the continuous-2D substrate with
# the env-fidelity upgrades enabled:
#   - static signal-specific Fick-shaped gradient geometry (``gradient_field_mode: fick``;
#     the Gaussian kernel exp(-(r/L)^2) with diffusion length L = gradient_decay_constant),
#   - the adaptive-threshold / biphasic chemosensory sensor
#     (``adaptive_chemosensor_*``): fold-change coding on the derivative/turning channel
#     ((dC/dt)/(C+eps)), the literature-faithful hyper-Weber readout.
#
# Continuous-action PPO needs a higher entropy_coef (~0.10) than the discrete grid to
# keep the tanh-Gaussian log_std off the clamp floor. The readout / adaptation rate
# are single-seed reference values here and warrant multi-seed tuning.

max_steps: 400
brain:
  name: mlpppo
  config:
    action_mode: continuous  # tanh-squashed Gaussian (speed, turn) head

    actor_hidden_dim: 64
    critic_hidden_dim: 64
    num_hidden_layers: 2

    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    entropy_coef: 0.1  # continuous needs higher entropy than discrete
    learning_rate: 0.001
    rollout_buffer_size: 256
    num_epochs: 10
    num_minibatches: 2
    max_grad_norm: 0.5

    sensory_modules:
      - food_chemotaxis
      - proprioception

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02

satiety:
  initial_satiety: 200.0
  satiety_decay_rate: 1.0
  satiety_gain_per_food: 0.2

environment:
  env_type: continuous_2d
  continuous:
    world_size_mm: 20.0
    body_length_mm: 1.0
    max_step_mm: 1.0
    capture_radius_mm: 1.0
    sweep_amplitude_mm: 0.5

  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1
    # Adaptive chemosensory sensor: fold-change on the derivative channel.
    adaptive_chemosensor_enabled: true
    adaptive_chemosensor_readout: fold_change
    adaptive_chemosensor_alpha: 0.1
    adaptive_chemosensor_epsilon: 0.001

  foraging:
    foods_on_grid: 5
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    # Static Fick-shaped gradient geometry (Gaussian kernel, L = decay).
    gradient_field_mode: fick
    gradient_decay_constant: 8.0
    gradient_strength: 1.0
