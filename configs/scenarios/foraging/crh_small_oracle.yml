# Dynamic Foraging Environment - Small Configuration
# Uses CRH (Classical Reservoir Hybrid) brain architecture
# Fixed ESN reservoir + PPO-trained classical readout

max_steps: 500
brain:
  name: crh
  config:
    # ESN reservoir parameters
    num_reservoir_neurons: 10
    reservoir_depth: 3
    reservoir_seed: 42
    spectral_radius: 0.9
    input_connectivity: sparse
    input_scale: 1.0

    # Feature channels (ablation mode matching QRH)
    feature_channels:
      - raw
      - cos_sin
      - pairwise

    # Readout architecture (actor + critic)
    readout_hidden_dim: 64
    readout_num_layers: 2

    # PPO hyperparameters
    actor_lr: 0.0005
    critic_lr: 0.0005
    gamma: 0.99
    gae_lambda: 0.95
    ppo_clip_epsilon: 0.2
    ppo_epochs: 6
    ppo_minibatches: 2
    ppo_buffer_size: 256
    entropy_coeff: 0.02
    value_loss_coef: 0.5
    max_grad_norm: 0.5

    # LR warmup
    lr_warmup_episodes: 30
    lr_warmup_start: 0.00005

    sensory_modules:
      - food_chemotaxis
      - nociception

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02

satiety:
  initial_satiety: 200.0
  satiety_decay_rate: 1.0
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]

  foraging:
    foods_on_grid: 5
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0
