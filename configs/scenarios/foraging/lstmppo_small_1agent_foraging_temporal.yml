# Single-Agent Foraging — Temporal Mode, 20x20 Baseline
# LSTM PPO GRU with temporal chemotaxis + STAM
# Environment params match multi-agent temporal competition configs exactly
# Phase 4 evaluation Campaign B2: single-agent temporal ceiling

max_steps: 300
brain:
  name: lstmppo
  config:
    hidden_dim: 64
    rnn_type: gru
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    entropy_coef: 0.02
    learning_rate: 0.001
    chunk_length: 16
    rollout_buffer_size: 512
    num_epochs: 10
    max_grad_norm: 0.5
    sensory_modules:
      - food_chemotaxis_temporal
      - stam

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02

satiety:
  initial_satiety: 200.0
  satiety_decay_rate: 1.0
  satiety_gain_per_food: 0.2

sensing:
  chemotaxis_mode: temporal
  stam_enabled: true
  stam_buffer_size: 32
  stam_decay_rate: 0.05

environment:
  grid_size: 20
  viewport_size: [11, 11]

  foraging:
    foods_on_grid: 3
    target_foods_to_collect: 10
    min_food_distance: 2
    agent_exclusion_radius: 2
    gradient_decay_constant: 4.0
    gradient_strength: 1.0
