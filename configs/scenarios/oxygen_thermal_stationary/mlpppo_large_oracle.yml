# MLPPPO with Aerotaxis + Thermotaxis + Stationary Predators - Large Configuration
# Combined oxygen + temperature sensing with stationary predator avoidance
#
# This is a multi-objective task combining:
# - Food collection (chemotaxis)
# - Predator avoidance (nociception + mechanosensation)
# - Scattered temperature zones (thermotaxis)
# - Oxygen gradient with localized anomalies (aerotaxis)
#
# Dual environmental gradients (orthogonal):
# - Temperature increases eastward (0.0 rad) — thermotaxis (AFD neurons)
# - Oxygen increases northward (pi/2 rad) — aerotaxis (URX, AQR, PQR neurons)
#
# Stationary predators act as toxic zones with larger damage radius.
# Temperature and oxygen zones create additional navigation constraints.
#
# Temperature zone layout (aligned with thermal baselines):
# - Hot zones: right-center (75,50), top-left (25,75), top-right (80,80)
# - Cold zones: bottom-left (25,25), bottom-right (75,25), top-center (50,85)
#
# Oxygen field layout:
# - Background gradient: O2 increases northward at 0.08%/cell
# - High oxygen spot: (80, 50) — ventilation point
# - Low oxygen spot: (30, 30) — bacterial consumption sink
#
# Large environment (100x100 grid):
# - 5 stationary predators spread across the grid
#
# Sensory modules (C. elegans neuron references):
# - food_chemotaxis: Food-specific attraction (AWC, AWA neurons)
# - thermotaxis: Temperature sensing (AFD neurons)
# - aerotaxis: Oxygen sensing (URX, AQR, PQR neurons)
# - nociception: Predator avoidance (ASH, ADL neurons)
# - mechanosensation: Physical contact (ALM, PLM, AVM neurons)

max_steps: 2000
brain:
  name: mlpppo
  config:
    actor_hidden_dim: 256
    critic_hidden_dim: 256
    num_hidden_layers: 4
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    entropy_coef: 0.02
    learning_rate: 0.001
    rollout_buffer_size: 1024
    num_epochs: 10
    num_minibatches: 4
    max_grad_norm: 0.5
    normalize_advantages: true
    lr_warmup_episodes: 50
    lr_warmup_start: 0.0001
    lr_decay_episodes: 300
    lr_decay_end: 0.0001
    sensory_modules:
      - food_chemotaxis
      - thermotaxis
      - aerotaxis
      - nociception
      - mechanosensation

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.3
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_temperature_proximity: 0.0
  penalty_health_damage: 0.3
  reward_health_gain: 0.2

satiety:
  initial_satiety: 800.0
  satiety_decay_rate: 1.0
  satiety_gain_per_food: 0.2

environment:
  grid_size: 100
  viewport_size: [11, 11]

  foraging:
    foods_on_grid: 45
    target_foods_to_collect: 25
    min_food_distance: 8
    agent_exclusion_radius: 12
    gradient_decay_constant: 12.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 5
    speed: 0.0
    movement_pattern: stationary
    detection_radius: 8
    damage_radius: 4
    gradient_decay_constant: 5.0
    gradient_strength: 1.2

  health:
    max_hp: 150.0
    predator_damage: 10.0
    food_healing: 15.0

  thermotaxis:
    enabled: true
    cultivation_temperature: 20.0
    base_temperature: 20.0     # Temperature at grid center (spawn point)
    gradient_direction: 0.0    # Temperature increases to the right
    gradient_strength: 0.15    # Mild background gradient
    hot_spots:
      - [75, 50, 25.0]   # Right-center: +25C intensity (up to 45C)
      - [25, 75, 20.0]   # Upper-left: +20C intensity (up to 40C)
      - [80, 80, 22.0]   # Upper-right: +22C intensity (up to 42C)
    cold_spots:
      - [25, 25, 25.0]   # Lower-left: -25C intensity (down to -5C)
      - [75, 25, 20.0]   # Lower-right: -20C intensity (down to 0C)
      - [50, 85, 18.0]   # Top-center: -18C intensity (down to 2C)
    spot_decay_constant: 6.5
    # Rewards/penalties
    comfort_reward: 0.0        # MUST stay 0 (prevents freeze behavior)
    discomfort_penalty: -0.05
    danger_penalty: -0.5
    reward_discomfort_food: 0.3
    # HP damage
    danger_hp_damage: 0.5
    lethal_hp_damage: 6.0
    # Zone thresholds
    comfort_delta: 5.0         # Comfort: 15-25C
    discomfort_delta: 10.0     # Discomfort: 10-15C or 25-30C
    danger_delta: 15.0         # Danger: 5-10C or 30-35C

  aerotaxis:
    enabled: true
    base_oxygen: 10.0            # O2% at grid center (spawn point)
    gradient_direction: 1.5708   # O2 increases northward — orthogonal to temperature
    gradient_strength: 0.08      # 0.08 O2% per cell from center
    high_oxygen_spots:
      - [80, 50, 6.0]           # Ventilation point: +6% O2
    low_oxygen_spots:
      - [30, 30, 5.0]           # Bacterial consumption sink: -5% O2
    spot_decay_constant: 6.0
    comfort_reward: 0.0
    danger_penalty: -0.5
    danger_hp_damage: 0.5
    lethal_hp_damage: 6.0
