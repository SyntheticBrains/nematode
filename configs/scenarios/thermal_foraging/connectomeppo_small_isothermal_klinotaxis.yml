# Connectome-PPO isothermal-foraging configuration (klinotaxis sensing).
#
# Thermotaxis control/baseline for the connectome substrate: the env has
# thermotaxis sensing enabled but with NO temperature gradient
# (gradient_strength: 0.0), so the agent forages without thermal
# navigation pressure. Establishes that the connectome thermotaxis_gains
# projection (AFDL/AFDR, enable_thermotaxis_projection: true) does not
# harm foraging when the temperature signal is uninformative — the
# isothermal control for the connectome row's thermotaxis cell.
#
# The env emits the klinotaxis head-sweep temperature features
# (temp_deviation + lateral + dT/dt) under thermotaxis_mode: klinotaxis,
# and the connectome brain consumes them via the (3, 2) thermotaxis_gains
# matrix onto the AFD thermosensory pair.
#
# Mirrors the env shape of
# configs/scenarios/thermal_foraging/mlpppo_small_isothermal_oracle.yml
# (isothermal thermotaxis block) with the connectome brain + klinotaxis
# sensing in place of the MLPPPO oracle brain.

max_steps: 500
brain:
  name: connectomeppo
  config:
    seed: 2026
    connectome_source: cook_2019_hermaphrodite
    enable_gap_junctions: true
    chemical_mask_mode: strict
    sensing_mode: klinotaxis  # 3-feature head-sweep food input
    enable_thermotaxis_projection: true  # routes temperature onto AFDL/AFDR
    forward_pass_depth: 4
    freeze_updates: false
    entropy_coef: 0.005  # canonical low-entropy lock (logbook 023 R2b)

    # PPO hyperparameters (mirror the connectome klinotaxis foraging baseline).
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    learning_rate: 0.001
    rollout_buffer_size: 256
    num_epochs: 10
    num_minibatches: 2
    max_grad_norm: 0.5

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.3
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_temperature_proximity: 0.0
  penalty_health_damage: 0.5
  reward_health_gain: 0.1

satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    thermotaxis_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 6
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0

  health:
    max_hp: 100.0
    predator_damage: 0.0
    food_healing: 5.0

  thermotaxis:
    enabled: true
    cultivation_temperature: 20.0
    base_temperature: 20.0  # Temperature at grid center (spawn point)
    gradient_direction: 0.0
    gradient_strength: 0.0  # ISOTHERMAL: no temperature gradient
    comfort_reward: 0.05    # Always in comfort zone with no gradient
    discomfort_penalty: -0.1
    danger_penalty: -0.3
    danger_hp_damage: 2.0
    lethal_hp_damage: 10.0
    comfort_delta: 5.0       # Comfort: 15-25°C
    discomfort_delta: 10.0   # Discomfort: 10-15°C or 25-30°C
    danger_delta: 15.0       # Danger: 5-10°C or 30-35°C
