# MLPPPO continuous-2D THERMOTAXIS-dominant cell for real-worm behavioural-thermotaxis validation.
#
# The thermal analogue of the food-only klinotaxis cell used for chemotaxis validation (Logbook 035).
# The spawn (grid centre) is BELOW the cultivation temperature Tc, so the worm must migrate toward the
# Tc comfort band — a bidirectional thermotaxis assay (cold to the left, hot to the right, comfort a
# narrow interior band). Foraging is kept as a reason to keep moving; the captured drive is the
# homeostatic thermal setpoint error (capture_behaviour_modality: thermotaxis), so the same
# klinokinesis/weathervane metrics grade it. Difficulty is a first draft — calibrated at the smoke.

max_steps: 800
brain:
  name: mlpppo
  config:
    action_mode: continuous
    actor_hidden_dim: 64
    critic_hidden_dim: 64
    num_hidden_layers: 2
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    entropy_coef: 0.05
    learning_rate: 0.0003
    rollout_buffer_size: 256
    num_epochs: 10
    num_minibatches: 2
    max_grad_norm: 0.5
    sensory_modules:
    - food_chemotaxis
    - thermotaxis
    - proprioception
reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_temperature_proximity: 0.0
  penalty_health_damage: 0.0
  reward_health_gain: 0.1
satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 20.0
environment:
  env_type: continuous_2d
  continuous:
    world_size_mm: 20.0
    body_length_mm: 1.0
    max_step_mm: 1.0
    capture_radius_mm: 2.0
    sweep_amplitude_mm: 0.5
    max_turn_rad: 0.5
  viewport_size:
  - 11
  - 11
  sensing:
    chemotaxis_mode: klinotaxis
    thermotaxis_mode: derivative
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1
    adaptive_chemosensor_enabled: true
    adaptive_chemosensor_readout: fold_change
    adaptive_chemosensor_alpha: 0.1
    adaptive_chemosensor_epsilon: 0.1
    capture_behaviour: true
    capture_behaviour_modality: thermotaxis
  foraging:
    foods_on_grid: 5
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_field_mode: fick
    gradient_decay_constant: 8.0
    gradient_strength: 1.0
  health:
    max_hp: 100.0
    predator_damage: 0.0
    food_healing: 5.0
  thermotaxis:
    # Seeking, survivable: base (centre/spawn) 16 °C is below Tc 20 °C; a gentle linear gradient
    # (0.6 °C/mm along +x, centre-relative) makes the Tc comfort band interior/right-of-centre while
    # keeping the whole arena survivable (no thermal HP damage — the thermal drive is reward-based,
    # comfort_reward, not survival, so an untrained worm can explore + learn rather than die). The
    # worm forages (continuous motion) while biased toward the Tc band.
    enabled: true
    cultivation_temperature: 20.0
    base_temperature: 16.0
    gradient_direction: 0.0
    gradient_strength: 0.6
    # Thermal-DOMINANT: a strong discomfort penalty makes every off-comfort step costly, so the
    # worm's foraging excursions curve hard back toward the Tc band (the thermal drive owns the
    # mean-turn) — the food (scattered across the gradient) is only the reason to keep moving. Narrow
    # comfort band (delta 2) so "comfort" is a specific target to track. Still no thermal HP damage.
    comfort_reward: 0.15
    discomfort_penalty: -0.1
    danger_penalty: 0.0
    reward_discomfort_food: 0.0
    danger_hp_damage: 0.0
    lethal_hp_damage: 0.0
    comfort_delta: 2.0
    discomfort_delta: 8.0
    danger_delta: 15.0
