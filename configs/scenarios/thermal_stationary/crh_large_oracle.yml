# CRH with Thermotaxis + Stationary Predators - Large Configuration (Ablation Mode)
# Quantum ablation control: matches QRH stationary config with classical ESN reservoir
# Uses CRH (Classical Reservoir Hybrid) brain architecture
#
# Domingo confound control: input_encoding=trig applies sin/cos pre-encoding
# to match QRH's trigonometric gate encoding (RY/RZ(feature*π)), isolating
# whether QRH's advantage comes from quantum dynamics or input encoding.
# See Domingo et al. (2021) "Nonlinear input transformations are ubiquitous in QRC"
#
# This is the CRH ablation counterpart to qrh_thermotaxis_stationary_predators_large.yml.
# Combined with the pursuit predator ablation, this creates a 2×2 comparison matrix:
# - QRH vs CRH × pursuit vs stationary predators
#
# Ablation design: N=10 neurons with [raw, cos_sin, pairwise] channels
# Feature dim: 10 + 20 + 45 = 75 (exact match to QRH's 3*10 + C(10,2) = 75)
#
# Sparse connectivity matches QRH's sensory qubit pattern:
# - 7 sensory neurons receive direct input (food_chemotaxis + nociception + thermotaxis)
# - 3 reservoir-only neurons receive signal exclusively through W_res
#
# Module feature breakdown:
# - food_chemotaxis: 2 features (strength, angle)
# - nociception: 2 features (strength, angle)
# - thermotaxis: 3 features (strength, angle, temp_deviation)
# Total: 7 features -> 7 sensory neurons, 3 reservoir-only neurons

max_steps: 2000
brain:
  name: crh
  config:
    # ESN reservoir parameters (10 neurons: 7 sensory + 3 reservoir-only)
    num_reservoir_neurons: 10
    reservoir_depth: 3
    reservoir_seed: 42
    spectral_radius: 0.9
    input_connectivity: sparse
    input_scale: 1.0
    input_encoding: trig              # Domingo confound control: match QRH's trig encoding

    # Feature channels: ablation mode matching QRH's 75-feature output
    feature_channels:
      - raw
      - cos_sin
      - pairwise

    # Readout architecture (actor + critic) — 128 to match 75-feature input
    readout_hidden_dim: 128
    readout_num_layers: 2

    # PPO hyperparameters (matched to QRH)
    actor_lr: 0.0005
    critic_lr: 0.0005
    gamma: 0.99
    gae_lambda: 0.95
    ppo_clip_epsilon: 0.2
    ppo_epochs: 10
    ppo_minibatches: 2
    ppo_buffer_size: 512
    entropy_coeff: 0.015
    value_loss_coef: 0.5
    max_grad_norm: 0.5

    # LR schedule
    lr_warmup_episodes: 30
    lr_warmup_start: 0.00005
    lr_decay_episodes: 1200
    lr_decay_end: 0.0001

    # Entropy decay
    entropy_coeff_end: 0.008
    entropy_decay_episodes: 1800

    # Unified sensory modules for triple-objective task
    sensory_modules:
      - food_chemotaxis
      - nociception
      - thermotaxis

    # Sensory neurons (7 features = 7 sensory, 3 reservoir-only remaining)
    num_sensory_neurons: 7

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.4
  penalty_temperature_proximity: 0.3
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.3
  reward_health_gain: 0.2

satiety:
  initial_satiety: 800.0
  satiety_decay_rate: 1.0
  satiety_gain_per_food: 0.2

environment:
  grid_size: 100
  viewport_size: [11, 11]

  foraging:
    foods_on_grid: 45
    target_foods_to_collect: 25
    min_food_distance: 8
    agent_exclusion_radius: 12
    gradient_decay_constant: 12.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 5
    speed: 0.0
    movement_pattern: stationary
    detection_radius: 8
    damage_radius: 4
    gradient_decay_constant: 5.0
    gradient_strength: 1.2

  health:
    max_hp: 150.0
    predator_damage: 10.0
    food_healing: 15.0

  thermotaxis:
    enabled: true
    cultivation_temperature: 20.0
    base_temperature: 20.0
    gradient_direction: 0.0
    gradient_strength: 0.15
    hot_spots:
      - [75, 50, 25.0]   # Right-center: +25°C intensity (up to 45°C)
      - [25, 75, 20.0]   # Upper-left: +20°C intensity (up to 40°C)
      - [80, 80, 22.0]   # Upper-right: +22°C intensity (up to 42°C)
    cold_spots:
      - [25, 25, 25.0]   # Lower-left: -25°C intensity (down to -5°C)
      - [75, 25, 20.0]   # Lower-right: -20°C intensity (down to 0°C)
      - [50, 85, 18.0]   # Top-center: -18°C intensity (down to 2°C)
    spot_decay_constant: 6.5
    comfort_reward: 0.0
    discomfort_penalty: -0.05
    danger_penalty: -0.5
    reward_discomfort_food: 0.3
    danger_hp_damage: 0.5
    lethal_hp_damage: 6.0
    comfort_delta: 5.0
    discomfort_delta: 10.0
    danger_delta: 15.0
