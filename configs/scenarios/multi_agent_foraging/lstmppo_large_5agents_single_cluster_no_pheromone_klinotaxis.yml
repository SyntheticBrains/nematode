# Multi-Agent Klinotaxis — Single Food Cluster Discovery, No Pheromones (Control)
# LSTM PPO GRU with Phase 3 proven brain hyperparams
#
# KEY DESIGN: 5 food items tightly clustered on 100x100 grid. No respawn.
# Target = 1 food per agent. First agent to discover the cluster eats 1 item
# and emits a pheromone trail. The remaining 4 agents can follow the trail
# to find the 4 remaining items.
#
# This isolates the "collective discovery" value of pheromones:
# - WITHOUT pheromones: each agent searches independently
# - WITH pheromones: first discoverer guides others via chemical trail
#
# Very short food gradient (decay=2.0) — food detectable within ~8 cells.
# Pheromone trail (decay=8.0) — detectable within ~24 cells.
# Most of the 100x100 grid has NO food signal.

max_steps: 1500
brain:
  name: lstmppo
  config:
    rnn_type: gru
    lstm_hidden_dim: 64
    bptt_chunk_length: 16
    actor_hidden_dim: 64
    critic_hidden_dim: 128
    actor_num_layers: 2
    critic_num_layers: 2
    actor_lr: 0.0003
    critic_lr: 0.0003
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    rollout_buffer_size: 512
    num_epochs: 4
    max_grad_norm: 0.5
    entropy_coef: 0.02
    entropy_coef_end: 0.005
    entropy_decay_episodes: 800
    lr_warmup_episodes: 50
    lr_warmup_start: 0.00003
    lr_decay_episodes: 1500
    lr_decay_end: 0.00003
    sensory_modules:
      - food_chemotaxis
      - proprioception
      - stam

body_length: 2

multi_agent:
  enabled: true
  count: 5
  food_competition: first_arrival
  social_detection_radius: 5
  termination_policy: freeze
  min_agent_distance: 10

reward:
  reward_goal: 5.0
  reward_distance_scale: 0.5
  reward_exploration: 0.1
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02

satiety:
  initial_satiety: 800.0
  satiety_decay_rate: 0.5
  satiety_gain_per_food: 0.5

environment:
  grid_size: 100
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 5
    target_foods_to_collect: 1
    min_food_distance: 1
    agent_exclusion_radius: 3
    gradient_decay_constant: 2.0
    gradient_strength: 1.0
    food_hotspots:
      - [50, 50, 1.0]
    food_hotspot_bias: 1.0
    food_hotspot_decay: 2.0
    no_respawn: true


  social_feeding:
    enabled: true
    decay_reduction: 0.7
    solitary_decay: 1.0
