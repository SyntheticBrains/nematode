# Multi-Agent Klinotaxis + Hotspots — 5 Agents, No Pheromones (Control)
# LSTM PPO GRU with Phase 3 proven brain hyperparams
# Food-marking pheromone evaluation Campaign H3: hotspot baseline without pheromones
#
# No pheromone modules — tests pure hotspot + satiety gate effect
# Comparison with H1 shows total pheromone contribution

max_steps: 1000
brain:
  name: lstmppo
  config:
    rnn_type: gru
    lstm_hidden_dim: 64
    bptt_chunk_length: 16
    actor_hidden_dim: 64
    critic_hidden_dim: 128
    actor_num_layers: 2
    critic_num_layers: 2
    actor_lr: 0.0003
    critic_lr: 0.0003
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    rollout_buffer_size: 512
    num_epochs: 4
    max_grad_norm: 0.5
    entropy_coef: 0.02
    entropy_coef_end: 0.005
    entropy_decay_episodes: 800
    lr_warmup_episodes: 50
    lr_warmup_start: 0.00003
    lr_decay_episodes: 1500
    lr_decay_end: 0.00003
    sensory_modules:
      - food_chemotaxis
      - proprioception
      - stam

body_length: 2

multi_agent:
  enabled: true
  count: 5
  food_competition: first_arrival
  social_detection_radius: 5
  termination_policy: freeze
  min_agent_distance: 5

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02

satiety:
  initial_satiety: 600.0
  satiety_decay_rate: 1.0
  satiety_gain_per_food: 0.15

environment:
  grid_size: 50
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 25
    target_foods_to_collect: 40
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 10.0
    gradient_strength: 1.0
    food_hotspots:
      - [12, 12, 1.0]
      - [38, 38, 1.0]
      - [12, 38, 0.5]
    food_hotspot_bias: 0.8
    food_hotspot_decay: 8.0
    satiety_food_threshold: 0.8

  social_feeding:
    enabled: true
    decay_reduction: 0.7
    solitary_decay: 1.0
