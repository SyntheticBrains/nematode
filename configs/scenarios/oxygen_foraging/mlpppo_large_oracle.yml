# MLPPPO with Aerotaxis + Foraging - Large Configuration
# Curriculum level 3: Large-scale foraging with oxygen gradient and localized O2 anomalies
#
# Oxygen field layout:
# - Background gradient: O2 increases northward (pi/2 rad) at 0.08%/cell
# - High oxygen spot: (80, 50) — ventilation point
# - Low oxygen spot: (30, 30) — bacterial consumption sink
#
# Large environment (100x100 grid):
# - Complex oxygen landscape with gradient + spots
# - Agent must navigate toward preferred O2 while collecting food
#
# Sensory modules (C. elegans neuron references):
# - food_chemotaxis: Food-specific attraction (AWC, AWA neurons)
# - aerotaxis: Oxygen sensing (URX, AQR, PQR neurons)

max_steps: 2000
brain:
  name: mlpppo
  config:
    actor_hidden_dim: 256
    critic_hidden_dim: 256
    num_hidden_layers: 4
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    entropy_coef: 0.02
    learning_rate: 0.001
    rollout_buffer_size: 1024
    num_epochs: 10
    num_minibatches: 4
    max_grad_norm: 0.5
    normalize_advantages: true
    lr_warmup_episodes: 50
    lr_warmup_start: 0.0001
    lr_decay_episodes: 300
    lr_decay_end: 0.0001
    sensory_modules:
      - food_chemotaxis
      - aerotaxis

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.3
  reward_health_gain: 0.2

satiety:
  initial_satiety: 1000.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.25

environment:
  grid_size: 100
  viewport_size: [11, 11]

  foraging:
    foods_on_grid: 40
    target_foods_to_collect: 20
    min_food_distance: 8
    agent_exclusion_radius: 12
    gradient_decay_constant: 12.0
    gradient_strength: 1.0

  health:
    max_hp: 150.0
    predator_damage: 0.0
    food_healing: 15.0

  aerotaxis:
    enabled: true
    base_oxygen: 10.0            # O2% at grid center (spawn point)
    gradient_direction: 1.5708   # O2 increases northward (pi/2 radians)
    gradient_strength: 0.08      # 0.08 O2% per cell from center
    # Localized oxygen anomalies: [x, y, intensity]
    high_oxygen_spots:
      - [80, 50, 6.0]           # Ventilation point: +6% O2
    low_oxygen_spots:
      - [30, 30, 5.0]           # Bacterial consumption sink: -5% O2
    spot_decay_constant: 6.0
    # Rewards/penalties
    comfort_reward: 0.0
    danger_penalty: -0.5
    # HP damage
    danger_hp_damage: 0.5
    lethal_hp_damage: 6.0
