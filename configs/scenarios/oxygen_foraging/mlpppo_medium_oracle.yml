# MLPPPO with Aerotaxis + Foraging - Medium Configuration
# Curriculum level 2: Standard foraging with oxygen navigation challenge
#
# Aerotaxis adds oxygen sensing (analogous to C. elegans URX, AQR, PQR neurons):
# - Oxygen level at current position
# - Direction toward preferred oxygen concentration (egocentric)
# - Oxygen gradient strength
#
# Medium environment (50x50 grid):
# - Simple north-south oxygen gradient (0.15 O2%/cell)
# - Base oxygen 10% at grid center
# - No high/low oxygen spots — clean gradient for curriculum learning
#
# Success criteria:
# - Collect target foods while staying in safe oxygen zones
#
# Sensory modules (C. elegans neuron references):
# - food_chemotaxis: Food-specific attraction (AWC, AWA neurons)
# - aerotaxis: Oxygen sensing (URX, AQR, PQR neurons)

max_steps: 1000
brain:
  name: mlpppo
  config:
    actor_hidden_dim: 128
    critic_hidden_dim: 128
    num_hidden_layers: 2
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.98
    value_loss_coef: 0.5
    entropy_coef: 0.02
    learning_rate: 0.001
    rollout_buffer_size: 512
    num_epochs: 20
    num_minibatches: 2
    max_grad_norm: 0.5
    normalize_advantages: true
    lr_warmup_episodes: 50
    lr_warmup_start: 0.0001
    lr_decay_episodes: 200
    lr_decay_end: 0.0001
    sensory_modules:
      - food_chemotaxis
      - aerotaxis

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.3
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.0
  reward_health_gain: 0.1

satiety:
  initial_satiety: 500.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  grid_size: 50
  viewport_size: [11, 11]

  foraging:
    foods_on_grid: 15
    target_foods_to_collect: 20
    min_food_distance: 4
    agent_exclusion_radius: 8
    gradient_decay_constant: 10.0
    gradient_strength: 1.0

  health:
    max_hp: 100.0
    predator_damage: 0.0
    food_healing: 5.0

  aerotaxis:
    enabled: true
    base_oxygen: 10.0            # O2% at grid center (spawn point)
    gradient_direction: 1.5708   # O2 increases northward (pi/2 radians)
    gradient_strength: 0.15      # 0.15 O2% per cell from center
    spot_decay_constant: 6.0
    # Rewards/penalties
    comfort_reward: 0.0
    danger_penalty: -0.3
    # HP damage
    danger_hp_damage: 1.0
    lethal_hp_damage: 8.0
