# Temporal Sensing (Mode A) - LSTM PPO with Aerotaxis + Foraging - Medium Configuration
# Phase 3: LSTM PPO with biologically-honest temporal sensing for oxygen navigation
#
# Architecture: Features -> LayerNorm -> GRU(64) -> Actor MLP / Critic MLP (detached h)
# Training: Chunk-based truncated BPTT with separate actor/critic optimizers
#
# Sensing modes:
#   - chemotaxis: temporal (Mode A) — scalar food concentration only
#   - aerotaxis: temporal (Mode A) — oxygen scalar only (no dO2/dt or direction)
#   - No directional gradients — agent must infer everything from GRU memory
#
# Medium environment (50x50 grid):
# - Simple north-south oxygen gradient (0.30 O2%/cell)
# - Base oxygen 10% at grid center — ~46% of cells in O2 comfort zone
#
# STAM enabled for temporal context

max_steps: 1000
brain:
  name: lstmppo
  config:
    rnn_type: gru
    lstm_hidden_dim: 64
    bptt_chunk_length: 64  # Shorter chunks for medium grid

    # Actor/Critic MLP
    actor_hidden_dim: 128
    critic_hidden_dim: 128
    actor_num_layers: 2
    critic_num_layers: 2

    # Separate learning rates
    actor_lr: 0.0003
    critic_lr: 0.0003

    # PPO hyperparameters
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.98
    value_loss_coef: 0.5
    rollout_buffer_size: 512
    num_epochs: 4
    max_grad_norm: 0.5

    # Entropy decay
    entropy_coef: 0.02
    entropy_coef_end: 0.01
    entropy_decay_episodes: 3000

    # LR schedule (extended for temporal's slower convergence)
    lr_warmup_episodes: 100
    lr_warmup_start: 0.00003
    lr_decay_episodes: 5000
    lr_decay_end: 0.00003

    sensory_modules:
      - food_chemotaxis     # Auto-translated to food_chemotaxis_temporal
      - aerotaxis           # Auto-translated to aerotaxis_temporal
      - proprioception      # Heading direction — critical for temporal sensing

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.3
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.0
  reward_health_gain: 0.1

satiety:
  initial_satiety: 500.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  grid_size: 50
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: temporal     # Mode A: scalar concentration only
    aerotaxis_mode: temporal      # Mode A: oxygen scalar only
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 15
    target_foods_to_collect: 20
    min_food_distance: 4
    agent_exclusion_radius: 8
    gradient_decay_constant: 4.0  # Steeper gradient for temporal detectability
    gradient_strength: 1.0

  health:
    max_hp: 100.0
    predator_damage: 0.0
    food_healing: 5.0

  aerotaxis:
    enabled: true
    base_oxygen: 10.0            # O2% at grid center (spawn point)
    gradient_direction: 1.5708   # O2 increases northward (pi/2 radians)
    gradient_strength: 0.30      # 0.30 O2% per cell from center (~46% comfort zone)
    spot_decay_constant: 6.0
    # Rewards/penalties
    comfort_reward: 0.0
    danger_penalty: -0.3
    # HP damage
    danger_hp_damage: 1.0
    lethal_hp_damage: 8.0
