# Bit-memory delayed-match-to-cue positive control — CFCPPO (liquid net; a memory arm).
#
# See mlpppo_small_bit_memory.yml for the task rationale. The continuous-time recurrent state
# can carry the cue across the delay (span 11 < bptt_chunk_length 64), so this arm is expected
# to beat the memoryless MLP.
max_steps: 230
brain:
  name: cfcppo
  config:
    action_mode: continuous
    units: 32
    ncp_sparsity: 0.5
    cfc_mode: default
    bptt_chunk_length: 64
    actor_head: mlp
    actor_hidden_dim: 64
    actor_num_layers: 2
    critic_hidden_dim: 64
    critic_num_layers: 2
    actor_lr: 0.0003
    critic_lr: 0.0003
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    entropy_coef: 0.01
    rollout_buffer_size: 256
    num_epochs: 4
    max_grad_norm: 0.5
    sensory_modules:
    - cue
    - go_signal
environment:
  env_type: continuous_2d
  bit_memory_task:
    enabled: true
