# M5 co-evolution FULL RUN — 4 seeds, 50 generations, cycling/escalation verdict.
# ============================================================================
#
# Per design.md D4 + the M5 task plan: 4 seeds (42-45) × 50 generations
# (5 K-pair blocks at K=10) per side, prey pop=24, predator pop=16,
# K_per_block=10, generality_probe_every=10. Wall-time target
# ~30-60 hours per seed under sequential dispatch → ~120-240 wall-hours
# total across 4 sequential seeds (4x the design.md D4 estimate, which
# assumed parallel_workers=4 — pool wiring lands in a follow-up).
# Update from pilot result before launching, per task 10.1.
#
# Bootstrap: `predator_gen0_bootstrap` is set here based on the pilot's
# arm A vs arm B result (task 9.4 locks the choice). If pilot evidence
# is inconclusive, default to arm A (heuristic-imitation pretrain) for
# the full run since cold-start risks predator-side fitness collapse
# on the first K-block.
#
# `prey_gen0_seed_path` is templated per seed: the campaign bash
# wrapper substitutes `{seed}` at run time so each of the 4 seeds
# loads its own warmstart anchor — see
# `scripts/campaigns/phase5_m5_coevolution_full.sh` for the
# substitution. The string here is the placeholder template.
#
# Pilot must validate before this config is launched. Verdict gate
# (task 10.4): GO if cycling OR escalation fires in ≥2 of 4 seeds;
# STOP if zero seeds; PIVOT if exactly 1.

max_steps: 1000

brain:
  name: lstmppo
  config:
    rnn_type: gru
    lstm_hidden_dim: 64
    bptt_chunk_length: 16

    actor_hidden_dim: 64
    critic_hidden_dim: 128
    actor_num_layers: 2
    critic_num_layers: 2

    actor_lr: 0.0003
    critic_lr: 0.0003

    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    rollout_buffer_size: 512
    num_epochs: 4
    max_grad_norm: 0.5

    entropy_coef: 0.02
    entropy_coef_end: 0.005
    entropy_decay_episodes: 800

    lr_warmup_episodes: 50
    lr_warmup_start: 0.00003
    lr_decay_episodes: 1500
    lr_decay_end: 0.00003

    sensory_modules:
      - food_chemotaxis
      - nociception
      - mechanosensation
      - proprioception

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.5
  reward_health_gain: 0.1

satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    nociception_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 6
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 2
    speed: 0.5
    movement_pattern: pursuit
    detection_radius: 6
    gradient_decay_constant: 10.0
    gradient_strength: 1.0
    brain_config:
      kind: mlpppo_predator

  health:
    max_hp: 100.0
    predator_damage: 20.0
    food_healing: 10.0

coevolution:
  K_per_block: 10
  generation_pairs: 5  # 5 pairs * 2 sides = 10 K-blocks; per-side gens = 50
  generality_probe_every: 10
  held_out_size: 4
  start_side: prey
  # Default: heuristic-imitation pretrain. Pilot decision (task 9.4)
  # may flip this to `cold_start` if arm B outperformed.
  predator_gen0_bootstrap: heuristic_imitation_pretrain
  # Template path: the bash wrapper substitutes the per-seed file at
  # campaign launch. Placeholder shipped here uses seed_42 to keep the
  # YAML loader happy in case the campaign script forgets to
  # substitute (the loader fails fast on missing files).
  prey_gen0_seed_path: configs/evolution/coevolution_warmstart_prey/seed_42.json

  # `parallel_workers` is intentionally omitted — see arm A YAML.
  prey_evolution:
    algorithm: cmaes
    cma_diagonal: true
    population_size: 24
    generations: 50
    episodes_per_eval: 25
    learn_episodes_per_eval: 50
    eval_episodes_per_eval: 25
    sigma0: 0.5
    inheritance: lamarckian
    inheritance_elite_count: 1

  predator_evolution:
    algorithm: cmaes
    cma_diagonal: true
    population_size: 16
    generations: 50
    episodes_per_eval: 25
    learn_episodes_per_eval: 0
    sigma0: 0.5
    inheritance: none
