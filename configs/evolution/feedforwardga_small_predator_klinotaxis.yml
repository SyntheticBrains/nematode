# C2 curriculum smoke — FeedforwardGA foraging + predator (klinotaxis).
#
# The GA member's C2 cell (foraging + predator evasion, NO thermotaxis) in the
# C1 -> C2 -> C3 curriculum. The three PPO architectures reuse their existing
# predator-biology configs under configs/scenarios/pursuit/ as C2; FeedforwardGA
# had no foraging+predator evolution config, so this fills that curriculum gap.
#
# Mirrors the Phase 0 canonical predator surface (two-channel biology +
# distal_chemo_contact_trigger reward) used by the PPO predator-biology configs,
# adapted to the GA evolution launcher (run_evolution.py). Predator-only tuning
# (predator_damage 20.0, penalty_health_damage 0.5) — the combined C3 cell dials
# these down only because it ALSO stacks lethal thermal; with no thermal here,
# the predator-only canonical applies.
#
# Drop thermotaxis from foraging_predator_thermal/...combined... to get this C2;
# add it back (+ combined-cell tuning) to get C3.
#
# LAUNCH WITH `--fitness progress`. With lethal predators, the binary
# full-clear success_rate (run_evolution.py default) is flat 0.0 for every
# random-init genome → zero selection gradient → the GA never bootstraps
# (observed: best/mean/std fitness all 0.0 across all 30 generations).
# EpisodicProgressFitness grades partial foraging + survival so selection has a
# signal. The cross-architecture ranking still uses full-clear success extracted
# from the evolved champion (so the comparison stays apples-to-apples on outcome).
#
# DO NOT set brain.config.weights_path (forced None); DO NOT rely on
# brain.config.seed (the loop's --seed overrides it).

max_steps: 500

brain:
  name: feedforwardga
  config:
    hidden_dim: 64
    num_hidden_layers: 2
    sensory_modules:
      - food_chemotaxis                  # Auto-translated to food_chemotaxis_klinotaxis
      - predator_mechanosensation_oracle # Auto-translated to predator_mechanosensation_klinotaxis
      - predator_chemosensation_oracle   # Auto-translated to predator_chemosensation_klinotaxis
      - proprioception
      - stam

body_length: 2

reward:
  reward_mode: distal_chemo_contact_trigger
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.5
  reward_health_gain: 0.1

satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    predator_mechano_mode: klinotaxis
    predator_distal_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 6
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 2
    speed: 0.5
    movement_pattern: pursuit
    detection_radius: 6
    gradient_decay_constant: 10.0
    gradient_strength: 1.0

  health:
    max_hp: 100.0
    predator_damage: 20.0
    food_healing: 10.0

evolution:
  algorithm: ga
  generations: 30
  population_size: 16
  episodes_per_eval: 3
  parallel_workers: 1
  checkpoint_every: 10
  sigma0: 0.5
  elite_fraction: 0.2
  mutation_rate: 0.1
  crossover_rate: 0.8
