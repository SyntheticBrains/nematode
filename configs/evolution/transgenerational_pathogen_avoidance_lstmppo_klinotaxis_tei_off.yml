# Transgenerational Memory — TEI-OFF control arm
# ============================================================================
#
# Paired-arm ablation control for the TEI-on YAML
# (``transgenerational_pathogen_avoidance_lstmppo_klinotaxis.yml``).
# Byte-identical to the TEI-on arm except for the two-field pairing flip:
#
#   - ``evolution.inheritance: none`` (was ``transgenerational``)
#   - ``evolution.transgenerational.enabled: false`` (was ``true``)
#
# The pairing validator at ``EvolutionConfig._validate_inheritance``
# pins ``enabled=false`` to ``inheritance=none``, so this is the only
# legal way to express the control arm. The ``lawn_schedule`` block
# remains in place but is skipped at runtime: under ``enabled=false``
# the helpers ``_build_per_gen_sim_config`` and
# ``_compute_tei_prior_source`` both early-return identity / None at
# every generation. The TEI-off arm therefore receives the base
# sim_config every gen (pathogen lawns present in the env from the
# ``predators:`` block) and runs the standard K=50 train phase per
# child for ALL four generations — no inheritance, no schedule
# overrides, no substrate. This is the "what would the loop do
# without TEI" control.
#
# Substrate is the only cross-arm difference. Any F1+ retention
# observed in the TEI-on arm but absent here is attributable to the
# substrate.
#
# Maintenance: keep this YAML in lockstep with the TEI-on arm. The two
# files SHALL differ ONLY in the two fields above (and this header).

max_steps: 1000

brain:
  name: lstmppo
  config:
    rnn_type: gru
    lstm_hidden_dim: 64
    bptt_chunk_length: 16

    actor_hidden_dim: 64
    critic_hidden_dim: 128
    actor_num_layers: 2
    critic_num_layers: 2

    actor_lr: 0.0003
    critic_lr: 0.0003

    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    rollout_buffer_size: 512
    num_epochs: 4
    max_grad_norm: 0.5

    entropy_coef: 0.02
    entropy_coef_end: 0.005
    entropy_decay_episodes: 500

    lr_warmup_episodes: 50
    lr_warmup_start: 0.00003
    lr_decay_episodes: 1500
    lr_decay_end: 0.00003

    weight_init_scale: 1.0

    sensory_modules:
      - food_chemotaxis
      - nociception
      - mechanosensation
      - proprioception

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.5
  reward_health_gain: 0.1

satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    nociception_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 6
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0

  predators:
    # "Pathogen lawns" repurposed via STATIONARY predator with speed 0.
    # ``damage_radius=3`` is intentionally larger than the standard
    # stationary scenario (damage_radius=2) so F0 has enough avoidance
    # signal to learn from in 50 PPO episodes. If F0 calibration falls
    # outside [0.45, 0.85], this is the first knob to retune.
    enabled: true
    count: 3
    speed: 0.0
    movement_pattern: stationary
    detection_radius: 4
    damage_radius: 3
    gradient_decay_constant: 8.0
    gradient_strength: 1.2

  health:
    max_hp: 100.0
    predator_damage: 15.0
    food_healing: 10.0

evolution:
  algorithm: tpe
  population_size: 16
  generations: 4
  # episodes_per_eval is the protocol fallback when
  # eval_episodes_per_eval is None. Both are set to 25 so the per-gen
  # choice-index aggregator (commit 7) has enough samples to stabilise.
  episodes_per_eval: 25
  # learn_episodes_per_eval is the BASELINE K. The per-gen
  # ``lawn_schedule`` below overrides it per generation (F0: 50,
  # F1/F2/F3: 0). The outer value MUST be > 0 to satisfy the
  # inheritance ↔ train-phase validator at config-load; the
  # per-gen override applies at worker-dispatch time.
  learn_episodes_per_eval: 50
  eval_episodes_per_eval: 25
  sigma0: 1.0
  parallel_workers: 4
  checkpoint_every: 2
  cma_diagonal: false
  inheritance: none
  # TEI-OFF control arm: the block is retained (in lockstep with the
  # TEI-on YAML for maintenance), but ``enabled: false`` causes the
  # helpers to short-circuit identity / None at every generation.
  transgenerational:
    enabled: false
    decay_factor: 0.6
    extraction_seed: 424242
    lawn_schedule:
      - generation: 0
        pathogen_lawns_enabled: true
        ppo_train_episodes: 50
      - generation: 1
        pathogen_lawns_enabled: false
        ppo_train_episodes: 0
      - generation: 2
        pathogen_lawns_enabled: false
        ppo_train_episodes: 0
      - generation: 3
        pathogen_lawns_enabled: false
        ppo_train_episodes: 0

hyperparam_schema:
  # Six-field hyperparameter schema (same shape as the existing
  # LSTMPPO + klinotaxis + predator pilots under ``configs/evolution/``).
  # The genome-identity anchor lets the F0 substrate carry
  # stable provenance back to its parent genome. The substrate itself
  # is a per-action ``logit_bias`` (shape (num_actions,)), independent
  # of these schema entries — they just give the elite a defined
  # genome-ID for the lineage CSV and substrate filename.
  - name: actor_lr
    type: float
    bounds: [1.0e-5, 1.0e-3]
    log_scale: true
  - name: critic_lr
    type: float
    bounds: [1.0e-5, 1.0e-3]
    log_scale: true
  - name: gamma
    type: float
    bounds: [0.9, 0.999]
  - name: entropy_coef
    type: float
    bounds: [1.0e-4, 0.1]
    log_scale: true
  - name: weight_init_scale
    type: float
    bounds: [0.5, 2.0]
  - name: entropy_decay_episodes
    type: int
    bounds: [200, 2000]
