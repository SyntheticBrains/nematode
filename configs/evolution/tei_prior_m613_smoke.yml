# M6.13 TEI-as-prior-on-M3 — K_test calibration smoke
# ============================================================================
#
# F0+F1 calibration variant of the weights_only arm. Used by the
# campaign shell's ``--smoke`` subcommand to pick K_test BEFORE
# the multi-seed pilot is unblocked. The smoke runs ONLY the M3
# Lamarckian arm because the M6.13 calibration target is "find K
# where weights_only F1+ has measurable headroom AND beats control" —
# the substrate arm's behaviour is irrelevant at calibration time;
# what matters is that the K_test sits below M3's saturation point.
#
# Tripwires (per design.md § D5):
#   T1':  F0 envelope ``0.30 ≤ mean F0 survival_rate ≤ 0.70``
#         (already validated by PR-A pass-6; re-verify on composed-arm).
#   T2':  Substrate diversity — pairwise CoV > 5% across calibration
#         seeds' bias_network state_dicts. Reuses PR-A's
#         m69_substrate_diversity.py script unchanged.
#   T3':  M3-headroom (NEW M6.13 tripwire) — load-bearing:
#         ``weights_only F1+ ≤ 0.95 × F0`` (M3 hasn't ceiling'd at
#         K_test) AND ``weights_only F1+ ≥ 1.2 × control F1+`` (M3
#         is doing useful work).
#   T4':  Substrate magnitude — mean |bias_network output| > 0.1.
#
# All four MUST pass before pilot is unblocked. T3' failure on the
# high end (F1 ≥ 0.95 × F0) drops K_test to 500 and re-runs; failure
# on the low end (F1 < 0.80 × F0) bumps K_test to 1500. Caps at 2
# calibration passes per design.md § D5 procedure.
#
# Diffs from tei_prior_m613_weights_only.yml:
#   - ``generations: 2`` (was 4) — F0 + F1 only (need at least 2 gens
#     to measure T3' headroom).
#   - ``population_size: 6`` (was 8) — cheaper calibration set.
#   - ``parallel_workers: 6`` matched to pop size.
#   - ``checkpoint_every: 1`` for forensic granularity.
#
# Everything else matches the weights_only arm exactly so the smoke
# MEASURES the same M3 trajectory the pilot will produce.

max_steps: 1000

brain:
  name: lstmppo
  config:
    rnn_type: gru
    lstm_hidden_dim: 64
    bptt_chunk_length: 16

    actor_hidden_dim: 64
    critic_hidden_dim: 128
    actor_num_layers: 2
    critic_num_layers: 2

    actor_lr: 0.0003
    critic_lr: 0.0003

    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    rollout_buffer_size: 512
    num_epochs: 4
    max_grad_norm: 0.5

    entropy_coef: 0.02
    entropy_coef_end: 0.005
    entropy_decay_episodes: 500

    lr_warmup_episodes: 50
    lr_warmup_start: 0.00003
    lr_decay_episodes: 1500
    lr_decay_end: 0.00003

    weight_init_scale: 1.0

    sensory_modules:
      - food_chemotaxis
      - nociception
      - mechanosensation
      - proprioception

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.5
  reward_health_gain: 0.1
  reward_mode: gradient_proximity

satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  grid_size: 15
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    nociception_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 8
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0
    min_food_predator_distance: 4

  predators:
    enabled: true
    count: 4
    speed: 0.0
    movement_pattern: stationary
    detection_radius: 4
    damage_radius: 3
    gradient_decay_constant: 8.0
    gradient_strength: 1.2

  health:
    max_hp: 100.0
    predator_damage: 25.0
    food_healing: 10.0

evolution:
  algorithm: tpe
  population_size: 6
  generations: 2
  episodes_per_eval: 25
  # K_test calibration starting point: 1000. The smoke decides whether
  # to keep (T3' pass), drop to 500 (T3' high — M3 saturated), or
  # bump to 1500 (T3' low — M3 not learning enough). Edit this value
  # between passes if the first one fails T3'.
  learn_episodes_per_eval: 1000
  eval_episodes_per_eval: 25
  sigma0: 1.0
  parallel_workers: 6
  checkpoint_every: 1
  cma_diagonal: false
  inheritance: lamarckian
  fitness_survival_weight: 1.0
  fitness_metric: survival_rate
  # NO ``transgenerational:`` block — calibration smoke runs the M3
  # arm only; the substrate-diversity tripwire T2' is exercised
  # separately at pilot time on a tei_weights-arm config.

hyperparam_schema:
  - name: actor_lr
    type: float
    bounds: [1.0e-5, 1.0e-3]
    log_scale: true
  - name: critic_lr
    type: float
    bounds: [1.0e-5, 1.0e-3]
    log_scale: true
  - name: gamma
    type: float
    bounds: [0.9, 0.999]
  - name: entropy_coef
    type: float
    bounds: [1.0e-4, 0.1]
    log_scale: true
  - name: weight_init_scale
    type: float
    bounds: [0.5, 2.0]
  - name: entropy_decay_episodes
    type: int
    bounds: [200, 2000]
