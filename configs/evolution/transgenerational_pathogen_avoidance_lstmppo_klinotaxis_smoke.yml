# Transgenerational Memory — F0 calibration smoke
# ============================================================================
#
# F0-only calibration variant of the TEI-on pilot YAML
# (``transgenerational_pathogen_avoidance_lstmppo_klinotaxis.yml``).
# Used by the campaign shell's ``--smoke`` subcommand to verify the
# F0 calibration envelope (``0.45 ≤ mean F0 choice_index ≤ 0.85``)
# BEFORE unblocking the multi-seed pilot/full campaign.
#
# Diffs from the TEI-on pilot:
#   - ``evolution.generations: 1`` (was 4)
#   - ``evolution.population_size: 6`` (TEI-on pilot is 8)
#   - ``transgenerational.lawn_schedule`` trimmed to the gen-0 entry
#     only (the coverage validator requires exactly one entry per
#     gen in ``[0, generations)``).
#
# Everything else — including ``inheritance: transgenerational``,
# ``transgenerational.enabled: true``, ``decay_factor``,
# ``extraction_seed``, the env/brain config, and the
# ``hyperparam_schema`` — has field values matching the pilot YAML
# so the calibration measures the same configuration that will be
# used in the multi-seed runs. (Inline comments are not preserved
# verbatim; field values are.)

max_steps: 1000

brain:
  name: lstmppo
  config:
    rnn_type: gru
    lstm_hidden_dim: 64
    bptt_chunk_length: 16

    actor_hidden_dim: 64
    critic_hidden_dim: 128
    actor_num_layers: 2
    critic_num_layers: 2

    actor_lr: 0.0003
    critic_lr: 0.0003

    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    rollout_buffer_size: 512
    num_epochs: 4
    max_grad_norm: 0.5

    entropy_coef: 0.02
    entropy_coef_end: 0.005
    entropy_decay_episodes: 500

    lr_warmup_episodes: 50
    lr_warmup_start: 0.00003
    lr_decay_episodes: 1500
    lr_decay_end: 0.00003

    weight_init_scale: 1.0

    sensory_modules:
      - food_chemotaxis
      - nociception
      - mechanosensation
      - proprioception

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.5
  reward_health_gain: 0.1

satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    nociception_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 6
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 3
    speed: 0.0
    movement_pattern: stationary
    detection_radius: 4
    damage_radius: 3
    gradient_decay_constant: 8.0
    gradient_strength: 1.2

  health:
    max_hp: 100.0
    predator_damage: 15.0
    food_healing: 10.0

evolution:
  algorithm: tpe
  population_size: 6
  generations: 1
  episodes_per_eval: 25
  learn_episodes_per_eval: 1000
  eval_episodes_per_eval: 25
  sigma0: 1.0
  parallel_workers: 8
  checkpoint_every: 2
  cma_diagonal: false
  inheritance: transgenerational
  # Survival-weighted fitness — see TEI-on YAML for rationale.
  fitness_survival_weight: 1.0
  transgenerational:
    enabled: true
    decay_factor: 0.6
    extraction_seed: 424242
    lawn_schedule:
      - generation: 0
        pathogen_lawns_enabled: true
        ppo_train_episodes: 1000

hyperparam_schema:
  - name: actor_lr
    type: float
    bounds: [1.0e-5, 1.0e-3]
    log_scale: true
  - name: critic_lr
    type: float
    bounds: [1.0e-5, 1.0e-3]
    log_scale: true
  - name: gamma
    type: float
    bounds: [0.9, 0.999]
  - name: entropy_coef
    type: float
    bounds: [1.0e-4, 0.1]
    log_scale: true
  - name: weight_init_scale
    type: float
    bounds: [0.5, 2.0]
  - name: entropy_decay_episodes
    type: int
    bounds: [200, 2000]
