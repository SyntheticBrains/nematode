# Transgenerational Memory — LSTMPPO + klinotaxis + stationary pathogens
# ============================================================================
#
# Tests transgenerational epigenetic inheritance (TEI) of pathogen
# avoidance on an LSTMPPO+klinotaxis brain. The F0 generation trains
# on pathogen-laced terrain; its trained policy is read back as a
# per-action ``logit_bias`` substrate (the abstract sRNA-token); F1+
# generations inherit a decayed copy of that substrate WITHOUT
# re-training and WITHOUT direct re-exposure to pathogens.
#
# Pathogen lawns are represented via the existing ``predators:`` block
# with ``movement_pattern: stationary``, ``speed: 0`` (a toxic-zone
# substrate that doesn't pursue the agent). The "pathogen lawn"
# vocabulary is documentation-only — the underlying storage is the
# stationary-predator schema, reused so no new env-side fields are
# introduced.
#
# Schedule (as calibrated through the Path A/AA/AAA forensic chain
# documented in tmp/evaluations/transgenerational/transgenerational_scratchpad.md):
#   - F0 (gen 0): pathogen lawns ON, K=1000 PPO train episodes per child.
#     End-of-gen the F0 elite's trained policy is loaded, the
#     ``extract_from_brain`` telemetry pass produces the
#     ``logit_bias`` substrate, and the resulting ``.tei.pt`` is
#     written. The capture is gated on success of the F0 train phase.
#   - F1/F2/F3: pathogen lawns ON (test-phase pathogens MUST be present
#     to evaluate the choice index), K=0 (no train — offspring inherit
#     the F0 substrate without re-exposure). Each child loads the F0
#     substrate, applies the ``inherit_from`` decay cascade
#     ``lineage_depth`` times (F1: 1x, F2: 2x, F3: 3x), and runs the
#     eval phase only. The TEI prior is the only signal carrier.
#     (See the ``lawn_schedule`` block below for the local-context
#     rationale of pathogens-on at F1+.)
#
# Decay factor 0.6 yields F0=1.0 / F1=0.6 / F2=0.36 / F3=0.216 — the
# "diluted across generations" framing matches Posner 2023 / Kaletsky
# 2025 biological retention curves.
#
# Decision gate (per the transgenerational-memory OpenSpec change):
#   GO iff F1 ≥ 40% × F0, F2 ≥ 25% × F0, F3 ≥ 15% × F0, AND the
#   per-gen choice index is monotone non-increasing, in ≥2 of 4 seeds.
#
# F0 calibration gate (run via ``--smoke`` before the pilot/full
# campaign): mean F0 choice_index MUST be in [0.45, 0.85] — outside
# the envelope, retune ``damage_radius`` or ``ppo_train_episodes``
# before unblocking the multi-seed campaign.
#
# Paired-arm ablation: the campaign shell runs two arms with
# byte-identical YAMLs except for the two-field pairing flip
# (``inheritance: none`` + ``transgenerational.enabled: false``).
# The control arm is provided as a sibling YAML alongside this one
# (``transgenerational_pathogen_avoidance_lstmppo_klinotaxis_tei_off.yml``)
# rather than via CLI overrides — the ``transgenerational:`` block is
# not CLI-overridable, and the pairing validator at
# ``EvolutionConfig._validate_inheritance`` pins the two fields
# together at config-load. The substrate is therefore the only
# cross-arm difference.

max_steps: 1000

brain:
  name: lstmppo
  config:
    rnn_type: gru
    lstm_hidden_dim: 64
    bptt_chunk_length: 16

    actor_hidden_dim: 64
    critic_hidden_dim: 128
    actor_num_layers: 2
    critic_num_layers: 2

    actor_lr: 0.0003
    critic_lr: 0.0003

    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    rollout_buffer_size: 512
    num_epochs: 4
    max_grad_norm: 0.5

    entropy_coef: 0.02
    entropy_coef_end: 0.005
    entropy_decay_episodes: 500

    lr_warmup_episodes: 50
    lr_warmup_start: 0.00003
    lr_decay_episodes: 1500
    lr_decay_end: 0.00003

    weight_init_scale: 1.0

    sensory_modules:
      - food_chemotaxis
      - nociception
      - mechanosensation
      - proprioception

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.5
  reward_health_gain: 0.1

satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    nociception_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 6
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0

  predators:
    # "Pathogen lawns" repurposed via STATIONARY predator with speed 0.
    # ``damage_radius=3`` covers ~19% of the 20x20 grid across 3 lawns
    # (Manhattan disc area 25 cells/lawn). The pre-Path-A history of
    # this knob: damage_radius=2 (the stationary-scenario default)
    # produced ceiling-saturated F0 choice_index ≈ 0.93; damage_radius=5
    # over-corrected (only ~52% of episodes survived a single child even
    # at K=2000 single-brain training per Path A v2); damage_radius=3
    # restores ~19% coverage, closer to logbook 006's working
    # configuration (which converged the unified-sensory PPO brain to
    # ~75% post-conv success on stationary predators at K=500).
    # The choice_index metric remains geometry-dominated in this env
    # (per Path A v2 forensics); the ``survival_rate`` metric (computed
    # offline by the per-gen evaluator from termination_reason) is the
    # primary signal of learned avoidance.
    enabled: true
    count: 3
    speed: 0.0
    movement_pattern: stationary
    detection_radius: 4
    damage_radius: 3
    gradient_decay_constant: 8.0
    gradient_strength: 1.2

  health:
    max_hp: 100.0
    predator_damage: 15.0
    food_healing: 10.0

evolution:
  algorithm: tpe
  population_size: 8
  generations: 4
  # episodes_per_eval is the protocol fallback when
  # eval_episodes_per_eval is None. Both are set to 25 so the per-gen
  # choice-index aggregator (commit 7) has enough samples to stabilise.
  episodes_per_eval: 25
  # learn_episodes_per_eval is the BASELINE K. The per-gen
  # ``lawn_schedule`` below overrides it per generation (F0: 1000,
  # F1/F2/F3: 0). The K=1000 figure is the upper end of the Path AA
  # forensic sweep: Path A v2 single-brain runs at K=2000 showed
  # survival_rate peaked at K=1200 (0.52) with PPO oscillation
  # 0.04–0.52 across adjacent checkpoints; K=1000 lands inside that
  # learnable regime while keeping per-child train wall-time under
  # ~3 minutes. Logbook 006's stationary-predator finding ("500 runs
  # for unified-sensory MLPPPO to converge reliably") was the lower
  # anchor — Path AA bracketed K=500 vs K=1000 and the latter produced
  # the calibrated F0 elite (composite fitness 0.46). The outer value
  # MUST be > 0 to satisfy the inheritance ↔ train-phase validator at
  # config-load; the per-gen override applies at worker-dispatch time.
  learn_episodes_per_eval: 1000
  eval_episodes_per_eval: 25
  sigma0: 1.0
  # 8 of the machine's 10 cores; leaves 2 for system/IDE.
  parallel_workers: 8
  checkpoint_every: 2
  cma_diagonal: false
  inheritance: transgenerational
  # Survival-weighted fitness so the F0 elite selection rewards both
  # foraging AND pathogen avoidance. Path AA forensics showed that
  # success_rate-only fitness (the legacy M3/M4/M5 default) at K=1000
  # produces "food-grabber" elites: fitness 0.68 but survival 0.08 (24
  # of 25 eval episodes still die). Weight 1.0 means
  # ``fitness = success_rate × (1 - death_rate)``, so a child that
  # collects all food but dies once is rated lower than one that
  # collects most food and never dies. This aligns the F0 substrate
  # source with the M6 measurement target (avoidance), not the M3
  # measurement target (foraging).
  fitness_survival_weight: 1.0
  # Transgenerational inheritance: F0 trains on pathogens, F1+
  # inherits the decayed substrate without re-training.
  transgenerational:
    enabled: true
    decay_factor: 0.6
    extraction_seed: 424242
    # ``pathogen_lawns_enabled`` is held to ``true`` for every generation
    # — this is the biologically-faithful framing per the Vidal-Gadea
    # 2025 choice-assay protocol. Offspring are *reared* without pathogen
    # re-exposure (modelled here by ``ppo_train_episodes: 0`` at F1+),
    # but the test phase MUST include pathogens because that is how
    # avoidance is measured. The original M6 spec text wrote "F1+
    # pathogen lawns OFF" — that conflates the rearing phase (correct:
    # no re-training under TEI) with the test phase (incorrect:
    # pathogens must be present to evaluate the choice index). Disabling
    # predators at F1+ would also remove the predator channel from the
    # env's STAM resolution, producing a feature-dim mismatch with the
    # F0-trained brain (15 features vs the trained 17). Both arguments
    # land at the same fix: pathogens stay ON across all generations;
    # only the train-phase is toggled by ``ppo_train_episodes``.
    lawn_schedule:
      - generation: 0
        pathogen_lawns_enabled: true
        ppo_train_episodes: 1000
      - generation: 1
        pathogen_lawns_enabled: true
        ppo_train_episodes: 0
      - generation: 2
        pathogen_lawns_enabled: true
        ppo_train_episodes: 0
      - generation: 3
        pathogen_lawns_enabled: true
        ppo_train_episodes: 0

hyperparam_schema:
  # Six-field hyperparameter schema (same shape as the existing
  # LSTMPPO + klinotaxis + predator pilots under ``configs/evolution/``).
  # The genome-identity anchor lets the F0 substrate carry
  # stable provenance back to its parent genome. The substrate itself
  # is a per-action ``logit_bias`` (shape (num_actions,)), independent
  # of these schema entries — they just give the elite a defined
  # genome-ID for the lineage CSV and substrate filename.
  - name: actor_lr
    type: float
    bounds: [1.0e-5, 1.0e-3]
    log_scale: true
  - name: critic_lr
    type: float
    bounds: [1.0e-5, 1.0e-3]
    log_scale: true
  - name: gamma
    type: float
    bounds: [0.9, 0.999]
  - name: entropy_coef
    type: float
    bounds: [1.0e-4, 0.1]
    log_scale: true
  - name: weight_init_scale
    type: float
    bounds: [0.5, 2.0]
  - name: entropy_decay_episodes
    type: int
    bounds: [200, 2000]
