# Lamarckian Inheritance Pilot — LSTMPPO + klinotaxis + pursuit predators
# ============================================================================
#
# Per-genome warm-start from the prior generation's best parent.  Each
# child of generation N+1 starts its K=50 train episodes from the
# weights of generation N's highest-fitness genome (single-elite
# broadcast, validated via inheritance_elite_count: 1).  The
# hyperparameter genome continues to evolve via TPE — weights flow as a
# side-channel substrate keyed by parent genome_id.
#
# Two structural choices distinguish this from a vanilla TPE
# hyperparameter-evolution config on the same brain:
#
# 1. ``evolution.inheritance: lamarckian`` + ``inheritance_elite_count: 1``.
# 2. ``rnn_type`` and ``lstm_hidden_dim`` schema entries are NOT
#    evolved — those are architecture-changing fields, and per-genome
#    warm-start cannot load a parent's LSTM weights into a child with a
#    different shape.  The validator on
#    SimulationConfig._validate_hyperparam_schema rejects the
#    combination at YAML load time.
#
# So the schema evolves 4 non-arch fields: actor_lr, critic_lr, gamma,
# entropy_coef.  rnn_type defaults to "gru" and lstm_hidden_dim
# defaults to 64 in the brain block.
#
# Wall-time per seed: ~12-15 min/seed at parallel=4 — inheritance adds
# ~10 ms/genome of save_weights overhead but otherwise the train+eval
# cost is identical to a no-inheritance run.
#
# Decision gate (recorded with the original change proposal):
#   - GO if both:
#       (a) Speed: mean_gen_lamarckian_to_092 + 4 <= mean_gen_control_to_092
#           (lamarckian reaches the 0.92 ceiling at least 4 generations
#           earlier than the from-scratch control on average).
#       (b) Floor: mean_gen1_lamarckian >= mean_gen3_control
#           (lamarckian gen-1 children — warm-started from gen-0
#           elites — are already ahead of where the control arm is two
#           generations later, proving inheritance does real work).
#   - PIVOT if exactly one of (a)/(b) holds.
#   - STOP if neither.
#
# Within-experiment from-scratch control: the sibling campaign script
# phase5_m3_lamarckian_lstmppo_klinotaxis_predator_control.sh runs the
# matching no-inheritance config on the same code revision (with the
# same dropped schema entries for parity) so the comparison is
# confounder-free.

max_steps: 1000  # klinotaxis sensing + predators need more steps than oracle

brain:
  name: lstmppo
  config:
    # rnn_type / lstm_hidden_dim are FIXED here (architecture-changing
    # fields; not evolvable under inheritance, since per-genome
    # warm-start needs identical weight shapes between parent and
    # child).
    rnn_type: gru
    lstm_hidden_dim: 64
    bptt_chunk_length: 16

    actor_hidden_dim: 64
    critic_hidden_dim: 128
    actor_num_layers: 2
    critic_num_layers: 2

    actor_lr: 0.0003
    critic_lr: 0.0003

    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    rollout_buffer_size: 512
    num_epochs: 4
    max_grad_norm: 0.5

    entropy_coef: 0.02
    entropy_coef_end: 0.005
    entropy_decay_episodes: 800

    lr_warmup_episodes: 50
    lr_warmup_start: 0.00003
    lr_decay_episodes: 1500
    lr_decay_end: 0.00003

    sensory_modules:
      - food_chemotaxis     # Auto-translated to food_chemotaxis_klinotaxis
      - nociception         # Auto-translated to nociception_klinotaxis
      - mechanosensation
      - proprioception

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.5
  reward_health_gain: 0.1

satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    nociception_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 6
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 2
    speed: 0.5
    movement_pattern: pursuit
    detection_radius: 6
    gradient_decay_constant: 10.0
    gradient_strength: 1.0

  health:
    max_hp: 100.0
    predator_damage: 20.0
    food_healing: 10.0

evolution:
  algorithm: tpe
  population_size: 12
  generations: 20
  # Note: episodes_per_eval is the protocol fallback used when
  # eval_episodes_per_eval is None.  Both are set to 25 here,
  # redundantly, so the YAML is diff-comparable field-for-field with
  # the matching no-inheritance control config.
  # eval_episodes_per_eval wins (per the Learned-Performance Fitness
  # scenario in evolution-framework/spec.md).
  episodes_per_eval: 25
  learn_episodes_per_eval: 50  # K — train phase
  eval_episodes_per_eval: 25   # L — eval phase
  sigma0: 1.0
  parallel_workers: 4
  checkpoint_every: 2
  cma_diagonal: false

  # Per-genome Lamarckian inheritance.  Each child of generation N+1
  # warm-starts its brain from the prior gen's best-fitness genome.
  # inheritance_elite_count: 1 (single-elite broadcast) is currently
  # the only value the validator accepts; multi-elite (round-robin /
  # tournament) is reserved for future strategies.
  inheritance: lamarckian
  inheritance_elite_count: 1

hyperparam_schema:
  # Four non-arch fields.  rnn_type and lstm_hidden_dim are excluded
  # because they are architecture-changing and incompatible with
  # per-genome warm-start; both are fixed at the brain block above.
  - name: actor_lr
    type: float
    bounds: [1.0e-5, 1.0e-3]
    log_scale: true
  - name: critic_lr
    type: float
    bounds: [1.0e-5, 1.0e-3]
    log_scale: true
  - name: gamma
    type: float
    bounds: [0.9, 0.999]
  - name: entropy_coef
    type: float
    bounds: [1.0e-4, 0.1]
    log_scale: true
