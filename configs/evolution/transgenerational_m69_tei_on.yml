# M6.9+ TEI re-evaluation — TEI-on arm (sensory-conditional substrate)
# ============================================================================
#
# Arm 1 of 3 in the M6.9+ PR-A three-arm campaign. Tests the pure-TEI
# floor: does the audit-A/B/C-corrected sensory-conditional substrate
# carry a measurable pathogen-conditional avoidance signal from F0 to
# F1+ without retraining at F1+?
#
# Audit corrections from M6 (logbook 018 INCONCLUSIVE → M6.9+ PR-A):
#   - A: per-action constant logit_bias → sensory-conditional bias-network
#        MLP (3 inputs: predator_gradient_{strength,direction_sin},
#        food_gradient_strength → 8 hidden tanh → 4 actions).
#   - B: training-reward + env geometry produced "circle right always"
#        motion-bias attractor. Fixed via:
#        * env density: count 4 (M6.9+ smoke pass 4-5 refinement; was 5 then 3 — micro-smokes found 5 created untraversable narrow corridors, 3 hit ceiling at 0.87 elite survival; 4 lands mid-envelope 0.67 mean), grid 20→15, foods 6→8 (no
#          unobstructed circular path).
#        * reward shape: gradient_only mode drops the distance-scaled
#          evasion term + flat fallback; only contact penalty fires.
#   - C: F0 probes had zero predator_gradient — fixed via env-derived
#        Manhattan-ring probes around stationary-predator coordinates.
#
# The fourth audit issue (D: asymmetric F1+ compute, missing
# transgenerational+weights control) is gated to PR-B and not addressed
# here. PR-A's three-arm campaign tests the PURE-TEI floor; PR-B (if
# triggered by a non-zero pure-TEI signal) tests the symmetric-compute
# substrate+weights control.
#
# Cross-arm pairing (per design.md § D4):
#   - tei_on   (this file):  inheritance=transgenerational, F1+ K=0
#   - weights_only:         inheritance=lamarckian, F1+ K=K_full,
#                            transgenerational: block OMITTED entirely
#   - control:               inheritance=none, F1+ K=K_full,
#                            transgenerational: block OMITTED entirely
#
# The launcher shell (phase5_m69_transgenerational_lstmppo_klinotaxis.sh)
# sanity-checks at launch that all three YAMLs share the same
# fitness_survival_weight (1.0 across all arms — composite fitness
# parity is required so the M3 reproduction check via `weights_only`
# is not confounded by an elite-selection rule mismatch).
#
# Decision gate: F1 ≥ 40% × F0, F2 ≥ 25% × F0, F3 ≥ 15% × F0 (training-
# time F0 fitness override applied), monotone non-increasing decay, in
# ≥ 2 of 4 seeds. Primary metric: survival_rate (M6.9+ pivot from
# choice_index per logbook 018 finding that choice_index is
# geometry-dominated). Cross-arm verdict: GO iff tei_on passes its
# per-arm gate AND tei_on − control delta is statistically non-zero
# via Wilcoxon p<0.10 AND ≥ 5pp delta with non-overlapping 80%
# bootstrap CIs.

max_steps: 1000

brain:
  name: lstmppo
  config:
    rnn_type: gru
    lstm_hidden_dim: 64
    bptt_chunk_length: 16

    actor_hidden_dim: 64
    critic_hidden_dim: 128
    actor_num_layers: 2
    critic_num_layers: 2

    actor_lr: 0.0003
    critic_lr: 0.0003

    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    rollout_buffer_size: 512
    num_epochs: 4
    max_grad_norm: 0.5

    entropy_coef: 0.02
    entropy_coef_end: 0.005
    entropy_decay_episodes: 500

    lr_warmup_episodes: 50
    lr_warmup_start: 0.00003
    lr_decay_episodes: 1500
    lr_decay_end: 0.00003

    weight_init_scale: 1.0

    sensory_modules:
      - food_chemotaxis
      - nociception
      - mechanosensation
      - proprioception

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.5
  reward_health_gain: 0.1
  # M6.10 audit-B remediation v2 (smoke pass 3 finding). Adds a smooth
  # per-step penalty proportional to env.get_predator_concentration at
  # the agent's position (fires anywhere predators are enabled,
  # regardless of is_in_danger), preserves the contact penalty at
  # dist <= 1 (the load-bearing damage-zone signal), and drops the
  # distance-scaled directional evasion term + flat fallback. v1
  # (gradient_only) removed the M6 "circle right" tangential attractor
  # but traded it for a "never-approach" attractor; gradient_proximity
  # gives the agent a continuous "closer = worse" gradient before
  # contact so it learns a middle-ground forage-while-avoiding policy.
  reward_mode: gradient_proximity

satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  # M6.10 audit-B remediation. 15x15 grid + 4 stationary predators +
  # 8 foods packs the env density tightly enough to remove the
  # geometric feasibility of an unobstructed circular path through
  # the lawns (M6's 20x20 + 3 lawns left ample axis-aligned paths
  # the "circle right always" attractor exploited).
  grid_size: 15
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    nociception_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 8
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0
    min_food_predator_distance: 4  # M6.9+ env-geometry fix (smoke pass 3): food cannot spawn within damage_radius + 1 of any predator

  predators:
    enabled: true
    count: 4
    speed: 0.0
    movement_pattern: stationary
    detection_radius: 4
    damage_radius: 3
    gradient_decay_constant: 8.0
    gradient_strength: 1.2

  health:
    max_hp: 100.0
    predator_damage: 25.0
    food_healing: 10.0

evolution:
  algorithm: tpe
  population_size: 8
  generations: 4
  episodes_per_eval: 25
  learn_episodes_per_eval: 2000
  eval_episodes_per_eval: 25
  sigma0: 1.0
  parallel_workers: 8
  checkpoint_every: 2
  cma_diagonal: false
  inheritance: transgenerational
  # Composite fitness across all three arms (parity contract). The
  # launcher shell asserts this value matches across tei_on /
  # weights_only / control at launch time; mismatch aborts before any
  # worker is dispatched.
  # Ignored under fitness_metric=survival_rate (the M6.9+ PR-A
  # spec primary metric — see below); retained for byte-equivalent
  # round-trip with the prior M6 fitness machinery.
  fitness_survival_weight: 1.0
  # Spec primary metric for the M6.9+ PR-A pathogen-avoidance
  # campaign (design.md § D5). Dispatches the TPE optimizer +
  # decision-gate machinery to optimise for SURVIVAL of predators,
  # not foraging-given-survival. T1 envelope, T3 M6-floor-to-beat,
  # and cross-arm primary verdict are all specified against this
  # metric — under fitness_metric=composite (M3/M6 byte-equivalent
  # default) the F0 elite is selected on a different signal than
  # the decision gate measures, which is the M6.9+ smoke-pass-1
  # failure mode that motivated this YAML field.
  fitness_metric: survival_rate
  transgenerational:
    enabled: true
    decay_factor: 0.6
    decay_shape: geometric  # default. Pilot pivot can switch to
                            # linear/sigmoid if monotone-decay collapses.
    extraction_seed: 424242
    # M6.9 audit-A remediation: sensory-conditional bias-network MLP.
    # Replaces the M6 per-action constant logit_bias (which could not
    # express gradient-conditional avoidance). Architecture is
    # configurable; defaults match the design.md D1 plan v2 choice.
    bias_network:
      hidden_dim: 8
      activation: tanh
      input_features:
        - predator_gradient_strength
        - predator_gradient_direction_sin
        - food_gradient_strength
    # M6.11 audit-C remediation: env-derived F0 probe ring. The probe
    # builder generates 8 Manhattan-ring positions around each
    # stationary predator at distance damage_radius + radius_offset
    # = 3 + 1 = 4. With 4 predators that's 32 probes per F0
    # extraction (vs M6's 3 synthetic predator-gradient-zero probes).
    probe_ring:
      count: 8
      radius_offset: 1
      include_food_gradient_variants: false
      safe_probes:
        count: 16              # safe-zone probes complement the 32 near-predator ring probes
        min_predator_distance: 6  # L1 distance from any predator — well outside detection radius 4
    lawn_schedule:
      - generation: 0
        pathogen_lawns_enabled: true
        ppo_train_episodes: 2000
      - generation: 1
        pathogen_lawns_enabled: true
        ppo_train_episodes: 0
      - generation: 2
        pathogen_lawns_enabled: true
        ppo_train_episodes: 0
      - generation: 3
        pathogen_lawns_enabled: true
        ppo_train_episodes: 0

hyperparam_schema:
  - name: actor_lr
    type: float
    bounds: [1.0e-5, 1.0e-3]
    log_scale: true
  - name: critic_lr
    type: float
    bounds: [1.0e-5, 1.0e-3]
    log_scale: true
  - name: gamma
    type: float
    bounds: [0.9, 0.999]
  - name: entropy_coef
    type: float
    bounds: [1.0e-4, 0.1]
    log_scale: true
  - name: weight_init_scale
    type: float
    bounds: [0.5, 2.0]
  - name: entropy_decay_episodes
    type: int
    bounds: [200, 2000]
