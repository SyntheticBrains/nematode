# Combined-behaviour C3 cell — FeedforwardGA (food + predator + thermotaxis, klinotaxis, continuous-2D).
#
# The GA-evolved-weights member (6th MUST arm) of the cross-architecture C3
# comparison. Shares the locked T7 continuous C3 env + reward + satiety block with
# the five PPO C3 cells (configs/scenarios/foraging_predator_thermal/
# *_small_continuous2d_combined_klinotaxis.yml) — only the brain + the learning
# regime (GA population weight-search vs PPO gradient descent) differ. Lives under
# configs/evolution/ because GA configs carry an `evolution:` block and launch via
# scripts/run_evolution.py (NOT run_simulation.py).
#
# ACTION SPACE: FeedforwardGABrain is DISCRETE-only (softmax over a fixed action
# set; no continuous speed/turn head). It runs on the continuous-2D substrate via
# the env's discrete-action fallback (_apply_movement: 4-way moves with
# pos_continuous + heading mirrored, so the continuous klinotaxis sensing + capture
# still operate) — so it needs NO code change. This is the same discrete regime the
# GA used at T4-grid; the action-space asymmetry vs the continuous-control PPO arms
# is part of the GA's identity as the gradient-free evolved-weights comparator.
#
# RANK: LAST. Champion full-clear success ~0-23% (n=2; below the connectome floor
# of 35%). It bootstraps off 0 (progress fitness plateaus ~0.57-0.61 by gen ~10-30)
# but rarely completes the full forage-while-evade-while-thermoregulate clear — the
# low ceiling is OPTIMISER-fundamental (gradient-free search in ~6k-D), reproducing
# the T4-grid ~0% full-clear, and is action-space-agnostic (T4 sep-CMA tie).
#
# LAUNCH WITH `--fitness progress`. The stacked lethal cell makes binary full-clear
# success flat 0.0 for random-init genomes -> zero selection gradient; the graded
# progress fitness (partial forage + survival) gives selection a signal. The
# cross-arch ranking still extracts full-clear success from the evolved champion
# (the same outcome metric the PPO cells report).
max_steps: 2400
brain:
  name: feedforwardga
  config:
    hidden_dim: 64
    num_hidden_layers: 2
    sensory_modules:
    - food_chemotaxis
    - predator_mechanosensation_klinotaxis
    - predator_chemosensation_klinotaxis
    - thermotaxis
    - proprioception
body_length: 1
reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  penalty_health_damage: 0.5
  reward_health_gain: 0.1
  reward_mode: distal_chemo_contact_trigger
  penalty_temperature_proximity: 0.3
satiety:
  initial_satiety: 900
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 20.0
environment:
  env_type: continuous_2d
  continuous:
    world_size_mm: 60.0
    body_length_mm: 1.0
    max_step_mm: 1.0
    capture_radius_mm: 2.0
    sweep_amplitude_mm: 0.5
    max_turn_rad: 0.5
    predator_damage_radius_mm: 1.0
  viewport_size:
  - 11
  - 11
  sensing:
    chemotaxis_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1
    adaptive_chemosensor_enabled: true
    adaptive_chemosensor_readout: fold_change
    adaptive_chemosensor_alpha: 0.1
    adaptive_chemosensor_epsilon: 0.1
    predator_mechano_mode: klinotaxis
    predator_distal_mode: klinotaxis
    thermotaxis_mode: klinotaxis
  foraging:
    foods_on_grid: 45
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_field_mode: fick
    gradient_decay_constant: 24.0
    gradient_strength: 1.0
  health:
    max_hp: 100.0
    predator_damage: 15.0
    food_healing: 10.0
  predators:
    enabled: true
    count: 2
    speed: 0.4
    movement_pattern: pursuit
    detection_radius: 15
    gradient_decay_constant: 5.0
    gradient_strength: 1.0
  thermotaxis:
    enabled: true
    cultivation_temperature: 20.0
    base_temperature: 20.0
    gradient_direction: 0.0
    gradient_strength: 0.4
    hot_spots: []
    cold_spots: []
    spot_decay_constant: 8.0
    comfort_reward: 0.0
    discomfort_penalty: -0.05
    danger_penalty: -0.3
    reward_discomfort_food: 0.0
    danger_hp_damage: 2.0
    lethal_hp_damage: 10.0
    comfort_delta: 5.0
    discomfort_delta: 10.0
    danger_delta: 15.0
evolution:
  algorithm: ga
  generations: 50
  population_size: 64
  episodes_per_eval: 3
  parallel_workers: 8
  checkpoint_every: 10
  sigma0: 0.5
  elite_fraction: 0.2
  mutation_rate: 0.1
  crossover_rate: 0.8
