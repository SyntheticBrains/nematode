# M6.9+ TEI re-evaluation — F0 calibration smoke
# ============================================================================
#
# F0-only calibration variant of the tei_on arm. Used by the campaign
# shell's ``--smoke`` subcommand to verify the four mid-flight
# tripwires BEFORE unblocking the multi-seed pilot/full campaign:
#
#   T1: F0 survival envelope ``0.30 ≤ mean F0 survival_rate ≤ 0.70``
#       (constructed; no wet-lab analogue per logbook 018 honest gap).
#   T2: Substrate diversity — pairwise coefficient-of-variation across
#       the 4 calibration seeds' extracted ``bias_network.state_dict()``
#       tensors > 5%. Catches the M6 "3-of-4 bit-identical substrate"
#       failure mode BEFORE pilot compute is spent. Computed by
#       ``scripts/campaigns/m69_substrate_diversity.py`` (commit 7).
#   T3: M6-floor-to-beat — F0 survival exceeds the M6 "circle right
#       always" baseline's survival_rate on the new env (recomputable
#       from M6 artefacts at K=0).
#   T4: Substrate magnitude — mean absolute bias-network output over
#       probes > 0.1.
#
# All four MUST pass before pilot is unblocked. Any failure triggers
# the design.md § D6 pivot table.
#
# Diffs from transgenerational_m69_tei_on.yml:
#   - ``evolution.generations: 1`` (was 4) — F0-only.
#   - ``evolution.population_size: 6`` (TEI-on pilot is 8) — cheaper
#     calibration set.
#   - ``lawn_schedule`` trimmed to the gen-0 entry only (the coverage
#     validator requires exactly one entry per gen in
#     ``[0, generations)``).
#
# Everything else — env, brain, reward, hyperparam_schema, bias_network
# + probe_ring config — matches the TEI-on pilot exactly so the
# calibration smoke MEASURES the same substrate the full campaign
# will use.

max_steps: 1000

brain:
  name: lstmppo
  config:
    rnn_type: gru
    lstm_hidden_dim: 64
    bptt_chunk_length: 16

    actor_hidden_dim: 64
    critic_hidden_dim: 128
    actor_num_layers: 2
    critic_num_layers: 2

    actor_lr: 0.0003
    critic_lr: 0.0003

    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    rollout_buffer_size: 512
    num_epochs: 4
    max_grad_norm: 0.5

    entropy_coef: 0.02
    entropy_coef_end: 0.005
    entropy_decay_episodes: 500

    lr_warmup_episodes: 50
    lr_warmup_start: 0.00003
    lr_decay_episodes: 1500
    lr_decay_end: 0.00003

    weight_init_scale: 1.0

    sensory_modules:
      - food_chemotaxis
      - nociception
      - mechanosensation
      - proprioception

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.5
  reward_health_gain: 0.1
  reward_mode: gradient_only

satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  grid_size: 15
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    nociception_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 8
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 5
    speed: 0.0
    movement_pattern: stationary
    detection_radius: 4
    damage_radius: 3
    gradient_decay_constant: 8.0
    gradient_strength: 1.2

  health:
    max_hp: 100.0
    predator_damage: 15.0
    food_healing: 10.0

evolution:
  algorithm: tpe
  population_size: 6
  generations: 1
  episodes_per_eval: 25
  learn_episodes_per_eval: 1000
  eval_episodes_per_eval: 25
  sigma0: 1.0
  parallel_workers: 6
  checkpoint_every: 1
  cma_diagonal: false
  inheritance: transgenerational
  fitness_survival_weight: 1.0
  # Spec primary metric (M6.9+ § D5). T1 F0 envelope check reads
  # survival_rate from eval_diagnostics.jsonl produced under this
  # dispatch — calibration smoke uses the same fitness shape the
  # pilot/full campaign will use.
  fitness_metric: survival_rate
  transgenerational:
    enabled: true
    decay_factor: 0.6
    decay_shape: geometric
    extraction_seed: 424242
    bias_network:
      hidden_dim: 8
      activation: tanh
      input_features:
        - predator_gradient_strength
        - predator_gradient_direction_sin
        - food_gradient_strength
    probe_ring:
      count: 8
      radius_offset: 1
      include_food_gradient_variants: false
    lawn_schedule:
      - generation: 0
        pathogen_lawns_enabled: true
        ppo_train_episodes: 1000

hyperparam_schema:
  - name: actor_lr
    type: float
    bounds: [1.0e-5, 1.0e-3]
    log_scale: true
  - name: critic_lr
    type: float
    bounds: [1.0e-5, 1.0e-3]
    log_scale: true
  - name: gamma
    type: float
    bounds: [0.9, 0.999]
  - name: entropy_coef
    type: float
    bounds: [1.0e-4, 0.1]
    log_scale: true
  - name: weight_init_scale
    type: float
    bounds: [0.5, 2.0]
  - name: entropy_decay_episodes
    type: int
    bounds: [200, 2000]
