# From-scratch CONTROL RETRY Pilot — LSTMPPO + klinotaxis + pursuit predators
# ============================================================================
#
# This is the matching control arm for the M4.5 Baldwin retry pilot
# (logbook 015).  Identical to baldwin_lstmppo_klinotaxis_predator_retry_pilot.yml
# in every field EXCEPT ``evolution.inheritance: none``.  Same brain
# config, same env, same K=50/L=25, same TPE, same parallel=4, same
# pop=12, same generations=20, same 8-field hyperparam_schema, same
# early_stop_on_saturation=5.
#
# This config exists to satisfy add-baldwin-retry design Decision 2
# (audit finding A1 closure): identical schemas across compared arms
# means TPE samples the same parameter vectors at gen-0 under the
# same seed → byte-identical starting populations.  The aggregator's
# pre-flight schema-equalisation check forces verdict to INCONCLUSIVE
# if gen-0 |Δ| > 0.05 between Baldwin and Control means.
#
# Under inheritance: none the loop is byte-equivalent to a frozen-
# weight evolution baseline: no inheritance/ directory, no per-genome
# checkpoints, empty inherited_from in lineage.  TPE evolves the
# 8-field genome from scratch each generation.  Compare to the
# Baldwin arm where TPE evolves the same 8-field genome BUT each
# child's lineage row records the prior generation's elite genome
# ID (the trait inheritance signal).

max_steps: 1000

brain:
  name: lstmppo
  config:
    rnn_type: gru
    lstm_hidden_dim: 64
    bptt_chunk_length: 16

    # actor_hidden_dim and actor_num_layers are evolved via the schema
    # below; these defaults are the brain-config fallback used only if
    # the schema doesn't include them (it does).
    actor_hidden_dim: 64
    actor_num_layers: 2

    critic_hidden_dim: 128
    critic_num_layers: 2

    actor_lr: 0.0003
    critic_lr: 0.0003

    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    rollout_buffer_size: 512
    num_epochs: 4
    max_grad_norm: 0.5

    entropy_coef: 0.02
    entropy_coef_end: 0.005
    # entropy_decay_episodes is moved into the schema below; this default
    # is the brain-config fallback used only if the schema doesn't include
    # it (it does).
    entropy_decay_episodes: 500

    lr_warmup_episodes: 50
    lr_warmup_start: 0.00003
    lr_decay_episodes: 1500
    lr_decay_end: 0.00003

    # weight_init_scale is moved into the schema below; this default
    # of 1.0 is byte-equivalent to the standard PPO init (gain=sqrt(2)
    # for hidden Linears).
    weight_init_scale: 1.0

    sensory_modules:
      - food_chemotaxis
      - nociception
      - mechanosensation
      - proprioception

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.5
  reward_health_gain: 0.1

satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    nociception_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 6
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 2
    speed: 0.5
    movement_pattern: pursuit
    detection_radius: 6
    gradient_decay_constant: 10.0
    gradient_strength: 1.0

  health:
    max_hp: 100.0
    predator_damage: 20.0
    food_healing: 10.0

evolution:
  algorithm: tpe
  population_size: 12
  generations: 20
  episodes_per_eval: 25
  learn_episodes_per_eval: 50
  eval_episodes_per_eval: 25
  sigma0: 1.0
  parallel_workers: 4
  checkpoint_every: 2
  cma_diagonal: false
  # No inheritance — frozen-weight evolution baseline.  Each child
  # trains from-scratch every generation.  No inheritance/ directory
  # is created; lineage's inherited_from is empty for all rows.
  inheritance: none
  # Same early-stop config as Baldwin so wall-time benefits are
  # symmetric across arms.
  early_stop_on_saturation: 5

# Schema is BYTE-IDENTICAL to baldwin_lstmppo_klinotaxis_predator_retry_pilot.yml's
# (modulo ordering — must be the same order so TPE samples the same x_i
# from the same bounds in the same trial-suggestion sequence).  Per
# add-baldwin-retry design Decision 2 (audit A1 closure).
hyperparam_schema:
  # 4 hyperparam knobs (carried from M4 control).
  - name: actor_lr
    type: float
    bounds: [1.0e-5, 1.0e-3]
    log_scale: true
  - name: critic_lr
    type: float
    bounds: [1.0e-5, 1.0e-3]
    log_scale: true
  - name: gamma
    type: float
    bounds: [0.9, 0.999]
  - name: entropy_coef
    type: float
    bounds: [1.0e-4, 0.1]
    log_scale: true

  # 2 innate-bias knobs (carried from M4 Baldwin).
  - name: weight_init_scale
    type: float
    bounds: [0.5, 2.0]
  - name: entropy_decay_episodes
    type: int
    bounds: [200, 2000]

  # 2 NEW arch knobs (audit A5 hypothesis).
  - name: actor_hidden_dim
    type: int
    bounds: [64, 256]
  - name: actor_num_layers
    type: int
    bounds: [1, 3]
