# Hyperparameter Evolution Pilot — LSTMPPO + klinotaxis sensing
# ============================================================================
#
# PR 3 of the post-M0 evolution work split.  Validates the M2 framework
# (shipped in PR #134, plus the bug-fixes shipped in this PR) on a
# harder discriminator than the MLPPPO arm:
#   - Recurrent brain (slower training).
#   - Klinotaxis sensing (tighter constraint than oracle chemotaxis).
#   - rnn_type categorical exercises the framework's mixed-type handling
#     (bool/categorical encoding lives in HyperparameterEncoder).
#
# Each genome evaluation:
#   1. HyperparameterEncoder.decode patches LSTMPPOBrainConfig with the
#      genome's evolved values and constructs a fresh brain.
#   2. K = learn_episodes_per_eval (50) train episodes via
#      StandardEpisodeRunner — brain.learn() fires; weights mutate.
#   3. L = eval_episodes_per_eval (25) frozen eval episodes via
#      FrozenEvalRunner — score = COMPLETED_ALL_FOOD count / L.
#
# K = 50 (vs MLPPPO's 30): LSTMPPO + klinotaxis trains slower than
#   MLPPPO + oracle.  M2 part-1's K=30 saturated MLPPPO at gen 1 because
#   the policy was easy to learn; LSTMPPO needs more train episodes
#   before the eval signal stabilises.
# L = 25 (vs MLPPPO's 5): logbook 012 part-1 lesson #3 was "L=5 cannot
#   discriminate good from perfect — bump L".  Going to L=25 sharpens the
#   binomial confidence interval substantially:
#   p(25/25 | true=0.85) ≈ 0.017 (vs p(5/5 | true=0.85) ≈ 0.44).
#   K still dominates per-genome cost so wall-time is roughly K + L.
#
# Decision gate (gate-pp default 3pp; aggregator's --gate-pp overrides):
#   - GO    if mean across seeds ≥ baseline_mean + 3pp.
#   - PIVOT if positive but below 3pp (≥ +1pp; PIVOT_MIN_PP).
#   - STOP  otherwise.
#
# Baseline reference: configs/scenarios/foraging/lstmppo_small_klinotaxis.yml
# evaluated for 100 episodes per seed (training-mode trajectory measure
# matching how `run_simulation.py` reports success rate).
#
# cma_diagonal: false — n=6 is well within full-cov tractability.

max_steps: 1000  # klinotaxis sensing needs more steps than oracle

brain:
  name: lstmppo
  config:
    # Brain block mirrors the validated baseline at
    # configs/scenarios/foraging/lstmppo_small_klinotaxis.yml so that
    # the comparison point and the pilot's starting brain are matched
    # on every dimension EXCEPT the 6 evolved fields named in
    # ``hyperparam_schema`` below.
    rnn_type: gru
    lstm_hidden_dim: 64
    bptt_chunk_length: 16

    actor_hidden_dim: 64
    critic_hidden_dim: 128
    actor_num_layers: 2
    critic_num_layers: 2

    actor_lr: 0.0003
    critic_lr: 0.0003

    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    rollout_buffer_size: 512
    num_epochs: 4
    max_grad_norm: 0.5

    entropy_coef: 0.02
    entropy_coef_end: 0.005
    entropy_decay_episodes: 800

    lr_warmup_episodes: 50
    lr_warmup_start: 0.00003
    lr_decay_episodes: 1500
    lr_decay_end: 0.00003

    sensory_modules:
      - food_chemotaxis
      - proprioception

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02

satiety:
  initial_satiety: 400.0
  satiety_decay_rate: 1.0
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 5
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0

evolution:
  algorithm: cmaes
  population_size: 12
  generations: 20
  episodes_per_eval: 25  # L fallback when eval_episodes_per_eval is None
  learn_episodes_per_eval: 50  # K — train phase
  eval_episodes_per_eval: 25   # L — eval phase
  # sigma0=1.0 pairs with the encoder's per-param genome_stds (each std
  # equals bound-width/6).  Same rationale as the MLPPPO arm: the
  # default math.pi/2 is too aggressive for log-scale and tight-bound
  # dimensions.
  sigma0: 1.0
  parallel_workers: 4
  checkpoint_every: 2
  cma_diagonal: false

hyperparam_schema:
  # Categorical (1) — exercises the framework's mixed-type handling.
  # GRU is the baseline default; LSTM is the alternative.
  - name: rnn_type
    type: categorical
    values: [lstm, gru]
  # Architectural int (1).
  - name: lstm_hidden_dim
    type: int
    bounds: [32, 128]
  # PPO floats (4): two independent learning rates, gamma, entropy.
  - name: actor_lr
    type: float
    bounds: [1.0e-5, 1.0e-3]
    log_scale: true
  - name: critic_lr
    type: float
    bounds: [1.0e-5, 1.0e-3]
    log_scale: true
  - name: gamma
    type: float
    bounds: [0.9, 0.999]
  - name: entropy_coef
    type: float
    bounds: [1.0e-4, 0.1]
    log_scale: true
