# Quantum Plasticity Test — HybridQuantum (Stage 3 Joint Fine-Tune)
# Tests whether PQC unitarity prevents catastrophic forgetting during
# sequential multi-objective training.
#
# Protocol: Foraging → Pursuit Predators → Thermotaxis+Pursuit → Foraging Return
# All phases on 100×100 grid.
#
# NOTE: This config trains from scratch (no pre-trained weights) because the
# plasticity test requires fresh initialisation per seed. The existing Stage 3
# pre-trained weights were trained on small grids with different sensory modules.
# Training stage is set to 3 so both reflex and cortex are trainable jointly.
#
# Quantum architecture: QSNN reflex + classical cortex MLP + mode-gated fusion.
# Classical control: hybridclassical_plasticity.yml (MLP reflex instead of QSNN).

brain:
  name: hybridquantum
  config:
    training_stage: 3

    # QSNN reflex params
    num_sensory_neurons: 6
    num_hidden_neurons: 8
    num_motor_neurons: 4
    membrane_tau: 0.9
    threshold: 0.5
    refractory_period: 0
    shots: 1024
    num_qsnn_timesteps: 10
    surrogate_alpha: 1.0
    logit_scale: 5.0
    weight_clip: 3.0
    theta_motor_max_norm: 1.0

    # QSNN REINFORCE params
    qsnn_lr: 0.01
    joint_finetune_lr_factor: 1.0  # No reduction — training from scratch
    qsnn_lr_decay_episodes: 150
    num_reinforce_epochs: 2
    reinforce_window_size: 20
    gamma: 0.99
    advantage_clip: 2.0
    clip_epsilon: 0.2
    lr_min_factor: 0.1

    # Cortex params
    cortex_hidden_dim: 64
    cortex_num_layers: 2
    num_modes: 3

    # Cortex PPO params
    cortex_actor_lr: 0.0005
    cortex_critic_lr: 0.0005
    ppo_clip_epsilon: 0.2
    ppo_epochs: 10
    ppo_minibatches: 2
    ppo_buffer_size: 512
    gae_lambda: 0.95
    entropy_coeff: 0.015
    max_grad_norm: 0.5

    cortex_lr_warmup_episodes: 30
    cortex_lr_warmup_start: 0.0001
    cortex_lr_decay_episodes: 150
    cortex_lr_decay_end: 0.0001

    sensory_modules:
      - food_chemotaxis
      - nociception
      - thermotaxis

body_length: 2

plasticity:
  training_episodes_per_phase: 200
  eval_episodes: 50
  convergence_threshold: 0.6
  seeds: [42, 123, 256, 512, 789, 1024, 2048, 4096]
  phases:
    - name: foraging
      max_steps: 2000
      environment:
        grid_size: 100
        viewport_size: [11, 11]
        use_separated_gradients: true
        foraging:
          foods_on_grid: 45
          target_foods_to_collect: 25
          min_food_distance: 8
          agent_exclusion_radius: 12
          gradient_decay_constant: 12.0
          gradient_strength: 1.0
      reward:
        reward_goal: 2.0
        reward_distance_scale: 0.5
        reward_exploration: 0.05
        penalty_step: 0.005
        penalty_anti_dithering: 0.02
        penalty_stuck_position: 0
        penalty_starvation: 10.0
        stuck_position_threshold: 0
        penalty_boundary_collision: 0.02
      satiety:
        initial_satiety: 800.0
        satiety_decay_rate: 1.0
        satiety_gain_per_food: 0.2

    - name: pursuit_predators
      max_steps: 2000
      environment:
        grid_size: 100
        viewport_size: [11, 11]
        use_separated_gradients: true
        foraging:
          foods_on_grid: 45
          target_foods_to_collect: 25
          min_food_distance: 8
          agent_exclusion_radius: 12
          gradient_decay_constant: 12.0
          gradient_strength: 1.0
        predators:
          enabled: true
          count: 4
          speed: 0.5
          movement_pattern: pursuit
          detection_radius: 10
          kill_radius: 0
          gradient_decay_constant: 12.0
          gradient_strength: 1.0
        health:
          enabled: true
          max_hp: 150.0
          predator_damage: 15.0
          food_healing: 15.0
      reward:
        reward_goal: 2.0
        reward_distance_scale: 0.5
        reward_exploration: 0.05
        penalty_step: 0.005
        penalty_anti_dithering: 0.02
        penalty_stuck_position: 0
        penalty_starvation: 10.0
        penalty_predator_death: 10.0
        penalty_predator_proximity: 0.4
        stuck_position_threshold: 0
        penalty_boundary_collision: 0.02
        penalty_health_damage: 0.3
        reward_health_gain: 0.2
      satiety:
        initial_satiety: 800.0
        satiety_decay_rate: 1.0
        satiety_gain_per_food: 0.2

    - name: thermotaxis_pursuit
