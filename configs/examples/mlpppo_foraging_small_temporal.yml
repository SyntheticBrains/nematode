# Temporal Sensing - Dynamic Foraging Environment - Small Configuration
# Phase 3: Biologically-accurate sensing replacing oracle spatial gradients
#
# Sensing mode: temporal (Mode A)
#   - Agent receives only scalar food concentration at its position
#   - No gradient direction provided — agent must infer from movement + STAM
#   - Models C. elegans chemosensory neurons (AWC, AWA) performing temporal
#     concentration comparisons during head sweeps
#
# STAM (Short-Term Associative Memory):
#   - Exponential-decay buffer storing recent sensory readings
#   - buffer_size=30, decay_rate=0.1 → half-life ~7 steps
#   - Biological timescale: ~10-15s (ASE neuron temporal comparisons)
#   - Molecular basis: cAMP/calcium signaling pathways

max_steps: 500
brain:
  name: mlpppo
  config:
    actor_hidden_dim: 64
    critic_hidden_dim: 64
    num_hidden_layers: 2

    # Core PPO hyperparameters
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    entropy_coef: 0.02
    learning_rate: 0.001
    rollout_buffer_size: 256
    num_epochs: 10
    num_minibatches: 2
    max_grad_norm: 0.5
    normalize_advantages: true

    sensory_modules:
      - food_chemotaxis  # Auto-translated to food_chemotaxis_temporal

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02

satiety:
  initial_satiety: 200.0
  satiety_decay_rate: 1.0
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]
  use_separated_gradients: true

  sensing:
    chemotaxis_mode: temporal  # Mode A: scalar concentration only
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 5
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0
