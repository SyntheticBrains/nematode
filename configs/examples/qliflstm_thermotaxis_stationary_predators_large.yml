# QLIF-LSTM with Thermotaxis + Stationary Predators - Large Configuration
# H.4 Stage 4c: Stationary predators as toxic zones
# Custom LSTM cell with QLIF quantum gates + PPO with truncated BPTT
#
# Complements pursuit predator evaluation with a qualitatively different task:
# - Pursuit predators: temporal evasion (dynamic threat, chase mechanics)
# - Stationary predators: spatial avoidance (fixed toxic zones, larger damage radius)
#
# Task combines all three objectives:
# - Food collection in a large environment (chemotaxis)
# - Stationary predator avoidance (nociception) — toxic zones with damage_radius=4
# - Scattered temperature zones (thermotaxis)
#
# Temporal memory helps with:
# - Remembering fixed predator locations (spatial mapping)
# - Tracking which food sources are near toxic zones
# - Learning safe navigation corridors

max_steps: 2000
brain:
  name: qliflstm
  config:
    # LSTM architecture
    lstm_hidden_dim: 48

    # QLIF gate parameters
    shots: 1024
    membrane_tau: 0.9
    refractory_period: 0
    use_quantum_gates: true

    # PPO hyperparameters
    actor_lr: 0.001
    critic_lr: 0.001
    gamma: 0.99
    gae_lambda: 0.95
    clip_epsilon: 0.2
    entropy_coef: 0.03
    entropy_coef_end: 0.015
    entropy_decay_episodes: 500
    value_loss_coef: 0.5
    num_epochs: 3
    rollout_buffer_size: 512
    max_grad_norm: 0.5

    # Recurrent PPO
    bptt_chunk_length: 32

    # Critic
    critic_hidden_dim: 128
    critic_num_layers: 2

    # Unified sensory modules for triple-objective task
    sensory_modules:
      - food_chemotaxis
      - nociception
      - thermotaxis

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.4
  penalty_temperature_proximity: 0.3
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.3
  reward_health_gain: 0.2

satiety:
  initial_satiety: 800.0
  satiety_decay_rate: 1.0
  satiety_gain_per_food: 0.2

environment:
  grid_size: 100
  viewport_size: [11, 11]
  use_separated_gradients: true

  foraging:
    foods_on_grid: 45
    target_foods_to_collect: 25
    min_food_distance: 8
    agent_exclusion_radius: 12
    gradient_decay_constant: 12.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 5
    speed: 0.0
    movement_pattern: stationary
    detection_radius: 8
    kill_radius: 0
    damage_radius: 4
    gradient_decay_constant: 5.0
    gradient_strength: 1.2

  health:
    enabled: true
    max_hp: 150.0
    predator_damage: 10.0
    food_healing: 15.0

  thermotaxis:
    enabled: true
    cultivation_temperature: 20.0
    base_temperature: 20.0
    gradient_direction: 0.0
    gradient_strength: 0.15
    hot_spots:
      - [75, 50, 25.0]
      - [25, 75, 20.0]
      - [80, 80, 22.0]
    cold_spots:
      - [25, 25, 25.0]
      - [75, 25, 20.0]
      - [50, 85, 18.0]
    spot_decay_constant: 6.5
    comfort_reward: 0.0
    discomfort_penalty: -0.05
    danger_penalty: -0.5
    reward_discomfort_food: 0.3
    danger_hp_damage: 0.5
    lethal_hp_damage: 6.0
    comfort_delta: 5.0
    discomfort_delta: 10.0
    danger_delta: 15.0
