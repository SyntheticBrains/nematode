# MLP PPO with Thermotaxis + Stationary Predators - Large Configuration (Fair Comparison)
# Classical baseline matched to QEF environment and reward settings.
#
# Differences from mlpppo_thermotaxis_stationary_predators_large.yml:
# - actor/critic: 64x2 (was 256x4) — matches QEF readout capacity
# - sensory_modules: 3 modules (was 4) — no mechanosensation, matches QEF
# - rollout_buffer_size: 512 (was 1024) — matches QEF
# - num_minibatches: 2 (was 4) — matches QEF
# - entropy_coef: 0.015 (was 0.02) — matches QEF
# - lr_decay_episodes: 1200 (was 300) — matches QEF stationary decay window
# - penalty_predator_proximity: 0.4 (was 0.3) — matches QEF

max_steps: 2000
brain:
  name: mlpppo
  config:
    actor_hidden_dim: 64
    critic_hidden_dim: 64
    num_hidden_layers: 2
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    entropy_coef: 0.015
    learning_rate: 0.001
    rollout_buffer_size: 512
    num_epochs: 10
    num_minibatches: 2
    max_grad_norm: 0.5
    normalize_advantages: true

    # LR schedule (matched to QEF stationary decay window)
    lr_warmup_episodes: 30
    lr_warmup_start: 0.0001
    lr_decay_episodes: 1200
    lr_decay_end: 0.0001

    # Sensory modules (matched to QEF — 3 modules, no mechanosensation)
    sensory_modules:
      - food_chemotaxis
      - nociception
      - thermotaxis

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.4
  penalty_temperature_proximity: 0.3
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.3
  reward_health_gain: 0.2

satiety:
  initial_satiety: 800.0
  satiety_decay_rate: 1.0
  satiety_gain_per_food: 0.2

environment:
  grid_size: 100
  viewport_size: [11, 11]
  use_separated_gradients: true

  foraging:
    foods_on_grid: 45
    target_foods_to_collect: 25
    min_food_distance: 8
    agent_exclusion_radius: 12
    gradient_decay_constant: 12.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 5
    speed: 0.0
    movement_pattern: stationary
    detection_radius: 8
    kill_radius: 0
    damage_radius: 4
    gradient_decay_constant: 5.0
    gradient_strength: 1.2

  health:
    enabled: true
    max_hp: 150.0
    predator_damage: 10.0
    food_healing: 15.0

  thermotaxis:
    enabled: true
    cultivation_temperature: 20.0
    base_temperature: 20.0
    gradient_direction: 0.0
    gradient_strength: 0.15
    hot_spots:
      - [75, 50, 25.0]
      - [25, 75, 20.0]
      - [80, 80, 22.0]
    cold_spots:
      - [25, 25, 25.0]
      - [75, 25, 20.0]
      - [50, 85, 18.0]
    spot_decay_constant: 6.5
    comfort_reward: 0.0
    discomfort_penalty: -0.05
    danger_penalty: -0.5
    reward_discomfort_food: 0.3
    danger_hp_damage: 0.5
    lethal_hp_damage: 6.0
    comfort_delta: 5.0
    discomfort_delta: 10.0
    danger_delta: 15.0
