# Derivative Sensing - LSTM PPO Brain with Pursuit Predators - Small Configuration
# Phase 3: LSTM PPO with biologically-plausible derivative sensing
#
# Architecture: Features → LayerNorm → LSTM(64) → Actor MLP / Critic MLP (detached h)
# Training: Chunk-based truncated BPTT with separate actor/critic optimizers
#
# Sensing modes:
#   - chemotaxis: derivative (Mode B) — scalar food concentration + dC/dt
#   - nociception: derivative (Mode B) — scalar predator concentration + dC/dt
#
# Pursuit predators: actively chase when agent is within detection radius

max_steps: 500
brain:
  name: lstmppo
  config:
    rnn_type: lstm
    lstm_hidden_dim: 64
    bptt_chunk_length: 16

    # Actor/Critic MLP — larger for predator avoidance complexity
    actor_hidden_dim: 128
    critic_hidden_dim: 128
    actor_num_layers: 2
    critic_num_layers: 2

    # Separate learning rates
    actor_lr: 0.0005
    critic_lr: 0.0005

    # PPO hyperparameters
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.98
    value_loss_coef: 0.5
    rollout_buffer_size: 512
    num_epochs: 6
    max_grad_norm: 0.5

    # Entropy decay
    entropy_coef: 0.02
    entropy_coef_end: 0.008
    entropy_decay_episodes: 500

    # LR schedule
    lr_warmup_episodes: 50
    lr_warmup_start: 0.00005
    lr_decay_episodes: 200
    lr_decay_end: 0.00005

    sensory_modules:
      - food_chemotaxis     # Auto-translated to food_chemotaxis_temporal
      - nociception         # Auto-translated to nociception_temporal
      - mechanosensation    # Already biologically accurate, no translation
      - proprioception      # Heading direction — critical for correlating derivatives with movement

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.5
  reward_health_gain: 0.1

satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]
  use_separated_gradients: true

  sensing:
    chemotaxis_mode: derivative     # Mode B: scalar + dC/dt
    nociception_mode: derivative    # Mode B: scalar + dC/dt
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 6
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 2
    speed: 0.5
    movement_pattern: pursuit
    detection_radius: 6
    kill_radius: 0
    gradient_decay_constant: 10.0
    gradient_strength: 1.0

  health:
    enabled: true
    max_hp: 100.0
    predator_damage: 20.0
    food_healing: 10.0
