# Dynamic Foraging with Pursuit Predators - Small Configuration
# Uses QRH (Quantum Reservoir Hybrid) brain architecture
# Multi-objective learning: find food while avoiding predators
# Uses unified sensory modules for multi-sensory input
#
# Based on proven QRH foraging config (Round 8: 86.8% success, 98% post-convergence)
# with predator-specific adjustments matching MLPPPO pursuit predator sensory config.
#
# Key differences from foraging-only config:
# - sensory_modules: food_chemotaxis + nociception (4 features, was 2 legacy)
# - use_separated_gradients: true (required for per-module gradients)
# - Predators: 2 pursuit, speed 0.5, detection_radius 6
# - Higher satiety (300, decay 0.8) to offset predator disruption
# - 6 foods on grid (was 5) to compensate for predator interference
# - gae_lambda: 0.98 (was 0.95) for longer credit assignment with predator evasion
# - penalty_predator_proximity: 0.15, penalty_predator_death: 10.0
# - Health system enabled (predator damage + food healing)

max_steps: 500
brain:
  name: qrh
  config:
    # Reservoir parameters
    num_reservoir_qubits: 8
    reservoir_depth: 3
    reservoir_seed: 42

    # Readout architecture (actor + critic)
    readout_hidden_dim: 64
    readout_num_layers: 2

    # PPO hyperparameters (aligned with proven Round 8 foraging settings)
    actor_lr: 0.0005
    critic_lr: 0.0005
    gamma: 0.99
    gae_lambda: 0.98
    ppo_clip_epsilon: 0.2
    ppo_epochs: 6
    ppo_minibatches: 2
    ppo_buffer_size: 256
    entropy_coeff: 0.02
    value_loss_coef: 0.5
    max_grad_norm: 0.5

    # LR warmup (ramp from 10% to full LR over first 30 episodes)
    lr_warmup_episodes: 30
    lr_warmup_start: 0.00005

    # Topology
    use_random_topology: true

    # Unified sensory modules for multi-objective tasks
    sensory_modules:
      - food_chemotaxis
      - nociception

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.5
  reward_health_gain: 0.1

satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]
  use_separated_gradients: true

  foraging:
    foods_on_grid: 6
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 2
    speed: 0.5
    movement_pattern: pursuit
    detection_radius: 6
    kill_radius: 0
    gradient_decay_constant: 10.0
    gradient_strength: 1.0

  health:
    enabled: true
    max_hp: 100.0
    predator_damage: 20.0
    food_healing: 10.0
