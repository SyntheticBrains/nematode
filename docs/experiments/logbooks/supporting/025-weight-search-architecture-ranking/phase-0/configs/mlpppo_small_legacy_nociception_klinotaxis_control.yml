# Legacy-nociception control for the predator-sensing-biology smoke evaluation.
#
# Identical to mlpppo_small_predator_biology_klinotaxis.yml except the
# sensory_modules use the frozen-legacy `nociception` sensor instead of
# the new two-channel predator_mechanosensation + predator_chemosensation.
# Lets us compare "new biology" vs "old biology" head-to-head at matched
# seed / env / brain hyperparameters over 100 episodes.
#
# Persisted under docs/experiments/logbooks/supporting/025-weight-search-architecture-ranking/phase-0/configs/
# as the reproducibility artefact for the Phase 0 legacy-nociception reference
# baseline (A1). Not promoted into configs/scenarios/ because the legacy
# `nociception` sensor was superseded by the two-channel new biology in
# the predator-sensing-biology capability shipped on 2026-05-25.

max_steps: 500
brain:
  name: mlpppo
  config:
    actor_hidden_dim: 64
    critic_hidden_dim: 64
    num_hidden_layers: 2
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    entropy_coef: 0.02
    learning_rate: 0.001
    rollout_buffer_size: 256
    num_epochs: 10
    num_minibatches: 2
    max_grad_norm: 0.5
    normalize_advantages: true
    sensory_modules:
      - food_chemotaxis  # Auto-translated to food_chemotaxis_klinotaxis
      - nociception      # Auto-translated to nociception_klinotaxis (LEGACY path)
      - proprioception
      - stam

body_length: 2

reward:
  reward_mode: default  # Explicit pin for reproducibility of A1 (default reward = legacy distance-scaled evasion + flat fallback).
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.5
  reward_health_gain: 0.1

satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    nociception_mode: klinotaxis  # Legacy field; drives the frozen nociception_* modules
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 6
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 2
    speed: 0.5
    movement_pattern: pursuit
    detection_radius: 6
    gradient_decay_constant: 10.0
    gradient_strength: 1.0

  health:
    max_hp: 100.0
    predator_damage: 20.0
    food_healing: 10.0
