# Sparse-search foraging memory test — LSTMPPO (GRU; the memory arm).
#
# IDENTICAL env + reward block to mlpppo_sparse_g100_d3.yml — only the brain
# differs. 100x100, 6 foods, no_respawn, short-range gradient (decay 3.0) -> most
# of the map is a dead zone -> foraging is search-then-exploit. The recurrent
# hidden state can carry a search strategy (systematic sweep, "already explored
# the NE", integrate a faint sub-threshold gradient over time) across the
# signal-less steps — the hypothesis is that this beats the memoryless MLP's
# entropy-only wandering, opening the gap that the dense/reactive cells masked.
#
# Brain = the ranked C3 LSTMPPO architecture verbatim (GRU + recurrent-stability
# stack), with foraging-only sensory modules. Primary metric:
# avg_foods_collected (graded search efficiency).

max_steps: 2000
brain:
  name: lstmppo
  config:
    rnn_type: gru
    lstm_hidden_dim: 64
    bptt_chunk_length: 64

    actor_hidden_dim: 64
    critic_hidden_dim: 128
    actor_num_layers: 2
    critic_num_layers: 2

    actor_lr: 0.0003
    critic_lr: 0.0003

    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    rollout_buffer_size: 512
    num_epochs: 4
    max_grad_norm: 0.5

    recurrent_layernorm: true

    entropy_coef: 0.05
    entropy_coef_end: 0.02
    entropy_decay_episodes: 800

    sensory_modules:
      - food_chemotaxis   # Auto-translated to food_chemotaxis_klinotaxis
      - proprioception
      - stam

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.0
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  reward_health_gain: 0.1

satiety:
  initial_satiety: 1500.0
  satiety_decay_rate: 1.0
  satiety_gain_per_food: 0.2

environment:
  grid_size: 100
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    foods_on_grid: 6
    target_foods_to_collect: 6
    min_food_distance: 20
    agent_exclusion_radius: 12
    gradient_decay_constant: 3.0
    gradient_strength: 1.0
    no_respawn: true
