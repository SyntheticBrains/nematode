# Quantum Plasticity Test — MLP PPO (Pure Classical Baseline)
# Tests whether PQC unitarity prevents catastrophic forgetting during
# sequential multi-objective training.
#
# Protocol: Foraging → Pursuit Predators → Thermotaxis+Pursuit → Foraging Return
# All phases on 100×100 grid.
#
# Pure classical baseline. No quantum pair — serves as overall reference.
# Architecture matched to QEF fair comparison (64x2 readout).

brain:
  name: mlpppo
  config:
    actor_hidden_dim: 64
    critic_hidden_dim: 64
    num_hidden_layers: 2
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    entropy_coef: 0.015
    learning_rate: 0.001
    rollout_buffer_size: 1024
    num_epochs: 10
    num_minibatches: 4
    max_grad_norm: 0.5
    normalize_advantages: true

    lr_warmup_episodes: 30
    lr_warmup_start: 0.0001
    lr_decay_episodes: 150
    lr_decay_end: 0.0001

    sensory_modules:
      - food_chemotaxis
      - nociception
      - thermotaxis

body_length: 2

plasticity:
  training_episodes_per_phase: 200
  eval_episodes: 50
  convergence_threshold: 0.6
  seeds: [42, 123, 256, 512, 789, 1024, 2048, 4096]
  phases:
    - name: foraging
      max_steps: 2000
      environment:
        grid_size: 100
        viewport_size: [11, 11]
        use_separated_gradients: true
        foraging:
          foods_on_grid: 45
          target_foods_to_collect: 25
          min_food_distance: 8
          agent_exclusion_radius: 12
          gradient_decay_constant: 12.0
          gradient_strength: 1.0
      reward:
        reward_goal: 2.0
        reward_distance_scale: 0.5
        reward_exploration: 0.05
        penalty_step: 0.005
        penalty_anti_dithering: 0.02
        penalty_stuck_position: 0
        penalty_starvation: 10.0
        stuck_position_threshold: 0
        penalty_boundary_collision: 0.02
      satiety:
        initial_satiety: 800.0
        satiety_decay_rate: 1.0
        satiety_gain_per_food: 0.2

    - name: pursuit_predators
      max_steps: 2000
      environment:
        grid_size: 100
        viewport_size: [11, 11]
        use_separated_gradients: true
        foraging:
          foods_on_grid: 45
          target_foods_to_collect: 25
          min_food_distance: 8
          agent_exclusion_radius: 12
          gradient_decay_constant: 12.0
          gradient_strength: 1.0
        predators:
          enabled: true
          count: 4
          speed: 0.5
          movement_pattern: pursuit
          detection_radius: 10
          kill_radius: 0
          gradient_decay_constant: 12.0
          gradient_strength: 1.0
        health:
          enabled: true
          max_hp: 150.0
          predator_damage: 15.0
          food_healing: 15.0
      reward:
        reward_goal: 2.0
        reward_distance_scale: 0.5
        reward_exploration: 0.05
        penalty_step: 0.005
        penalty_anti_dithering: 0.02
        penalty_stuck_position: 0
        penalty_starvation: 10.0
        penalty_predator_death: 10.0
        penalty_predator_proximity: 0.4
        stuck_position_threshold: 0
        penalty_boundary_collision: 0.02
        penalty_health_damage: 0.3
        reward_health_gain: 0.2
      satiety:
        initial_satiety: 800.0
        satiety_decay_rate: 1.0
        satiety_gain_per_food: 0.2

    - name: thermotaxis_pursuit
      max_steps: 2000
      environment:
        grid_size: 100
        viewport_size: [11, 11]
        use_separated_gradients: true
        foraging:
          foods_on_grid: 45
          target_foods_to_collect: 25
          min_food_distance: 8
          agent_exclusion_radius: 12
          gradient_decay_constant: 12.0
          gradient_strength: 1.0
        predators:
          enabled: true
          count: 4
          speed: 0.5
          movement_pattern: pursuit
          detection_radius: 10
          kill_radius: 0
          gradient_decay_constant: 12.0
          gradient_strength: 1.0
        health:
          enabled: true
          max_hp: 150.0
          predator_damage: 15.0
          food_healing: 15.0
        thermotaxis:
          enabled: true
          cultivation_temperature: 20.0
          base_temperature: 20.0
          gradient_direction: 0.0
          gradient_strength: 0.15
          hot_spots:
            - [75, 50, 25.0]
            - [25, 75, 20.0]
            - [80, 80, 22.0]
          cold_spots:
            - [25, 25, 25.0]
            - [75, 25, 20.0]
            - [50, 85, 18.0]
          spot_decay_constant: 6.5
          comfort_reward: 0.0
          discomfort_penalty: -0.05
          danger_penalty: -0.5
          reward_discomfort_food: 0.3
          danger_hp_damage: 0.5
          lethal_hp_damage: 6.0
          comfort_delta: 5.0
          discomfort_delta: 10.0
          danger_delta: 15.0
      reward:
        reward_goal: 2.0
        reward_distance_scale: 0.5
        reward_exploration: 0.05
        penalty_step: 0.005
        penalty_anti_dithering: 0.02
        penalty_stuck_position: 0
        penalty_starvation: 10.0
        penalty_predator_death: 10.0
        penalty_predator_proximity: 0.4
        penalty_temperature_proximity: 0.3
        stuck_position_threshold: 0
        penalty_boundary_collision: 0.02
        penalty_health_damage: 0.3
        reward_health_gain: 0.2
      satiety:
        initial_satiety: 800.0
        satiety_decay_rate: 1.0
        satiety_gain_per_food: 0.2

    - name: foraging_return
      max_steps: 2000
