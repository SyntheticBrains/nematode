# QRH with Thermotaxis + Pursuit Predators - Large Configuration
# Curriculum level 3: Most challenging multi-objective task
# Uses QRH (Quantum Reservoir Hybrid) brain architecture
#
# This combines all challenge elements:
# - Food collection in a large environment (chemotaxis)
# - Active predator evasion with multiple hunters (nociception)
# - Scattered temperature zones (thermotaxis)
#
# Pursuit predators actively chase the agent when in detection range.
# Temperature zones create dangerous areas that must be navigated while evading predators.
# Agent must balance escaping predators vs avoiding dangerous temperature zones.
#
# 10-qubit reservoir: 7 sensory qubits + 3 interneuron qubits.
# Previous 8-qubit config (1 interneuron) achieved 32.6% success but with no thermotaxis
# learning. Small grid test confirmed 1-interneuron bottleneck (0.55% success).
# 3 interneurons should restore sufficient ZZ correlation features.
#
# Temperature zone layout (aligned with MLPPPO large):
# - Hot zones: right-center (75,50), top-left (25,75), top-right (80,80)
# - Cold zones: bottom-left (25,25), bottom-right (75,25), top-center (50,85)
#
# Large environment (100x100 grid):
# - Scattered hot/cold zones create diverse temperature landscape
# - 4 pursuit predators (fewer than stationary due to difficulty)
#
# Module feature breakdown:
# - food_chemotaxis: 2 features (strength, angle)
# - nociception: 2 features (strength, angle)
# - thermotaxis: 3 features (strength, angle, temp_deviation)
# Total: 7 features -> 7 sensory qubits, 3 interneuron qubits
# Feature dim: 3×10 + C(10,2) = 30 + 45 = 75
#
# No mechanosensation (would require 9 features = wrapping on 10 qubits)

max_steps: 2000
brain:
  name: qrh
  config:
    # Reservoir parameters (10 qubits: 7 sensory + 3 interneuron)
    num_reservoir_qubits: 10
    reservoir_depth: 3
    reservoir_seed: 42

    # Readout architecture (actor + critic) — 128 to match 75-feature input
    readout_hidden_dim: 128
    readout_num_layers: 2

    # PPO hyperparameters — R7 tuning for faster convergence
    # Key changes from R6: buffer 256→512, epochs 6→10, lambda 0.98→0.95,
    # warmup 50→30, entropy 0.01→0.015
    actor_lr: 0.0005
    critic_lr: 0.0005
    gamma: 0.99
    gae_lambda: 0.95
    ppo_clip_epsilon: 0.2
    ppo_epochs: 10
    ppo_minibatches: 2
    ppo_buffer_size: 512
    entropy_coeff: 0.015
    value_loss_coef: 0.5
    max_grad_norm: 0.5

    # LR schedule: extended decay for 1000-episode sessions
    # Ep 1-30: warmup 0.00005 → 0.0005
    # Ep 30-730: linear decay 0.0005 → 0.0001
    # Ep 730+: constant at 0.0001
    # R9: extended from 400→700 to keep LR higher during Phase 1→2 breakthrough (ep 500-600)
    lr_warmup_episodes: 30
    lr_warmup_start: 0.00005
    lr_decay_episodes: 700
    lr_decay_end: 0.0001

    # Topology
    use_random_topology: true

    # Unified sensory modules for triple-objective task
    sensory_modules:
      - food_chemotaxis
      - nociception
      - thermotaxis

    # Sensory qubits (7 features = 7 qubits, 3 interneuron qubits remaining)
    num_sensory_qubits: 7

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.4
  penalty_temperature_proximity: 0.3
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.3
  reward_health_gain: 0.2

satiety:
  initial_satiety: 800.0
  satiety_decay_rate: 1.0
  satiety_gain_per_food: 0.2

environment:
  grid_size: 100
  viewport_size: [11, 11]
  use_separated_gradients: true

  foraging:
    foods_on_grid: 45
    target_foods_to_collect: 25
    min_food_distance: 8
    agent_exclusion_radius: 12
    gradient_decay_constant: 12.0
    gradient_strength: 1.0

  predators:
    enabled: true
    count: 4
    speed: 0.5
    movement_pattern: pursuit
    detection_radius: 10
    kill_radius: 0
    gradient_decay_constant: 12.0
    gradient_strength: 1.0

  health:
    enabled: true
    max_hp: 150.0
    predator_damage: 15.0
    food_healing: 15.0

  thermotaxis:
    enabled: true
    cultivation_temperature: 20.0
    base_temperature: 20.0     # Temperature at grid center (spawn point)
    gradient_direction: 0.0    # Temperature increases to the right
    gradient_strength: 0.15    # Mild background gradient
    # Hot/cold spots: [x, y, intensity] where intensity is temperature DELTA from base
    # - Hot spots ADD intensity to base temp (e.g., 25.0 -> up to 45°C at center)
    # - Cold spots SUBTRACT intensity from base temp (e.g., 25.0 -> down to -5°C at center)
    # - Effect decays exponentially with distance (spot_decay_constant controls falloff)
    hot_spots:
      - [75, 50, 25.0]   # Right-center: +25°C intensity (up to 45°C)
      - [25, 75, 20.0]   # Upper-left: +20°C intensity (up to 40°C)
      - [80, 80, 22.0]   # Upper-right: +22°C intensity (up to 42°C)
    cold_spots:
      - [25, 25, 25.0]   # Lower-left: -25°C intensity (down to -5°C)
      - [75, 25, 20.0]   # Lower-right: -20°C intensity (down to 0°C)
      - [50, 85, 18.0]   # Top-center: -18°C intensity (down to 2°C)
    spot_decay_constant: 6.5
    # Rewards/penalties
    comfort_reward: 0.0        # MUST stay 0 (prevents freeze behavior)
    discomfort_penalty: -0.05
    danger_penalty: -0.5
    reward_discomfort_food: 0.3
    # HP damage
    danger_hp_damage: 0.5
    lethal_hp_damage: 6.0
    # Zone thresholds
    comfort_delta: 5.0         # Comfort: 15-25°C
    discomfort_delta: 10.0     # Discomfort: 10-15°C or 25-30°C
    danger_delta: 15.0         # Danger: 5-10°C or 30-35°C
