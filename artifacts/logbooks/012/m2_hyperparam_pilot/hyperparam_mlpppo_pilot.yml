# Hyperparameter Evolution Pilot — MLPPPO
# ============================================================================
#
# Evolves 7 MLPPPO hyperparameters (3 architectural ints, 4 PPO
# floats) under LearnedPerformanceFitness against the small-scale
# foraging baseline.
#
# Each genome evaluation:
#   1. HyperparameterEncoder.decode patches MLPPPOBrainConfig with the
#      genome's evolved values and constructs a fresh brain.
#   2. K = learn_episodes_per_eval (30) train episodes via
#      StandardEpisodeRunner — brain.learn() fires; weights mutate.
#   3. L = eval_episodes_per_eval (5) frozen eval episodes via
#      FrozenEvalRunner — score = COMPLETED_ALL_FOOD count / L.
#
# Decision gate:
#   - GO if mean success rate across 4 seeds ≥3pp over the hand-tuned
#     MLPPPO baseline AND fitness still rising at gen 20.
#   - PIVOT if marginal: rising but separation < 3pp, or > 3pp but flat.
#   - STOP if no separation: < 1pp or worse than baseline.
#
# Baseline reference: configs/scenarios/foraging/mlpppo_small_oracle.yml
# evaluated against the trained brain for 100 eval episodes per seed
# (a static plateau measurement; not a 1:1 episode-budget match with
# the pilot, since the baseline has no genomes).
#
# cma_diagonal: false — n=7 is well within full-cov tractability.
# This matches the EvolutionConfig field default; writing it
# explicitly here keeps the pilot YAML self-documenting.

max_steps: 500

brain:
  name: mlpppo
  config:
    # Baseline values mirror configs/scenarios/foraging/mlpppo_small_oracle.yml
    # (the comparison baseline).  Fields named in hyperparam_schema
    # below are EVOLVED — the values here are starting points / fallbacks
    # for fields NOT in the schema (e.g. clip_epsilon, gae_lambda).
    actor_hidden_dim: 64
    critic_hidden_dim: 64
    num_hidden_layers: 2
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    entropy_coef: 0.02
    learning_rate: 0.001
    rollout_buffer_size: 256
    num_epochs: 10
    num_minibatches: 2
    max_grad_norm: 0.5
    normalize_advantages: true
    sensory_modules:
      - food_chemotaxis

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02

satiety:
  initial_satiety: 200.0
  satiety_decay_rate: 1.0
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]

  foraging:
    foods_on_grid: 5
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0

evolution:
  algorithm: cmaes
  population_size: 12
  generations: 20
  episodes_per_eval: 5  # Used as L fallback when eval_episodes_per_eval is None
  learn_episodes_per_eval: 30  # K — train phase episodes per genome
  eval_episodes_per_eval: 5    # L — eval phase episodes per genome
  # sigma0=1.0 pairs with the encoder's per-param genome_stds (each std
  # equals bound-width/6).  Effective per-param sigma is sigma0*std, so
  # ±3 stds at sigma0=1.0 spans roughly the full bound range — reasonable
  # initial exploration.  The default math.pi/2 is too aggressive for
  # log-scale and tight-bound dimensions: it pushes most samples
  # outside the schema's bounds, where decode clips them to the
  # extremes.
  sigma0: 1.0
  parallel_workers: 4
  checkpoint_every: 2
  cma_diagonal: false

hyperparam_schema:
  # 3 architectural ints — controls capacity / depth.
  - name: actor_hidden_dim
    type: int
    bounds: [32, 256]
  - name: critic_hidden_dim
    type: int
    bounds: [32, 256]
  - name: num_hidden_layers
    type: int
    bounds: [1, 3]
  # 4 PPO floats — controls learning dynamics.
  - name: learning_rate
    type: float
    bounds: [1.0e-5, 1.0e-2]
    log_scale: true
  - name: gamma
    type: float
    bounds: [0.9, 0.999]
  - name: entropy_coef
    type: float
    bounds: [1.0e-4, 0.1]
    log_scale: true
  - name: num_epochs
    type: int
    bounds: [1, 8]
