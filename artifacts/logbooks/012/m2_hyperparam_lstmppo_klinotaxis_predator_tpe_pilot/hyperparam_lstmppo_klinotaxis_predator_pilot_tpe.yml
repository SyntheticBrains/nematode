# Hyperparameter Evolution Pilot — LSTMPPO + klinotaxis + pursuit predators (TPE)
# ============================================================================
#
# M2.12: Optuna/TPE variant of the M2.11 predator-arm pilot.  Identical
# in every dimension EXCEPT ``evolution.algorithm: tpe`` (vs ``cmaes``).
# Same brain, same sensing, same 6-field schema, same K=50/L=25, same
# 4 seeds (42-45) — so the pilot vs pilot comparison isolates the
# optimiser as the only changed variable.
#
# RQ1 close-out: the M2.11 pilot under CMA-ES produced a 1/4 dead-zone
# trajectory (seed 43 stuck at 0.000 because CMA-ES converged on
# ``actor_lr`` clipped at lower bound + ``entropy_coef`` ≈ 0).  TPE's
# tree-structured prior + bounded sampling are designed to avoid that
# kind of boundary collapse.  Decision criteria per RQ1:
#   - TPE wins if mean final fitness >= CMA-ES's 0.640 + 5pp = 0.690
#     OR if TPE rescues seed 43 (best fitness > 0.000 across all gens).
#   - Otherwise CMA-ES stays the default and M3 uses CMA-ES.
#
# Original M2.11 framing follows for context:
#
# M2.11 (the third M2 arm).  Both prior M2 arms (MLPPPO+oracle,
# LSTMPPO+klinotaxis foraging) saturate at 1.000 from gen 1 — the
# schemas' viable regions are too broad and the from-scratch task is
# too easy for the pilot's GO decision to be informative.  This arm
# adds **pursuit predators** to LSTMPPO+klinotaxis, forcing the brain
# to balance foraging and survival.  That's the regime where
# gamma/entropy/lr settings genuinely differentiate policies.
#
# Predator + nociception + health blocks copied verbatim from
# ``configs/scenarios/pursuit/lstmppo_small_klinotaxis.yml`` — a
# single-agent pursuit klinotaxis config that mirrors logbook 011's
# K2B campaign predator settings.  Brain block mirrors
# ``configs/evolution/hyperparam_lstmppo_klinotaxis_pilot.yml`` (the
# M2 part 2 arm), so the only difference between the two arms is
# predator pressure on the env side.
#
# Each genome evaluation:
#   1. HyperparameterEncoder.decode patches LSTMPPOBrainConfig with the
#      genome's evolved values and constructs a fresh brain.
#   2. K = learn_episodes_per_eval (50) train episodes via
#      StandardEpisodeRunner — brain.learn() fires; weights mutate.
#   3. L = eval_episodes_per_eval (25) frozen eval episodes via
#      FrozenEvalRunner — score = COMPLETED_ALL_FOOD count / L.
#
# K = 50, L = 25: same as M2 part-2 LSTMPPO+klinotaxis pilot, so wall
# is comparable and the comparison between the two arms is on equal
# footing on the train/eval-budget side.  The schema is the same 6
# evolved fields (rnn_type, lstm_hidden_dim, actor_lr, critic_lr,
# gamma, entropy_coef) so the only axis that varies between arms is
# the env's predator pressure.
#
# Decision gate (gate-pp default 3pp; aggregator's --gate-pp overrides):
#   - GO    if mean across seeds >= baseline_mean + 3pp.
#   - PIVOT if positive but below 3pp (>= +1pp; PIVOT_MIN_PP).
#   - STOP  otherwise.
#
# Baseline reference: ``configs/scenarios/pursuit/lstmppo_small_klinotaxis.yml``
# evaluated for 100 episodes per seed via ``run_simulation.py``.
#
# cma_diagonal: false — n=6 is well within full-cov tractability.

max_steps: 1000  # klinotaxis sensing + predators need more steps than oracle

brain:
  name: lstmppo
  config:
    # Brain block matches the M2 part-2 (foraging-only) pilot so the only
    # axis that changes between the two arms is predator pressure.
    rnn_type: gru
    lstm_hidden_dim: 64
    bptt_chunk_length: 16

    actor_hidden_dim: 64
    critic_hidden_dim: 128
    actor_num_layers: 2
    critic_num_layers: 2

    actor_lr: 0.0003
    critic_lr: 0.0003

    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    rollout_buffer_size: 512
    num_epochs: 4
    max_grad_norm: 0.5

    entropy_coef: 0.02
    entropy_coef_end: 0.005
    entropy_decay_episodes: 800

    lr_warmup_episodes: 50
    lr_warmup_start: 0.00003
    lr_decay_episodes: 1500
    lr_decay_end: 0.00003

    sensory_modules:
      - food_chemotaxis     # Auto-translated to food_chemotaxis_klinotaxis
      - nociception         # Auto-translated to nociception_klinotaxis
      - mechanosensation
      - proprioception

body_length: 2

reward:
  # Reward block extends M2 part-2 with the predator-related shaping
  # terms used in the pursuit baseline (penalty_predator_death,
  # penalty_predator_proximity, penalty_health_damage, reward_health_gain).
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.5
  reward_health_gain: 0.1

satiety:
  # Same as the pursuit baseline (initial 300 vs M2 part-2's 400 — predator
  # arm sets initial_satiety lower because predator pressure shortens the
  # episode length; matched to the validated baseline config).
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]

  sensing:
    chemotaxis_mode: klinotaxis
    nociception_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1

  foraging:
    # Foods on grid: 6 (matches pursuit baseline; M2 part-2 used 5).
    # Bumped to 6 to match the predator baseline.
    foods_on_grid: 6
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0

  predators:
    # Pursuit predator block copied verbatim from
    # configs/scenarios/pursuit/lstmppo_small_klinotaxis.yml — these
    # are the same params logbook 011's K2B campaign used at multi-agent
    # scale, here applied to the single-agent setup the evolution pilot
    # uses.
    enabled: true
    count: 2
    speed: 0.5
    movement_pattern: pursuit
    detection_radius: 6
    gradient_decay_constant: 10.0
    gradient_strength: 1.0

  health:
    max_hp: 100.0
    predator_damage: 20.0
    food_healing: 10.0

evolution:
  algorithm: tpe
  population_size: 12
  generations: 20
  episodes_per_eval: 25  # L fallback when eval_episodes_per_eval is None
  learn_episodes_per_eval: 50  # K — train phase
  eval_episodes_per_eval: 25   # L — eval phase
  # sigma0=1.0 pairs with the encoder's per-param genome_stds (each std
  # equals bound-width/6).  Same rationale as the prior LSTMPPO arm.
  sigma0: 1.0
  parallel_workers: 4
  checkpoint_every: 2
  cma_diagonal: false

hyperparam_schema:
  # Same 6 evolved fields as the M2 part-2 LSTMPPO+klinotaxis arm.
  # Keeping the schema identical means the comparison between the two
  # arms isolates the effect of predator pressure on the fitness
  # landscape (the only variable changed between the two pilot YAMLs
  # is the env block's predator/nociception/health additions).
  - name: rnn_type
    type: categorical
    values: [lstm, gru]
  - name: lstm_hidden_dim
    type: int
    bounds: [32, 128]
  - name: actor_lr
    type: float
    bounds: [1.0e-5, 1.0e-3]
    log_scale: true
  - name: critic_lr
    type: float
    bounds: [1.0e-5, 1.0e-3]
    log_scale: true
  - name: gamma
    type: float
    bounds: [0.9, 0.999]
  - name: entropy_coef
    type: float
    bounds: [1.0e-4, 0.1]
    log_scale: true
