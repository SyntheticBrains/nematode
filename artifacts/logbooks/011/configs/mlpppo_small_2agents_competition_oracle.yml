# Multi-Agent Foraging — 2 Agents, Baseline Competition
# Minimal competition: 2 agents on 20x20 grid, 3 food
# Phase 4 evaluation Campaign B1: agent scaling (2-agent)

max_steps: 300
brain:
  name: mlpppo
  config:
    actor_hidden_dim: 64
    critic_hidden_dim: 64
    num_hidden_layers: 2
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    entropy_coef: 0.02
    learning_rate: 0.001
    rollout_buffer_size: 256
    num_epochs: 10
    num_minibatches: 2
    max_grad_norm: 0.5
    normalize_advantages: true
    sensory_modules:
      - food_chemotaxis
      - social_proximity

body_length: 2

multi_agent:
  enabled: true
  count: 2
  food_competition: first_arrival
  social_detection_radius: 5
  termination_policy: freeze
  min_agent_distance: 3

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02

satiety:
  initial_satiety: 200.0
  satiety_decay_rate: 1.0
  satiety_gain_per_food: 0.2

environment:
  grid_size: 20
  viewport_size: [11, 11]

  foraging:
    foods_on_grid: 3
    target_foods_to_collect: 10
    min_food_distance: 2
    agent_exclusion_radius: 2
    gradient_decay_constant: 4.0
    gradient_strength: 1.0
