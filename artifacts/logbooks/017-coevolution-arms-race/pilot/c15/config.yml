# C15 — C12 reproducibility check at seed 43
# Identical to C12 config (grid=20, count=2, modern substrate). The only
# difference is the --seed CLI arg (42 -> 43).
#
# Purpose: derisk the C12 result (single seed 42, fair-test 0.105, dual
# significant escalation, predator non-monotone KB2 trough + KB4 peak)
# before committing 28h to a 4-seed full pilot. C14's wipeout under
# cold-start showed how seed-dependent these dynamics can be; we need
# to confirm C12's signal isn't a seed-42-only artefact.
#
# Predicted outcomes:
#   - fair-test in [0.05, 0.20] AND smooth prey curve AND predator
#     non-monotone: C12 dynamics are seed-robust, promote to 4-seed pilot
#   - fair-test ~0 OR prey wipeout: C12 was a lucky seed, re-evaluate
#   - fair-test high but no predator non-monotone: prey-saturation
#     pattern returns, X4 vs C12 distinction was an artefact
max_steps: 1000
brain:
  name: lstmppo
  config:
    rnn_type: gru
    lstm_hidden_dim: 64
    bptt_chunk_length: 16
    actor_hidden_dim: 64
    critic_hidden_dim: 128
    actor_num_layers: 2
    critic_num_layers: 2
    actor_lr: 0.0003
    critic_lr: 0.0003
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    value_loss_coef: 0.5
    rollout_buffer_size: 512
    num_epochs: 4
    max_grad_norm: 0.5
    entropy_coef: 0.02
    entropy_coef_end: 0.005
    entropy_decay_episodes: 800
    lr_warmup_episodes: 50
    lr_warmup_start: 3.0e-05
    lr_decay_episodes: 1500
    lr_decay_end: 3.0e-05
    sensory_modules:
    - food_chemotaxis
    - nociception
    - mechanosensation
    - proprioception
body_length: 2
reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.5
  reward_health_gain: 0.1
satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2
environment:
  grid_size: 20
  viewport_size:
  - 11
  - 11
  sensing:
    chemotaxis_mode: klinotaxis
    nociception_mode: klinotaxis
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1
  foraging:
    foods_on_grid: 6
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 8.0
    gradient_strength: 1.0
  predators:
    enabled: true
    count: 2
    speed: 0.5
    movement_pattern: pursuit
    detection_radius: 6
    gradient_decay_constant: 10.0
    gradient_strength: 1.0
    brain_config:
      kind: mlpppo_predator
  health:
    max_hp: 100.0
    predator_damage: 20.0
    food_healing: 10.0
coevolution:
  K_per_block: 10
  generation_pairs: 2
  generality_probe_every: 10
  held_out_size: 4
  start_side: prey
  predator_gen0_bootstrap: heuristic_imitation_pretrain
  prey_gen0_seed_path: configs/evolution/coevolution_warmstart_prey/seed_42.json
  prey_evolution:
    algorithm: cmaes
    cma_diagonal: true
    population_size: 24
    generations: 20
    episodes_per_eval: 25
    learn_episodes_per_eval: 8
    eval_episodes_per_eval: 25
    sigma0: 0.5
    parallel_workers: 4
    inheritance: lamarckian
    inheritance_elite_count: 1
    persist_cma_across_kblocks: false
  predator_evolution:
    algorithm: cmaes
    cma_diagonal: true
    population_size: 16
    generations: 20
    episodes_per_eval: 12
    learn_episodes_per_eval: 1
    sigma0: 0.5
    parallel_workers: 4
    inheritance: lamarckian
    inheritance_elite_count: 1
    persist_cma_across_kblocks: false
