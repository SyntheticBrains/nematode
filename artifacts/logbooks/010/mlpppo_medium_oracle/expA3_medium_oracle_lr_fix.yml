# LR-FIX: MLPPPO Oxygen Foraging Medium Oracle
# Only change from baseline: lr_decay_episodes 200→1500
# Everything else identical to configs/scenarios/oxygen_foraging/mlpppo_medium_oracle.yml

max_steps: 1000
brain:
  name: mlpppo
  config:
    actor_hidden_dim: 128
    critic_hidden_dim: 128
    num_hidden_layers: 2
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.98
    value_loss_coef: 0.5
    entropy_coef: 0.02
    learning_rate: 0.001
    rollout_buffer_size: 512
    num_epochs: 20
    num_minibatches: 2
    max_grad_norm: 0.5
    normalize_advantages: true
    lr_warmup_episodes: 50
    lr_warmup_start: 0.0001
    lr_decay_episodes: 1500
    lr_decay_end: 0.0001
    sensory_modules:
      - food_chemotaxis
      - aerotaxis

body_length: 2

reward:
  reward_goal: 2.0
  reward_distance_scale: 0.3
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.0
  reward_health_gain: 0.1

satiety:
  initial_satiety: 500.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2

environment:
  grid_size: 50
  viewport_size: [11, 11]

  foraging:
    foods_on_grid: 15
    target_foods_to_collect: 20
    min_food_distance: 4
    agent_exclusion_radius: 8
    gradient_decay_constant: 10.0
    gradient_strength: 1.0

  health:
    max_hp: 100.0
    predator_damage: 0.0
    food_healing: 5.0

  aerotaxis:
    enabled: true
    base_oxygen: 10.0
    gradient_direction: 1.5708
    gradient_strength: 0.30
    spot_decay_constant: 6.0
    comfort_reward: 0.0
    danger_penalty: -0.3
    danger_hp_damage: 1.0
    lethal_hp_damage: 8.0
