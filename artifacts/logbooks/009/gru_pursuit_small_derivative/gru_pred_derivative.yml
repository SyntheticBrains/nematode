# GRU ablation: Derivative pursuit predators (small)
max_steps: 500
brain:
  name: lstmppo
  config:
    rnn_type: gru
    lstm_hidden_dim: 64
    bptt_chunk_length: 96
    actor_hidden_dim: 128
    critic_hidden_dim: 128
    actor_num_layers: 2
    critic_num_layers: 2
    actor_lr: 0.0003
    critic_lr: 0.0003
    clip_epsilon: 0.2
    gamma: 0.99
    gae_lambda: 0.98
    value_loss_coef: 0.5
    rollout_buffer_size: 512
    num_epochs: 4
    max_grad_norm: 0.5
    entropy_coef: 0.02
    entropy_coef_end: 0.01
    entropy_decay_episodes: 2000
    lr_warmup_episodes: 100
    lr_warmup_start: 0.00003
    lr_decay_episodes: 4000
    lr_decay_end: 0.00003
    sensory_modules:
      - food_chemotaxis
      - nociception
      - mechanosensation
      - proprioception
body_length: 2
reward:
  reward_goal: 2.0
  reward_distance_scale: 0.5
  reward_exploration: 0.05
  penalty_step: 0.005
  penalty_anti_dithering: 0.02
  penalty_stuck_position: 0
  penalty_starvation: 10.0
  penalty_predator_death: 10.0
  penalty_predator_proximity: 0.15
  stuck_position_threshold: 0
  penalty_boundary_collision: 0.02
  penalty_health_damage: 0.5
  reward_health_gain: 0.1
satiety:
  initial_satiety: 300.0
  satiety_decay_rate: 0.8
  satiety_gain_per_food: 0.2
environment:
  grid_size: 20
  viewport_size: [11, 11]
  use_separated_gradients: true
  sensing:
    chemotaxis_mode: derivative
    nociception_mode: derivative
    stam_enabled: true
    stam_buffer_size: 30
    stam_decay_rate: 0.1
  foraging:
    foods_on_grid: 6
    target_foods_to_collect: 10
    min_food_distance: 3
    agent_exclusion_radius: 5
    gradient_decay_constant: 4.0
    gradient_strength: 1.0
  predators:
    enabled: true
    count: 2
    speed: 0.5
    movement_pattern: pursuit
    detection_radius: 6
    kill_radius: 0
    gradient_decay_constant: 4.0
    gradient_strength: 1.0
  health:
    enabled: true
    max_hp: 100.0
    predator_damage: 20.0
    food_healing: 10.0
