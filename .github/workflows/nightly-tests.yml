name: Nightly Tests

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  nightly:
    name: Nightly E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Generate LFS cache key
        run: git lfs ls-files --long | cut -d ' ' -f1 | sort > .lfs-assets-id
        env:
          GIT_LFS_SKIP_SMUDGE: '1'

      - name: Cache Git LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ runner.os }}-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: |
            lfs-${{ runner.os }}-

      - name: Pull LFS objects
        run: git lfs pull && git lfs checkout

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --extra cpu --extra torch --dev

      - name: Run nightly e2e tests
        run: |
          uv run pytest -m nightly -v --tb=long --color=yes
