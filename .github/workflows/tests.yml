name: Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Python 3.12
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Generate LFS cache key
        run: git lfs ls-files --long | cut -d ' ' -f1 | sort > .lfs-assets-id
        env:
          GIT_LFS_SKIP_SMUDGE: '1'

      - name: Cache Git LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ runner.os }}-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: |
            lfs-${{ runner.os }}-

      - name: Pull LFS objects
        run: git lfs pull && git lfs checkout

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --extra cpu --extra pixel --extra torch --dev

      # Heavy evolution-loop and smoke tests construct LSTMPPO brains
      # and (for smoke) ``subprocess.run(...)`` ``run_simulation.py`` /
      # ``run_evolution.py``.  Running multiple of these in parallel
      # under pytest-xdist saturates the runner's vCPU budget enough
      # to starve the runner agent and trigger control-plane heartbeat
      # timeouts ("operation was canceled" mid-stream).  Splitting them
      # off and running them serially eliminates the contention without
      # losing coverage.
      - name: Run unit tests (parallel — excludes evolution + smoke)
        run: |
          uv run pytest -m "not nightly" \
            --ignore=packages/quantum-nematode/tests/quantumnematode_tests/evolution \
            --ignore=packages/quantum-nematode/tests/quantumnematode_tests/test_smoke.py \
            --cov --cov-branch --cov-report=xml --cov-report=term -v --tb=short --color=yes

      # Serial run for the heavy tests.  ``-n0`` overrides pyproject's
      # ``-n auto``; ``--cov-append`` merges this step's coverage data
      # into the unit-test ``.coverage`` from the prior step.
      - name: Run evolution + smoke tests (serial)
        run: |
          uv run pytest -n0 -m "not nightly" \
            packages/quantum-nematode/tests/quantumnematode_tests/evolution \
            packages/quantum-nematode/tests/quantumnematode_tests/test_smoke.py \
            --cov --cov-branch --cov-append --cov-report=xml --cov-report=term -v --tb=short --color=yes

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
