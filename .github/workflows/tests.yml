name: Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Python 3.12
    runs-on: ubuntu-latest

    # Pin BLAS thread pools to 1 across both pytest steps to prevent
    # CPU oversubscription under pytest-xdist parallelism.  The
    # default torch BLAS pool sizes itself to the runner's vCPU count
    # (4 on the public-repo runner), so without this 4 xdist workers
    # each spawning 4+ BLAS threads = ~16+ contended threads on 4
    # cores, starving the runner agent and triggering control-plane
    # heartbeat timeouts ("operation was canceled" cancellations and
    # exit-code-143 SIGTERM kills).  Single-threaded BLAS leaves all
    # parallelism to xdist.
    env:
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Generate LFS cache key
        run: git lfs ls-files --long | cut -d ' ' -f1 | sort > .lfs-assets-id
        env:
          GIT_LFS_SKIP_SMUDGE: '1'

      - name: Cache Git LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ runner.os }}-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: |
            lfs-${{ runner.os }}-

      - name: Pull LFS objects
        run: git lfs pull && git lfs checkout

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --extra cpu --extra pixel --extra torch --dev

      # Unit tests run in parallel via pytest-xdist.  ``-n 2``
      # overrides pyproject's ``-n auto`` to leave memory headroom
      # for any subprocess a test might fork.
      - name: Run unit tests (parallel, no smoke)
        run: |
          uv run pytest -n 2 -m "not nightly and not smoke" --cov --cov-branch --cov-report=xml --cov-report=term -v --tb=short --color=yes

      # Smoke tests are split into a separate serial step because
      # they ``subprocess.run(run_simulation.py)`` — running them
      # under xdist parallelism would mean 2+ xdist workers plus
      # forked subprocesses all importing torch simultaneously,
      # which intermittently starved the runner agent and triggered
      # mid-stream cancellations.  ``-n0`` overrides pyproject's
      # ``-n auto``; ``--cov-append`` merges this step's coverage
      # data into the unit-test ``.coverage`` from the prior step.
      - name: Run smoke tests (serial)
        run: |
          uv run pytest -n0 -m "smoke" --cov --cov-branch --cov-append --cov-report=xml --cov-report=term -v --tb=short --color=yes

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
