name: Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Python 3.12
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Generate LFS cache key
        run: git lfs ls-files --long | cut -d ' ' -f1 | sort > .lfs-assets-id
        env:
          GIT_LFS_SKIP_SMUDGE: '1'

      - name: Cache Git LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ runner.os }}-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: |
            lfs-${{ runner.os }}-

      - name: Pull LFS objects
        run: git lfs pull && git lfs checkout

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --extra cpu --extra pixel --extra torch --dev

      - name: Run tests
        env:
          # Pin BLAS thread pools to 1 to prevent CPU oversubscription
          # under pytest-xdist parallelism.  The default torch BLAS pool
          # is sized to the runner's vCPU count, which on a 4-core
          # ubuntu-latest runner means 4 xdist workers each spawning 4+
          # BLAS threads under load — ~16+ contended threads on 4 cores.
          # That oversubscription was triggering runner-agent timeouts
          # (cancellations + exit-code-143 SIGTERM kills) on this repo's
          # heavier evolution-loop test suite.  Single-threaded BLAS
          # leaves all parallelism to xdist.
          OMP_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
          OPENBLAS_NUM_THREADS: "1"
          NUMEXPR_NUM_THREADS: "1"
        run: |
          uv run pytest -m "not nightly" --cov --cov-branch --cov-report=xml --cov-report=term -v --tb=short --color=yes

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
